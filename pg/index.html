<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>인지 프로그램 도구 모음</title>
<!-- v2026.07.07.001 -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{ --navy:#1F3864; --teal:#1D9E75; --bg:#f4f6fa; --card:#fff; --line:#e3e8f0; --txt:#2b3446; --sub:#7b8698; }
*{box-sizing:border-box; margin:0; padding:0;}
body{font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:var(--txt);}
.header{background:var(--navy); color:#fff; padding:16px 20px; display:flex; align-items:center; gap:12px;}
.header h1{font-size:18px; font-weight:700;}
.header .ver{font-size:11px; opacity:.6;}
.wrap{max-width:720px; margin:0 auto; padding:24px 16px 60px;}
.lead{font-size:14px; color:var(--sub); margin-bottom:18px;}
a.card{display:flex; align-items:center; gap:14px; text-decoration:none; color:inherit;
  background:var(--card); border:1px solid var(--line); border-radius:12px; padding:18px 20px; margin-bottom:14px;
  transition:box-shadow .15s, transform .15s;}
a.card:hover{box-shadow:0 4px 14px rgba(31,56,100,.12); transform:translateY(-1px);}
a.card .ico{font-size:30px; flex-shrink:0;}
a.card .t{font-size:16px; font-weight:700; color:var(--navy);}
a.card .d{font-size:13px; color:var(--sub); margin-top:3px;}
a.card .go{margin-left:auto; color:var(--teal); font-size:20px;}
</style>
</head>
<body>
<div class="header">
  <h1>인지 프로그램 도구 모음</h1>
  <span class="ver">v2026.07.07.001</span>
</div>
<div class="wrap">
  <p class="lead">아래에서 필요한 학습지 도구를 선택하세요. 각 도구는 인터넷 없이도 동작합니다.</p>

  <a class="card" href="./1/">
    <span class="ico">🔢</span>
    <span><span class="t">숫자찾기 생성기</span><span class="d">인지훈련용 숫자찾기 학습지 무한 생성·인쇄</span></span>
    <span class="go">→</span>
  </a>
  <a class="card" href="./2/">
    <span class="ico">🔤</span>
    <span><span class="t">단어찾기 생성기</span><span class="d">주제별 단어찾기 학습지 생성·인쇄</span></span>
    <span class="go">→</span>
  </a>
  <a class="card" href="./pixel/">
    <span class="ico">🖨️</span>
    <span><span class="t">픽셀 도안 인쇄</span><span class="d">픽셀아트 활동지 43종 A4/A3 인쇄</span></span>
    <span class="go">→</span>
  </a>
</div>
</body>
</html>
