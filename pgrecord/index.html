us":"일반","text":"눈이 흐릿해 뿅뿅이 조준은 어려워하셨으나 손목 힘을 조절하여 과녁 근처로 던지는 데 성공하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"다른 색으로도 만들어보고 싶다고 말씀하심."},{"category":"인지","programs":["소망노래자랑"],"status":"일반","text":"다른 어르신과 눈을 맞추며 함께 노래 부르심."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"일반","text":"다른 어르신들에 비해 활동 속도는 조금 느린 편이었으나, 끝까지 마무리를 짓겠다는 의지를 보이며 본인이 좋아하는 색으로 목장을 깔끔하게 완성함."},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"다른 어르신의 노래에도 함께 박수로 호응하심"},{"category":"인지","programs":["신나는 빙고게임"],"status":"일반","text":"다른 어르신이 '즙'이라는 단어를 적자 그게 무슨 뜻이냐고 호기심을 보이심. 요양보호사가 \"양파즙, 사과즙 할 때 그 '즙'이에요\"라고 설명해드리자 고개를 끄덕이시며 새로운 단어를 인지하고 학습하심"},{"category":"인지","programs":["신나는 빙고게임"],"status":"일반","text":"다른 어르신이 먼저 '빙고'를 외치자 상심하시며 \"나는 안 한다\"고 빙고판을 밀쳐두심. \"어르신판도 이제 한 칸밖에 안 남았어요, 다음판엔 일등하실 거예요\"라며 응원해드리자 다시 마음을 풀고 참여하심"},{"category":"인지","programs":["신나는 빙고게임"],"status":"일반","text":"다른 참여자와 자연스럽게 대화를 나누며 활동에 참여하심."},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"다른 참여자의 노래를 경청하며 함께 흥얼거림."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"다른 참여자의 작품에도 관심을 보임."},{"category":"인지","programs":["이야기여행"],"status":"일반","text":"다소 복잡한 주사위 게임 규칙을 단번에 이해하셨고, 같은 조 어르신들이 차례를 헷갈려할 때 순서를 알려주며 협동하심."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"일반","text":"다소 소극적인 태도를 보이셨으나, 다른 어르신들이 집중하는 모습을 보고 이내 색연필을 잡으심. 채색이 진행될수록 도안이 완성되는 과정에 흥미를 느끼며 끝까지 몰입하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"다양한 꽃그림을 보며 좋아하는 꽃이름을 말씀하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"다양한 색을 사용하여 개성 있게 표현함."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"다양한 색을 사용하여 작품을 풍성하게 표현함."},{"category":"인지","programs":["신나는 빙고게임"],"status":"일반","text":"단어연상 자체에 큰 심리적 부담과 인지적 어려움을 느끼심. '풀'과 '자동차' 그림카드를 보여드리며 \"이 중에서 한글자짜리는 무엇일까요?\"라고 선택형 질문을 던져 스스로 풀을 고를 수 있도록 성취감을 부여함"},{"category":"인지","programs":["신나는 빙고게임"],"status":"일반","text":"단오, 동지 등 다소 생소할 수 있는 절기 낱말이 나오자 동지에는 팥죽을 쑤어 대문에 뿌렸다며 풍습을 정확히 기억해내심."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"당근 잎 부분을 오릴 때 다소 서툴렀으나 틀려도 괜찮다고 지지해드리자 실패불안 없이 편안하게 완수하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"도르래 방향 전환을 혼란스러워하셨으나 방향 지시 단서를 제공하니 무사히 완수하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"도르래 줄을 당길 때 짝꿍 어르신에게 오른쪽을 더 당기라고 소통하며 미션을 주도적으로 해결하심."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"일반","text":"도안 속 목장 풍경과 배경을 구별하는 데 어려움을 보이심. 요양보호사가 옆에서 어르신, 여기가 하늘이에요. 좋아하는 파란색으로 칠해볼까요? 하고 언어적으로 명확하게 안내하고 지지하자, 흥미를 느끼며 좋아하는 색으로 채색을 완수하심."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"도안 유실 없이 가위로 당근 잎사귀 부분까지 정교하게 오려내는 놀라운 집중력을 보여주심."},{"category":"인지","programs":["맞춤형 자율인지학습(색칠하기)"],"status":"일반","text":"도안에 맞게 알맞은 색을 사용하여 주로 원색을 좋아하심"},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"일반","text":"도안의 테두리를 벗어나지 않으려고 꼼꼼하게 집중하여 색칠하셨으며, 손끝 소근육 조작이 우수하심."},{"category":"인지","programs":["신나는 빙고게임"],"status":"일반","text":"도움 없이 대부분의 활동을 수행하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"도움 요청시 적절하게 의사를 표현함"},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"도움 요청을 적절히 표현함."},{"category":"인지","programs":["이야기여행"],"status":"일반","text":"동료 어르신 이름에도 관심을 보이심."},{"category":"인지","programs":["이야기여행"],"status":"일반","text":"동료 어르신의 수행모습을 관찰하며 천천히 속담구절을 소리내어 따라읽음."},{"category":"인지","programs":["이야기여행"],"status":"일반","text":"동료 어르신이 주사위를 던질 때마다 박수를 치며 응원하셨고, 본인 차례에는 손목 스냅을 이용하여 주사위를 능숙하게 굴리심."},{"category":"인지","programs":["신나는 빙고게임"],"status":"일반","text":"동물그림을 보며 과거 반려동물을 키웠던 경험을 이야기하심."},{"category":"인지","programs":["신나는 빙고게임"],"status":"일반","text":"동물그림을 보며 다양한 추억을 이야기하는 모습을 보이심."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"일반","text":"들과 나무를 색칠하는데 뭘로 해야 할지 고민하셔서 색깔을 골라드니 예쁘게 색칠해주심."},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"리듬악기 사용에 흥미를 보이며 반복 참여를 원하심."},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"리듬에 맞춰 손동작을 하며 활동함."},{"category":"인지","programs":["노래교실"],"status":"일반","text":"마라카스 악기를 활용하여 박자에 맞춰 흔들며 호응하심"},{"category":"인지","programs":["노래교실","소망노래방"],"status":"일반","text":"마라카스를 흔들며 리듬에 맞추려는 시도가 활발함"},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"마라카스를 흔들며 리듬에 맞춰 활동함."},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"마라카스를 흔들며 박자를 맞추는 모습을 보이심."},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"마라카스를 흔들며 박자에 맞춰 참여함."},{"category":"인지","programs":["노래교실"],"status":"일반","text":"마라카스와 탬버린 등 악기를 사용하며 리듬활동에 참여하심."},{"category":"인지","programs":["소망노래자랑"],"status":"일반","text":"마이크 사용에 익숙하게 참여하심."},{"category":"인지","programs":["소망노래자랑"],"status":"일반","text":"모르는 부분은 옆 어르신과 함께 따라 부르심"},{"category":"인지","programs":["노래교실"],"status":"일반","text":"목 컨디션이 좋지 않아 노래 부르시는 것은 즐겨 하시지 않았지만 경청하시는 자세는 매우 좋으심"},{"category":"인지","programs":["맞춤형 자율인지학습(색칠하기)"],"status":"일반","text":"무슨 색을 색칠해야 하나 고민을 많이 하셔서 색상 선택을 도와드리고 차츰 원하시는 색을 자율적으로 선택하실 수 있도록 함"},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"물건이 장애물에 부딪혀 실패하자 아쉬워하셨으나 다시 도전하여 결국 구멍에 넣는 데 성공하심."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"물병 뚜껑을 잘 활용하여 표현함."},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"박자를 맞추며 상체를 자연스럽게 움직임"},{"category":"인지","programs":["느림교실"],"status":"일반","text":"반복동작을 성실히 수행함."},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"반복되는 후렴구를 기억하여 자연스럽게 따라 부름."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"밝은 색을 선택하여 꽃을 예쁘게 꾸미심."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"일반","text":"별다른 특이반응 없이 차분하고 조용하게 프로그램에 몰입하심. 지정된 숫자의 색상에 맞춰 이질감 없이 조화롭게 그림을 완성한 후 편안하게 활동을 마무리하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"별모형을 만들어보는 과정에서 손가락 모양을 예쁘게 만들며 즐거워하심."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"보조 선생님 도움으로 완성시켜보심"},{"category":"인지","programs":["이야기여행"],"status":"일반","text":"보조 선생님 도움으로 참여를 해주심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"부채 접기 방법을 설명 후 따라하며 수행함."},{"category":"인지","programs":["이야기여행"],"status":"일반","text":"분리수거 개념은 명확히 알고 계시나 주사위 게임의 보드판 진행 방식을 어려워하셔, 요양보호사가 말을 함께 움직여주며 보조함."},{"category":"인지","programs":["이야기여행"],"status":"일반","text":"분리수거 지식을 재확인하며 일상생활 자립의지를 다지셨고, 게임 진행 시 규칙에 따라 정당하게 승부하려는 인지적 유연성을 보임."},{"category":"인지","programs":["이야기여행"],"status":"일반","text":"분리수거 퀴즈 시 플라스틱과 종이를 정확하게 분류하며 높은 판단력을 보이셨고, 주사위를 힘차게 던져 팔관절운동에 적극적으로 임하심."},{"category":"인지","programs":["이야기여행"],"status":"일반","text":"분리수거라는 개념 자체를 낯설어하셨으나, \"먹고 남은 캔은 어디 버릴까요?\"라며 1:1로 질문하자 통에 바르게 넣으며 판단력을 유지함."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"붙이기 활동을 정확하게 수행하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"붙이는 위치를 스스로 결정하며 참여하심."},{"category":"인지","programs":["신나는 빙고게임"],"status":"일반","text":"빙고게임 규칙을 이해하고 순서에 맞게 활동을 수행하심."},{"category":"인지","programs":["신나는 빙고게임"],"status":"일반","text":"빙고게임 중 본인의 판에 있는 단어가 불려도 인지하지 못하는 경우가 많아, 요양보호사가 옆에서 해당 단어를 함께 찾아 칩을 올려놓을 수 있도록 개별보조함."},{"category":"인지","programs":["신나는 빙고게임"],"status":"일반","text":"빙고판에 동그라미를 치며 우리 자식들 다가오는 추석에도 건강하게 해달라고 혼잣말로 가족을 향한 안녕을 기원하심."},{"category":"인지","programs":["이야기여행"],"status":"일반","text":"뿅뿅이를 던질 때 팔을 크게 뻗으며 상체 스트레칭과 신체 잔존기능 유지에 도움을 얻으심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"상지 근력이 다소 약하여 도르래 줄을 당기기 힘들어하셨으나 교사의 신체 보조를 통해 안전하게 수행하심."},{"category":"인지","programs":["이야기여행"],"status":"일반","text":"상지근력이 약해 대형 주사위를 들기 힘들어하셔, 가볍고 잡기 편한 작은 주사위로 교체해드려 손목관절운동을 수행하심."},{"category":"인지","programs":["소망노래방","소망노래자랑"],"status":"일반","text":"상체를 좌우로 흔들며 리듬을 표현하심."},{"category":"인지","programs":["이야기여행"],"status":"일반","text":"상호작용하며 참여하심."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"색 선택에 관심을 보임."},{"category":"인지","programs":["색칠활동(목장 그림)"],"status":"일반","text":"색깔 매칭을 어려워하셨으나, 요양보호사의 시범을 보고 따라하며 완성하심."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"색깔을 구분하며 참여함."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"일반","text":"색깔칩의 색상과 색연필의 색상을 대조해가며 신중하게 활동에 참여하심. 눈과 손의 협응력을 높이는 데 좋은 자극이 되었으며 시종일관 진지하셨음."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"색상 매칭 규칙을 완벽히 이해하고 옆자리 동료 어르신이 헷갈려 할 때 조용히 도와주며 배려하심."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"일반","text":"색상을 스스로 선택하는 데 인지적 어려움이 있어 요양보호가 색연필을 추천해드림. 손에 쥐어드린 색연필로 산모양을 꼼꼼하게 칠하셨고, 활동 후 정서적 안정감을 보이심."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"일반","text":"색상을 인지하고 색연필을 집기까지 다소 시간이 걸리는 모습(동작완만)을 보이셨으나, 요양보호사의 재촉 없는 지지 속에서 차분하게 한 칸씩 채워나가며 프로그램 시간 내에 과제를 완수하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"색연필을 사용하여 세밀하게 채색하심."},{"category":"인지","programs":["색칠활동(목장 그림)"],"status":"일반","text":"색연필을 쥐는 힘(악력)이 좋아 선 밖으로 삐져나가지 않도록 아주 선명하고 깔끔하게 칠하심."},{"category":"인지","programs":["프로그램 그룹 5,6등급"],"status":"일반","text":"색조합에 어려움을 보여 직원이 제안하자 수용하며 차분히 활동 이어가심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"색종이 색상을 스스로 선택하며 만족감을 표현함."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"색종이 자르기 과정에서 집중력을 발휘함."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"색종이를 자를 때 안전하게 가위를 사용함."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"색종이를 정성스럽게 붙이며 꼼꼼함을 보임"},{"category":"인지","programs":["맞춤형 자율인지학습(색칠하기)"],"status":"일반","text":"색칠 도안에 맞게 다양한 색을 사용하여 색칠하심"},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"색칠 범위를 벗어나지 않으려 노력하는 모습이 관찰됨."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"일반","text":"색칠도안을 관심 있게 살펴본 후 스스로 색을 선택하여 활동에 참여함."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"일반","text":"색칠도안의 빈공간을 찾아가며 꼼꼼하게 색칠하려는 모습을 보임."},{"category":"인지","programs":["맞춤형 자율인지학습(색칠하기)"],"status":"일반","text":"색칠하시고 잘했는지 걱정을 하시면서 선생님에게 확인을 받고 싶어하심"},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"색칠활동에 집중하며 꼼꼼하게 참여하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"색칠활동에 집중하며 원하는 색을 선택함."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"일반","text":"선 밖으로 색이 나가지 않도록 고도의 집중력을 발휘하여 매우 꼼꼼하게 색칠하심. 시간이 조금 오래 걸리더라도 빈틈없이 칸을 채우려 노력하셨으며, 완성된 도안을 보며 정말 예쁘게 잘됐다며 만족스러운 미소를 보이심."},{"category":"인지","programs":["소망노래자랑"],"status":"일반","text":"선곡은 따로 하지 않으셨으나 어르신들의 노래에 맞추어 흥겹게 탬버린을 멋지게 흔들어 주셨음."},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"선곡은 하시지 않았지만 아시는 노래 흥얼거리심"},{"category":"인지","programs":["소망노래자랑"],"status":"일반","text":"선곡은 하지 않으셨으나 어르신들의 노래에 맞추어 마라카스를 흔들어 주셨음."},{"category":"인지","programs":["소망노래자랑"],"status":"일반","text":"선곡은 하지 않으셨으나 어르신들의 노래에 맞추어 춤을 추셨음."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"설명을 이해하고 수행함."},{"category":"인지","programs":["인지재활(설압자퍼즐&글자맞추기)"],"status":"일반","text":"설압자는 화면을 보시면서 잘 나열하셨으나 그림을 찾아 글자 맞추실 때에는 옆에서 도와드려야 했음."},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"섬마을 선생님을 가사를 정확하게 구사하셨지만 박자가 다소 틀리심"},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"소근육 기능이 다소 지체되어 마개 돌리는 속도는 느렸으나 집중력을 발휘하여 3개 이상 스스로 결합하심."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"소근육 사용이 원활하게 이루어짐."},{"category":"인지","programs":["색칠활동(목장 그림)"],"status":"일반","text":"소근육 저하로 손 떨림이 있었으나, 포기하지 않고 끝까지 집 모양을 완성하려 노력하심."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"손 기능 향상에 도움이 되는 모습을 보임."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"손가락 관절염으로 세밀한 작업이 힘드셨음에도, 천천히 한 땀 한 땀 노력하여 당근모형을 완성하심."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"손가락 관절염으로 종이테이프 감기를 조금 힘들어하셨으나, 천천히 진행하도록 격려하자 끝까지 완성하심."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"손가락 소근육 조절이 서툴러 별모양 꼭지 붙이기를 어려워하셨으나, 언어적 지지와 가벼운 신체보조를 통해 성취감을 느낄 수 있도록 도움."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"손가락 운동이 조금 힘드신 듯 조용히 한참을 만지작거리다가 끝내 마개 하나를 스스로 잠그고 안도하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"손가락 협응이 다소 느렸으나 끝까지 완성함."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"손가락을 이용해 집중하여 활동함."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"손과 눈의 협응력이 필요한 작업을 잘 수행하심"},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"손끝을 이용하여 꼼꼼하게 꽃잎을 만드심."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"일반","text":"손동작이 민첩하셔서 밀짚모자와 선글라스를 빠른 속도로 채색하심. 완성 후 본인의 작품을 번쩍 들어올리며 나들이 갈 준비 다 됐다고 유머러스하게 말씀하심."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"일반","text":"손동작이 조금 느리셨지만 스스로 끝까지 해내려는 의지를 보이셨으며, 주변 어르신의 작품도 함께 칭찬해주심."},{"category":"인지","programs":["신나는 빙고게임"],"status":"일반","text":"손떨림 증상으로 인해 자음·모음 글자조각을 원하는 위치에 붙이는 데 어려움을 보이심. 교사가 손을 가볍게 지지해주자 안정을 찾고 빙고판 작성을 무사히 마무리하심."},{"category":"인지","programs":["이야기여행"],"status":"일반","text":"손떨림 증상이 있었으나 뿅뿅이를 손가락으로 꾹 쥐며 힘을 조절하려는 노력을 보이심."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"손떨림으로 인해 가위질을 다소 어려워하셨으나, 대안으로 도안을 천천히 찢어서 붙이도록 유도하여 완성하심."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"손악력이 약해 가위질 시 밀착보조를 해드렸으며, 풀을 바르고 손바닥으로 꾹꾹 눌러 붙이는 활동에 집중하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"손의 미세근육을 활용하여 꼼꼼하게 색칠함."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"손의 미세운동 능력 향상에 도움이 되는 모습을 보임."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"손의 소근육을 사용하여 세심하게 작업하심."},{"category":"인지","programs":["이야기여행"],"status":"일반","text":"손의 악력이 약해 뿅뿅이를 자주 떨어뜨리셨으나 격려를 받으며 끝까지 과녁을 향해 던지심."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"손의 협응력이 향상되는 모습을 보임."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"손의 힘 조절이 다소 미흡했으나 노력하는 모습이 관찰됨"},{"category":"인지","programs":["느림교실"],"status":"일반","text":"손의 힘을 조절하며 참여함."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"순서(휴지 뭉치기 다음 습자지 붙이기)를 잠시 혼동하셨으나, 구두 지시를 통해 인지하고 별모양 꼭지까지 스스로 잘 찾아 붙임."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"일반","text":"숫자에 지정된 색상을 확인한 후 색연필을 스스로 골라 사용하심. 선 밖으로 색이 나가지 않도록 고개를 숙이고 높은 집중력을 보이며 끝까지 완성하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"스스로 문제를 해결하려는 모습을 보임."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"스스로 순서에 맞춰 만들기는 어려웠으나, 교사가 휴지를 뭉쳐주면 그 위에 습자지를 손으로 꾹꾹 눌러 붙이는 감각적 참여를 유도함."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"습자지가 얇아 손에 달라붙자 다소 당황하셨으나, 교사의 격려를 받으며 천천히 끝까지 참여하여 줄기까지 무사히 연결함."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"일반","text":"시공간지각이 저하되어 도안의 경계선을 인지하지 못하고 한 곳에만 계속 덧칠하는 모습을 보이심. 요양보호사가 손을 가볍게 포개어 잡고 선을 따라 함께 움직이며 넓은 면적을 채우도록 도왔으며, 어르신은 자신이 좋아하는 노란색이 채워지는 과정을 보며 밝은 미소로 호응하심."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"일반","text":"시력이 많이 저하되어 도안의 흐릿한 경계선을 인지하는 데 어려움이 있으셨음. 요양보호사가 진한 색연필로 테두리를 다시 선명하게 그려드리자, 그림을 인지하고 안정을 찾으시며 천천히 색을 채워넣으심."},{"category":"인지","programs":["이야기여행"],"status":"일반","text":"시력이 저하되어 과녁이 잘 안 보이셨으나 선생님의 유도로 호랑이 방향을 향해 뿅뿅이를 잘 던지심."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"시력이 저하되어 풀칠할 위치를 잘 찾지 못하셨으나, 강사가 위치를 짚어주자 손끝감각을 이용하여 습자지와 꼭지를 정확히 부착함."},{"category":"인지","programs":["신나는 빙고게임"],"status":"일반","text":"시력저하로 빙고판의 글씨를 잘 보지 못하셨으나, 요양보호사가 글자를 짚어주자 천천히 동그라미를 그리며 끝까지 참여하심."},{"category":"인지","programs":["신나는 빙고게임"],"status":"일반","text":"시력저하로 인해 글자조각의 경계선이 잘 보이지 않는다고 호소하심. 확대된 도안을 제공하고 가위질선을 다시 짚어드리자 무리없이 빙고판을 완성하심."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"일반","text":"시력저하로 인해 색연필의 색상을 명확히 구별하는 데 어려움을 보이심. 요양보호사가 옆에서 어르신, 이건 어르신이 좋아하시는 진한 초록색이에요 하고 색상을 하나씩 구두로 안내하며 어르신이 원하는 색을 고르실 수 있도록 보조함. 이후 어르신은 편안한 마음으로 목장의 풀밭을 자연스럽게 채색하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"시력저하로 자동차 너트판 구멍을 찾기 힘들어하셨으나 손끝 감각을 이용하여 조심스럽게 돌려 끼우심."},{"category":"인지","programs":["노래교실"],"status":"일반","text":"신나는 음악에 맞춰 춤을 추시나 다소 산만하게 이동을 하시면서 활동에 참여하심"},{"category":"인지","programs":["이야기여행"],"status":"일반","text":"신체 기력이 저하되어 던지기 횟수를 조절해드렸고, 옛 물건 회상 대화에 더 집중하여 참여하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"신체 피로감을 자주 느끼시는 편이나 음악과 결합한 레크레이션 덕분인지 지루해하지 않고 자리를 지키심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"신체 활동보다는 관람을 선호하셨으나, 깨뚱이 강사가 다가가 소고를 전하자 가볍게 3~4번 두드리며 미소로 반응하심."},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"신체를 좌우로 움직이며 리듬을 탐."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"일반","text":"아이가 알려주는 간단한 트로트 율동 동작을 주의깊게 관찰한 후, 느린 속도이지만 스스로 양손을 흔들며 따라하려고 노력하심."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"일반","text":"아이의 모습을 보며 꼭 우리 손주 어릴 때 같다고 말씀하시는 등 장기기억을 자극하는 과거회상 반응을 보이며 정서적 위안을 얻으심."},{"category":"인지","programs":["노래교실"],"status":"일반","text":"악기 사용 시 리듬을 스스로 조절하려는 모습이 관찰됨"},{"category":"인지","programs":["느림교실"],"status":"일반","text":"악력이 약해 휴지가 자꾸 풀어지려 하자, 교사가 실로 한 번 고정해드린 후 습자지 붙이기와 줄기 연결은 스스로 수행할 수 있도록 유도함."},{"category":"인지","programs":["이야기여행"],"status":"일반","text":"앉은 자세에서 균형을 잘 잡으며 과녁을 향해 뿅뿅이를 안정적으로 투척하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"양손으로 줄을 잡고 도르래의 균형을 맞추기 위해 눈을 떼지 못하며 고도의 집중력을 발휘하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"어깨 움직임이 불편하여 가슴 높이에서 가볍게 캐스터네츠를 흔드는 방식으로 신체 부담 없이 참여하심."},{"category":"인지","programs":["이야기여행"],"status":"일반","text":"어깨 통증으로 힘들어하셨으나 가벼운 뿅뿅이를 가슴 높이로 부드럽게 던지며 신체 활동을 마침."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"일반","text":"어떤 색을 칠할지 고르는 데 시간이 걸리셨으나, 친숙한 색 위주로 매칭해드리자 흥미를 갖고 채색하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"어려운 부분은 도움을 요청하며 참여하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"어지러움증 증상으로 과도한 움직임은 제한하되, 자리에 앉아 차분하게 볼트 끼우기 놀이를 수행하심."},{"category":"인지","programs":["이야기여행"],"status":"일반","text":"언어적 지시에 따라 뿅뿅이를 하나씩 쥐고 던지며 눈과 손의 협응력을 유지함."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"일반","text":"여러 가지 색상으로 들과 산을 꼼꼼하게 칠해보심."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"여러 단계의 제작순서를 기억하기 어려워하셔서, 솜넣기, 실묶기 등 각 공정마다 1:1로 시범을 보이며 안내해드리니 거부감 없이 천천히 따라하심."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"옆 어르신의 작품을 흘깃 보며 모방하여 만들기 시작했으나, 이내 본인만의 속도를 찾아 주황색 토마토를 예쁘게 완성함."},{"category":"인지","programs":["소망노래자랑"],"status":"일반","text":"옆에 어르신과 내 나이가 어때서를 불러 주셨음."},{"category":"인지","programs":["인지재활(빙고게임)"],"status":"일반","text":"옆에서 가위질은 조금 도와드려야 했으나 전반적으로 혼자 스스로 활동에 잘 참여하셨음."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"옆자리 동료 어르신이 도안 오리기를 어려워하자 본인이 직접 가위질을 도와주며 유대감을 형성함."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"일반","text":"옆자리 어르신이 색연필을 고르는 것을 도와주며 다정한 상호작용을 나누심. 들판과 하늘의 경계를 명확히 인지하고 안정적인 구도로 채색을 마치심."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"옆자리 어르신이 습자지 붙이기를 어려워하자 풀칠을 도와주며 동료 어르신과 긍정적인 상호작용을 나누고 다정하게 대화를 이어감."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"옆자리 어르신이 털실 감는 것을 어려워하자 직접 도와주시는 등 협동적인 모습을 보여주심."},{"category":"인지","programs":["색칠활동(목장 그림)"],"status":"일반","text":"옆자리의 동료 어르신이 색깔을 헷갈려 하자 여기 적힌 대로 칠해야지라며 다정하게 알려주심."},{"category":"인지","programs":["이야기여행"],"status":"일반","text":"옛 물건 회상을 통해 심리적 안정을 찾고 동료들과 자연스럽게 대화를 나눔."},{"category":"인지","programs":["신나는 빙고게임"],"status":"일반","text":"옛날 설날에는 자식들 한복 입히느라 밤을 새웠다며 과거 명절의 기억을 생생하게 회상하고 눈시울을 붉히심."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"옛날에 텃밭에서 당근이랑 무를 참 많이 키웠다며 가위질하는 동안 과거 농사짓던 추억을 회상하심."},{"category":"인지","programs":["이야기여행"],"status":"일반","text":"오누이 이야기를 들으며 동료 어르신들과 옛 물건의 쓰임새에 대해 또렷하게 언어 표현을 하심."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"오늘 컨디션이 다소 저조하여 솜넣기 위주로 참여 유도 후, 마무리는 교사의 도움을 받아 호박을 완성함."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"오랜 시간 앉아 계시기 힘들어하셨으나, 중간중간 스트레칭을 유도하며 편안한 분위기를 조성하자 끝까지 자리에 앉아 토마토를 완성함."},{"category":"인지","programs":["이야기여행"],"status":"일반","text":"오랜만의 신체 활동에 다소 지쳐하셔서 중간중간 휴식을 취하며 정서적 위안을 드림."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"오리기 활동시 안전하게 가위를 사용함."},{"category":"인지","programs":["맞춤형 자율 인지학습(한글쓰기)"],"status":"일반","text":"오전에 병원진료로 인지학습 미참여하시어 개별로 맞춤형 인지학습 제공함(한글쓰기를 하시면서 조금 헷갈린 부분은 옆에서 도와드려야 했음)"},{"category":"인지","programs":["노래교실"],"status":"일반","text":"완곡이 어려운 경우에도 후렴구는 비교적 잘 참여하심"},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"완성된 꽃의 모양을 보며 만족감을 나타내심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"완성된 샘플작품을 보고 기대감을 표현함."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"완성된 해바라기를 보며 \"진짜 꽃 같다\"고 말씀하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"요양보호사 보조를 통해서 골인을 시켜주심"},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"일반","text":"요양보호사가 다른 종이에 먼저 색칠하는 시범을 보여주며 자극을 주자, 이내 행동을 모방하여 본인이 선호하는 초록색 색연필로 목장 잔디밭을 천천히 칠하기 시작하심."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"일반","text":"요양보호사가 어르신이 좋아하는 예쁜 색으로 목장을 꾸며서 가족들에게 자랑하자며 부드럽게 다독이고 주의를 환기해드렸으며, 이후 안정을 찾고 좋아하는 색들을 골라 다채롭게 화면을 채우심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"우산모양을 보며 비 오는 날의 추억을 이야기함."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"우산을 입체적으로 접는 과정에 흥미를 보임."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"우산을 잡고 있는 인물 꾸미기에 집중함."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"원목 짝짝이를 크게 치지는 않으셨지만, 가슴 앞에 쥐고 노래 리듬에 맞춰 차분하게 연주하심."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"일반","text":"월드컵과 관련된 질문에 간단하게 대답하며 의사소통에 참여함."},{"category":"인지","programs":["노래교실"],"status":"일반","text":"음악 시작 시 몸을 앞으로 기울이며 참여 의지를 보이심"},{"category":"인지","programs":["소망노래자랑"],"status":"일반","text":"음악에 맞춰 고개를 끄덕이며 집중하심"},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"음악에 맞춰 상체움직임을 보이며 참여함."},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"음악에 맞춰 손동작을 자연스럽게 수행함."},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"음악을 들으며 정서적 안정과 편안함을 보임."},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"음악이 시작되자 몸을 좌우로 움직이며 리듬을 탐."},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"음악이 시작되자 집중하는 모습을 보임"},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"음정은 다소 부정확했으나 끝까지 참여함"},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"일반","text":"이건 어떻게 하는지 여쭤봐서 색깔을 정해드리고 색칠하는 데 도움을 드림."},{"category":"인지","programs":["이야기여행"],"status":"일반","text":"이름을 듣고 손을 들어 반응함."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"일반","text":"이미용 외출로 인한 조기 인지지원 프로그램 제공"},{"category":"인지","programs":["이야기여행"],"status":"일반","text":"이야기 속 떡광주리를 기억해내시고 과거 맛있는 음식을 먹었던 기억을 짧게 회상하심."},{"category":"인지","programs":["노래교실"],"status":"일반","text":"익숙하지 않은 가사는 반복해서 들려드리자 점차 따라 부르는 모습을 보이심."},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"익숙하지 않은 노래에는 조용히 경청하심"},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"익숙한 노래는 눈을 감고도 따라 부르시는 모습이 관찰됨"},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"익숙한 노래에 맞춰 박수를 치며 참여함."},{"category":"인지","programs":["노래교실"],"status":"일반","text":"익숙한 노래에 반응을 보이시며 노래를 따라 부르심"},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"익숙한 멜로디에 고개를 끄덕이며 반응함."},{"category":"인지","programs":["소망노래자랑"],"status":"일반","text":"익숙한 옛노래에서 감정적으로 몰입하는 모습 보이심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"인물의 옷이나 표정을 자유롭게 표현함."},{"category":"인지","programs":["이야기여행"],"status":"일반","text":"인지 자극을 통해 옛 물건의 쓰임새를 기억해내려 노력하셨고 언어 표현을 유도함."},{"category":"인지","programs":["이야기여행"],"status":"일반","text":"인지 저하로 이야기 집중 시간은 짧았으나 뿅뿅이를 손으로 쥐고 만지는 촉감 활동에 흥미를 보이심."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"인지저하로 풀칠할 위치를 헷갈려하셨으나, 풀 붙이는 곳을 짚어드리자 스스로 부착하며 완성해내심."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"일반","text":"인지적으로는 번호를 잘 알고 계시나, 손놀림이 유연하지 못하고 가벼운 손떨림이 있어 색연필을 쥐는 데 어려움을 보이심. 요양보호사가 손을 가볍게 지지해주자 심리적 안정감을 느끼며 끝까지 포기하지 않고 채색을 마무리하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"자른 조각을 잃어버리지 않도록 스스로 정리하는 모습이 보임"},{"category":"인지","programs":["소망노래자랑"],"status":"일반","text":"자세교정 안내시 바르게 앉으시려는 모습을 보이심."},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"자신 있게 마이크를 잡고 노래를 부르심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"자신만의 색조합으로 개성 있게 표현하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"자신의 모습을 인물에 반영하여 꾸미는 모습이 관찰됨."},{"category":"인지","programs":["이야기여행"],"status":"일반","text":"자신의 이름을 기억하여 대답함."},{"category":"인지","programs":["이야기여행"],"status":"일반","text":"자신의 이름을 또렷하게 말하며 참여함."},{"category":"인지","programs":["이야기여행"],"status":"일반","text":"자신의 차례를 기다리며 참여함."},{"category":"인지","programs":["신나는 빙고게임"],"status":"일반","text":"자음, 모음의 개념을 이해하기 힘들어하셨으나, 교사가 완성된 낱말샘플을 보여주며 똑같이 맞춰보세요라고 시각적 자극을 주자 지시에 따라 잘 매칭하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"작업 속도는 느렸으나 완성도 높게 마무리함."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"작은 부품을 붙이는 과정에서 세심한 주의력을 보임."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"작품 제작 과정에서도 도움 요청을 적절히 하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"작품을 꾸미며 자신의 개성을 표현함."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"작품을 소중히 다루며 애착을 보임."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"작품의 색 조화를 고려하며 배치함."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"장애물에 물건이 걸릴 뻔하자 아슬아슬하다며 긴장하셨고 구멍에 쏙 들어가자 만세를 부르심."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"일반","text":"장화와 우산 도안을 빨간색과 노란색 등 대비되는 밝은 색상으로 선택하여 선명하게 잘 표현하셨음."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"재료를 입에 넣으려는 구강기 증상이 살짝 관찰되어 밀착보호를 진행함. 대신 풍선과 솜을 만지는 촉각자극 위주로 안전하게 활동을 마침."},{"category":"인지","programs":["이야기여행"],"status":"일반","text":"전래동화의 결말을 기억하고 계셨으며 오누이가 해와 달이 된 장면에서 고개를 끄덕이심."},{"category":"인지","programs":["이야기여행"],"status":"일반","text":"전반적으로 원활하게 활동에 참여함."},{"category":"인지","programs":["이야기여행"],"status":"일반","text":"전반적인 프로그램 흐름은 잘 따라오셨으나 오래 앉아 계시는 것에 피로감을 느껴, 주사위를 던진 후 가벼운 스트레칭을 병행함."},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"젊은 시절 즐겨 부르던 노래라고 설명하심."},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"젊은 시절 즐겨 부르던 노래라며 추억을 이야기하심"},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"접기 과정에서 집중하는 모습을 보임."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"접기 순서를 기억하며 수행함."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"접은 색종이의 모양을 관찰하며 흥미를 보임."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"일반","text":"제공된 색연필을 사용하여 선 안을 색칠하려고 노력하는 모습을 보임."},{"category":"인지","programs":["인지재활(설압자퍼즐&글자맞추기)"],"status":"일반","text":"조금 헷갈리시는 부분은 옆에서 도와드려야 했으나 활동 전반적으로 잘 참여하셨음."},{"category":"인지","programs":["신나는 빙고게임"],"status":"일반","text":"조용하고 내성적인 성격으로 퀴즈정답을 크게 외치지는 못하셨으나, 본인의 빙고판을 미소 띤 얼굴로 꼼꼼히 채워나가며 조용히 몰입하는 모습을 보이심."},{"category":"인지","programs":["노래교실"],"status":"일반","text":"좋아하시는 노래가 나오면 먼저 선곡을 요청하시는 경향이 있음"},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"주변 분위기가 소란스러워도 흔들림 없이 본인의 너트판 과제에만 집중하며 차분한 태도를 유지하심."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"주변과 대화하며 참여함."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"주변의 도움 없이 일부 과정을 독립적으로 수행하심."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"주의집중 시간이 짧아 중간에 가위를 내려놓으셨으나, 말벗을 통해 격려해드리자 다시 가위를 잡고 완수하심."},{"category":"인지","programs":["신나는 빙고게임"],"status":"일반","text":"주제와 달리 사과, 시계 등 두글자 단어를 계속 말씀하심. 한글자만 적어야 함을 친절히 재안내하고, 프로그램실에 있는 책, 문을 직접 가리키며 한글자 사물을 인지하도록 도옴."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"줄을 잡는 손아귀 힘이 좋으셨으며 도르래를 천천히 안정적으로 조절하여 장애물을 가뿐히 통과하심."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"지속적인 격려로 활동을 마무리함."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"지속적인 격려에 긍정적으로 반응함."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"일반","text":"지시사항을 한 번에 이해하시고 막힘없이 색칠을 진행하심. 손아귀 힘이 좋아 진하고 선명하게 채색을 마무리하셨으며 인지상태 매우 안정적임."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"지시순서를 정확히 인지하고 계셨으며, 강사의 보조 없이 1번부터 마지막 단계까지 독자적으로 수행하심."},{"category":"인지","programs":["색칠활동(목장 그림)"],"status":"일반","text":"지정된 색깔 카드를 보며 이 색이 맞나 하고 꼼꼼하게 확인하며 신중하게 색칠하심."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"직원과 상호작용하며 참여함."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"직원의 도움으로 완성함."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"일반","text":"진행자와 함께 축구이야기를 나누며 과거 응원경험을 회상함."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"일반","text":"진행자의 도움을 받아 색이름을 말하며 색칠활동에 참여함."},{"category":"인지","programs":["노래교실"],"status":"일반","text":"집중 시간이 길어질수록 음정이 안정되는 경향이 있음"},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"집중 시간이 평소보다 길게 유지됨."},{"category":"인지","programs":["신나는 빙고게임"],"status":"일반","text":"집중력을 유지하며 빙고판을 완성하는 모습을 보이심."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"집중력을 유지하며 활동함."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"집중력이 향상된 모습을 보임."},{"category":"인지","programs":["노래교실"],"status":"일반","text":"집중하여 노래를 듣고 흥얼거리는 과정에서 인지자극 효과가 관찰됨."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"짝짝이 리듬치기는 규칙적으로 따라하기 힘들어하셨으나 음악에 맞춰 몸을 흔들며 정서적 안정을 보이심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"차분하게 자리에 앉아 O,X퀴즈도 잘 푸시고 화면을 보시면서 과일이나 사물을 찾아 색칠을 꼼꼼하게 잘 하셨음."},{"category":"인지","programs":["소망노래자랑"],"status":"일반","text":"차분하게 자리에 앉아 옆에 있는 어르신과 찔레꽃을 멋지게 불러 주셨음."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"차분한 모습으로 참여함."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"일반","text":"채색 도중 중간중간 옆자리 어르신의 작품을 모방하며 색을 고르시는 모습을 보임. 동료 어르신과 시원해보인다며 담소를 나누는 등 정서적 교류가 활발했음."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"일반","text":"처음에는 번호에 맞는 색상을 찾는 데 다소 혼란스러워하셨으나, 요양보호사가 옆에서 색상표를 짚어주며 격려하자 규칙을 이해하고 끝까지 집중하심. 스스로 색을 찾아 칠하는 과정에서 뇌자극과 인지훈련에 긍정적인 도움이 됨."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"처음에는 어려워했으나 점차 적응함."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"처음에는 휴지를 구기는 방법을 몰라 망설였으나, 교사의 시범을 보고 이내 따라 하며 빨간색 습자지를 덮어 멋진 열매를 완성함."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"천천히 끝까지 활동에 참여함."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"철사를 다루는 과정을 조금 조심스러워하셨으나, 실로 묶고 고정하는 단계까지 스스로 집중하여 완수하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"체조시 어깨통증을 호소하셔서 가벼운 범위내에서 움직이도록 보조함."},{"category":"인지","programs":["색칠활동(목장 그림)"],"status":"일반","text":"초반에는 귀찮다며 참여를 소극적으로 시작했으나, 점차 채색에 집중하며 끝까지 완수하심."},{"category":"인지","programs":["인지재활(설압자퍼즐&글자맞추기)"],"status":"일반","text":"초반에는 누워 계셨다가 일어나시어 후반부터 활동에 참여하셨음."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"초반에는 만들기 활동에 소극적이었으나, 완성되어가는 당근 모양을 보며 흥미를 느껴 끝까지 몰입하심."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"일반","text":"최근 기분변화가 잦았으나, 자연을 주제로 한 도안을 색칠하면서 마음에 안정을 찾으심. 차분하게 집중하는 모습을 보이셨고 시각적·정서적 자극에 효과적이었음."},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"친숙한 노래를 통해 의사소통이 원활하게 이루어짐."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"큰 특이사항 없이 OX퀴즈도 잘 맞추시고 화면을 보시면서 도형을 찾아서 알맞게 색칠도 꼼꼼하게 잘 하셨음."},{"category":"인지","programs":["인지재활(빙고게임)"],"status":"일반","text":"큰 특이사항 없이 가위질도 잘 하시고 풀을 사용하여 빙고판에도 알맞게 잘 붙이셨음."},{"category":"인지","programs":["노래교실"],"status":"일반","text":"큰 특이사항 없이 어르신들의 노래에 맞추어 마라카스를 흥겹게 흔들어주셨음."},{"category":"인지","programs":["인지재활(설압자퍼즐&글자맞추기)"],"status":"일반","text":"큰 특이사항 없이 화면을 보시면서 설압자도 잘 나열하시고 그림 위에 글자도 정확하게 맞추셨음."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"큰 특이사항 없이 화면을 보시면서 숨은 글자도 잘 찾으시고 색칠도 꼼꼼하게 잘 하셨음."},{"category":"인지","programs":["인지재활(빙고게임)"],"status":"일반","text":"큰 특이사항 없이 활동에 적극적으로 잘 참여하셨으나 도안지를 오려 빙고판에 붙이실 때에는 옆에서 도와드려야 했음."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"클리너 도구조작에 약간 서투르셨으나 교사의 지지에 끝까지 별을 떼어내심."},{"category":"인지","programs":["신나는 빙고게임"],"status":"일반","text":"타 어르신들에 비해 진행속도가 느려 속상해하셨으나, \"천천히 하셔도 괜찮다\"는 지지와 격려를 받으신 후 편안한 마음으로 완수하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"탬버린 소리에 맞춰 아는 노래를 흥얼거리며 정서적 안정을 보이심."},{"category":"인지","programs":["소망노래자랑"],"status":"일반","text":"탬버린 소리에 맞춰 자연스럽게 신체를 움직이심"},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"탬버린 연주에 흥미를 보이며 끝까지 활동에 집중함"},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"탬버린을 사용하여 리듬 활동에 흥미를 보이심."},{"category":"인지","programs":["소망노래자랑"],"status":"일반","text":"탬버린을 사용하여 박자를 정확히 맞추심."},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"탬버린을 활용하여 리듬에 맞게 연주함."},{"category":"인지","programs":["소망노래자랑"],"status":"일반","text":"탬버린을 활용하여 박자에 맞춰 두드리는 모습을 보이심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"테이프클리너로 별을 떼어올때 조심스럽게 집중하는 모습을 보이심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"투명필름의 특성을 흥미롭게 관찰하심."},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"특정 노래를 듣고 눈시울을 붉히며 감정을 표현함."},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"특정 노래에 대해 반복적으로 언급하며 친숙함을 나타냄."},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"평소보다 의사표현이 증가하는 모습을 보이심."},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"표정변화는 다소 없으시고 박수를 치시면서 아시는 노래 따라 부르심"},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"표현은 적으셨으나 옆자리 동료 어르신이 짝짝이를 연주하는 모습을 흐뭇하게 바라보며 조용히 동참하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"풀 사용 방법을 기억하며 적절히 활용함."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"풀을 도안 전체에 꼼꼼히 바르는 과정에서 시지각기능과 상지 소근육 자극이 유기적으로 이루어짐."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"풀이 손에 묻자 처음에는 낯설어하셨으나 물티슈로 닦아드리며 안심시키자 끝까지 거부감 없이 참여함."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"풍선에 솜을 가득 채워 아주 통통하고 탐스러운 호박을 개성 있게 만들어내심."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"일반","text":"프로그램 도중 다른 대화로 주의가 환기되기도 했으나, 비 오는 날 풍경 이야기로 다시 유도하여 색칠을 마무리함."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"프로그램 도중 자리를 이탈하려 하셨으나 칼라볼트를 직접 골라보시게 유도하자 다시 앉아 집중하심."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"서두르지 않고 본인만의 속도로 정성껏 작품을 완성해내심."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"프로그램 명칭에 걸맞게 서두르지 않고 본인의 속도에 맞춰 차분하게 가위질과 풀칠을 완수하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"프로그램 시작 전에는 기력이 저하되어 보였으나 캐스터네츠 악기 소리를 들으며 차츰 활기를 되찾으심."},{"category":"인지","programs":["소망노래자랑"],"status":"일반","text":"프로그램 시작전 자리이동을 안내하자 자연스럽게 이동하여 착석하심"},{"category":"인지","programs":["느림교실"],"status":"일반","text":"프로그램 인지 및 수행능력이 저하되어 휴지를 입으로 가져가려는 행동을 보여 신속히 제지함. 강사의 전폭적인 도움(신체보조)으로 토마토 형태를 만들어 만져보게 함."},{"category":"인지","programs":["신나는 빙고게임"],"status":"일반","text":"프로그램 종료시까지 특별한 이상 없이 안정적으로 참여하심."},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"프로그램 참여에 대한 거부감 없이 협조적이심."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"일반","text":"프로그램 초기에는 색상 매칭 규칙을 혼동하여 무작위로 색칠하려 하심. 요양보호사가 옆에서 일대일로 시범을 보이고 규칙을 차근차근 설명해드리자 이내 이해하시고 끝까지 도안을 완성하심."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"일반","text":"프로그램이 끝난 후 아이가 퇴장할 때 손을 흔들며 아쉬워하셨고, 요양보호사에게 다음에 그 꼬마 또 언제 오냐고 물으실 정도로 깊은 인상을 받으심."},{"category":"인지","programs":["신나는 빙고게임"],"status":"일반","text":"프로그램이 진행되는 동안 언어적 인지저하로 단어연상이 어려워 주로 침묵을 지키셨으나, 동료 어르신들이 즐겁게 퀴즈를 맞추고 \"빙고\"를 외치는 모습을 보며 박수를 치는 등 정서적인 동참을 보이심. 글자매칭은 교사의 전적인 보조로 수행하심."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"일반","text":"하늘은 파란색, 풀은 초록색 등 실제 풍경의 색상과 매칭하여 인지유지능력을 보여주셨고, 자신이 좋아하는 색을 조화롭게 섞어 사용하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"햇빛에 비치는 색감을 보며 신기해하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"허리통증이 있으나 착석 상태에서 상지 소근육 활동 위주로 진행되어 무리없이 끝까지 참여하심."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"호박 농사를 짓던 기억을 회상하며 옆 어르신과 즐겁게 대화를 나누며 참여하심."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"호박 잎과 꼭지를 끼울 때 손에 힘을 주어 정교하게 작업하셨으며, 소근육 활용능력이 우수하셨음."},{"category":"인지","programs":["인지재활(설압자퍼즐&글자맞추기)"],"status":"일반","text":"화면을 보시면서 그림 위에 글자를 잘 맞추시고 설압자도 정확하게 나열 잘 하셨음."},{"category":"인지","programs":["이야기여행"],"status":"일반","text":"환경보호와 분리수거라는 유익한 주제에 깊이 공감하셨으며, 게임을 통해 상지근력을 자연스럽게 사용하는 기회를 가짐."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"활동 내내 바른 자세를 유지하려 노력함."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"활동 내내 안정적인 자세를 유지하심."},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"활동 내내 집중하는 모습을 보였음."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"활동 설명에 집중하며 경청함."},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"활동 시간 동안 집중력을 유지하심"},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"활동 시간 동안 집중력을 유지하심."},{"category":"인지","programs":["소망노래자랑"],"status":"일반","text":"활동 전에는 무관심한 모습이었으나 음악이 시작되자 관심을 보이심."},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"활동 종료 후에도 노래를 계속 흥얼거리시는 모습을 보이심"},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"활동 중 주의가 분산되었으나 음악 제시에 다시 집중함."},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"활동 중 지속적으로 흥얼거리며 높은 관심을 보이심."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"활동 중 집중력이 다소 분산되는 모습을 보였으나, \"어르신 토마토가 제일 예쁘다\"는 칭찬에 다시 흥미를 느끼고 끝까지 참여함."},{"category":"인지","programs":["이야기여행"],"status":"일반","text":"활동 중 집중력이 흐려져 주변을 두리번거리셨으나, 어르신의 이름을 부르며 주사위를 쥐어드리자 다시 게임 규칙에 집중하심."},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"활동 중 피로감 없이 끝까지 참여하심"},{"category":"인지","programs":["이야기여행"],"status":"일반","text":"활동에 거부감없이 참여함."},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"활동에 끝까지 참여하며 높은 관심을 보임."},{"category":"인지","programs":["느림교실"],"status":"일반","text":"활동에 대한 거부감 없이 참여함."},{"category":"인지","programs":["인지재활(빙고게임)"],"status":"일반","text":"활동에는 적극적으로 잘 참여하셨으나, 활동 전반적으로 옆에서 도움이 필요하였음."},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"활동중 다른 대상자와 함께 노래를 부름. 누이를 선곡하시고 소파를 붙잡고 일어서서 노래를 불러주시고 가볍게 리듬에 맞춰 몸을 흔들어주심"},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"활동중 집중력을 유지함."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"활동지와 재료를 받으시고 관심 있게 살펴보심."},{"category":"인지","programs":["노래교실"],"status":"일반","text":"흥이 겨워 앞에 나와 춤을 추셨으나 다른 어르신 가사를 보이시지 않아 한쪽에서 즐길 수 있도록 함"},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"\"꽃밭 같다\"며 만족감을 표현하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"\"예쁘다\", \"잘 만들었다\" 등의 긍정적인 표현을 함."},{"category":"인지","programs":["느림교실"],"status":"적극","text":"\"진짜 토마토 같다\"며 활동 내내 밝은 미소를 지으셨고, 완성된 작품을 본인의 사물함 위에 예쁘게 올려두며 높은 만족감과 성취감을 표하심."},{"category":"인지","programs":["신나는 빙고게임"],"status":"적극","text":"12월25일은 예수님 태어난 성탄절이라며 날짜와 의미를 정확히 매칭하고 주변 어르신들에게도 친절하게 알려주심."},{"category":"인지","programs":["신나는 빙고게임"],"status":"적극","text":"1월1일은 신정이고 음력1월1일은 설날이라며 두 명절의 차이점을 정확히 인지하고 빙고판을 주도적으로 채워나가심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"O,X퀴즈도 잘 맞추시고 활동지에 색칠도 꼼꼼하게 잘 하시면서 적극적으로 활동에 임하셨음."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"O,X퀴즈를 하실 때에는 옆에서 도와드려야 했으나 화면을 보시면서 그림을 찾아 색칠을 하실 때에는 적극적인 자세를 임하셨음."},{"category":"인지","programs":["노래교실"],"status":"적극","text":"“아는 노래”라고 표현하며 자신감을 보이심"},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"가느다란 고리 낚시대를 세밀하게 조절하는 과정에서 눈과 손의 협응력이 돋보였으며, 매우 진지하게 경기에 임하심."},{"category":"인지","programs":["소망노래방"],"status":"적극","text":"가사 내용을 떠올리며 적극적으로 발언함."},{"category":"인지","programs":["노래교실"],"status":"적극","text":"가사 일부를 기억하여 중간중간 정확히 따라 부르심"},{"category":"인지","programs":["소망노래자랑"],"status":"적극","text":"가사를 완전히 기억하지 못해도 후렴 부분을 따라 부르며 참여하심."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"적극","text":"가사를 잊어버려 다 따라 부르지는 못하셨으나, 아이의 손동작에 맞춰 발을 구르고 고개를 좌우로 흔들며 본인만의 방식으로 리듬을 타며 즐거워하심."},{"category":"인지","programs":["소망노래방"],"status":"적극","text":"가사맞추기 활동에 적극적으로 참여함."},{"category":"인지","programs":["소망노래방"],"status":"적극","text":"가사의 일부를 듣고 이어서 자연스럽게 노래를 부르심."},{"category":"인지","programs":["신나는 빙고게임"],"status":"적극","text":"가위질과 풀칠을 한 치의 오차도 없이 꼼꼼하게 수행하여 완성도 높은 빙고판을 만드심. 빙고게임 중 \"빙고!\"를 외치시며 성취감과 기쁨을 크게 표현하심."},{"category":"인지","programs":["인지재활(빙고게임)"],"status":"적극","text":"가위질도 잘 하시고, 그림과 숫자를 오려서 빙고판에 잘 붙이셨음. 빙고가 되서 사탕을 드리니 엄청 좋아해주셨음."},{"category":"인지","programs":["인지재활(빙고게임)"],"status":"적극","text":"가위질도 잘 하시고, 그림과 숫자를 오리신 것을 빙고판에 잘 붙이시면서 활동에 적극적으로 잘 참여하셨음."},{"category":"인지","programs":["신나는 빙고게임"],"status":"적극","text":"가위질에 서툰 모습을 보이셨으나 천천히 해보세요라는 요양보호의 격려에 포기하지 않고 끝까지 글자를 자르려 노력하심. 소근육 잔존기능 유지에 유익한 시간이었음."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"강사가 가까이 다가와 호응해주자 수줍어하시면서도 소고를 더 힘차게 두드리며 열정적으로 참여하심."},{"category":"인지","programs":["소망노래자랑"],"status":"적극","text":"강사님 지도하에 같이 노래도 따라 부르시고 점차 자신감을 얻고 큰 목소리로 노래를 불러주심"},{"category":"인지","programs":["소망노래자랑"],"status":"적극","text":"강사의 노래에 호응하며 웃음을 보이심"},{"category":"인지","programs":["느림교실"],"status":"적극","text":"강사의 설명에 집중하며 휴지를 동그랗게 뭉치고 습자지를 꼼꼼히 감싸 가장 먼저 토마토를 완성함. 완성 후 주변 어르신들을 도와주는 등 주도적인 모습을 보임."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"강사의 유머러스한 진행에 크게 호응하며 소고를 북처럼 둥둥 두드리는 등 본인만의 방식으로 흥을 표현하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"건강박수를 치며 손바닥이 빨개질 정도로 열심히 참여하시고 시원하다고 하심."},{"category":"인지","programs":["신나는 빙고게임"],"status":"적극","text":"게임이 진행되는 동안 단 한번도 한눈을 팔지 않고 빙고판에 시선을 고정한 채 높은 몰입도와 집중력을 유지하심."},{"category":"인지","programs":["소망노래방"],"status":"적극","text":"경청하시는 자세가 매우 좋으시고 노래하시는 어르신에게 시선을 계속 쳐다보심"},{"category":"인지","programs":["소망노래방"],"status":"적극","text":"경청하시는 자세가 매우 좋으시고 박수를 보내심"},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"고리 낚시 활동 시 손목의 미세 조절이 힘들어 물고기를 치우치게 건드렸으나, 주변 어르신들의 응원을 받으며 끝까지 완수함."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"고리 낚시대를 잡고 조심스럽게 조준하여 가장 큰 상어 모양 물고기를 낚아올린 후 월척이다라며 크게 기뻐하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"고리가 잘 걸리지 않자 처음에는 조급해하셨으나, 천천히 하라는 강사의 격려에 호흡을 가다듬고 결국 성공해내심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"곤충모양 페트병을 보며 예쁘다고 좋아하셨고, 색깔 마개를 하나씩 맞추며 환하게 웃으심."},{"category":"인지","programs":["느림교실"],"status":"적극","text":"공간인지력이 우수하여 당근의 앞면과 뒷면, 잎사귀 위치를 정확하게 매칭하여 완벽하게 조립하심."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"적극","text":"그림 속 가족들이 참 다정해 보인다고 말씀하시며 숫자인지 및 소근육 조절상태 양호하며 즐겁게 수행하심."},{"category":"인지","programs":["신나는 빙고게임"],"status":"적극","text":"그림을 보고 동물을 쉽게 구분하며 적극적으로 참여하심."},{"category":"인지","programs":["신나는 빙고게임"],"status":"적극","text":"글자를 읽으실 때마다 과거 서당에 다니던 일화를 언급하시며, 본인의 지식을 표현하는 것에 큰 자부심을 나타내심."},{"category":"인지","programs":["신나는 빙고게임"],"status":"적극","text":"글자조각을 자르고 풀로 붙이는 다단계활동의 순서를 명확히 기억하고 계시며, 타 어르신들보다 빠른 속도로 빙고판을 완성한 후 만족스러운 성취감을 표현하심."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"적극","text":"꼼꼼한 성격으로 수박 도안의 씨앗 하나까지 검은색으로 정성껏 색칠하심. 프로그램 시간 내에 가장 먼저 과제를 완수하셨으며 주변 어르신들에게 잘했다며 칭찬을 건네심."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"적극","text":"꼼꼼히 색칠해보시며 완수해주심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"꽃 만들기 활동에 관심을 보이며 적극 참여하심."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"적극","text":"꽃도안에 흔치 않은 검은색과 갈색을 칠하셨으나 틀렸다고 지적하지 않고 존중해드리자, \"우리 집 밭에 있는 흙색깔\"이라며 본인의 의도를 설명하심. 왜곡 없는 자기표현을 통해 자존감이 크게 고취됨."},{"category":"인지","programs":["소망노래방"],"status":"적극","text":"꽃마차를 선곡하시고 제일 마지막으로 노래 부르시고 싶다고 하여 순번을 맞춰드림"},{"category":"인지","programs":["프로그램 그룹 5,6등급"],"status":"적극","text":"꽃을 크게 만들어 중앙에 배치하는 등 자신만의 방식으로 창의적으로 표현하심."},{"category":"인지","programs":["프로그램 그룹 5,6등급"],"status":"적극","text":"꽃의 색을 직접 선택하며 \"이 색이 더 화사하다\"고 표현하는 등 높은 관심을 보이심."},{"category":"인지","programs":["이야기여행"],"status":"적극","text":"끝까지 집중하는 모습을 보임."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"나뭇가지에 색종이를 붙이며 즐거워함."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"적극","text":"나중에는 더 예쁜 꽃으로 준비해달라고 말씀하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"낚시 활동 중 바구니에 물고기가 쌓이자 옆 어르신에게 내가 더 많이 잡았다며 귀여운 자랑을 건네심."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"적극","text":"내가 한 거라고 자랑하셨음."},{"category":"인지","programs":["느림교실"],"status":"적극","text":"노란 털실의 색감이 예쁘다며 좋아하셨고, 시각적·촉각적으로 큰 자극을 받으며 즐겁게 동참하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"노란색이 예쁘다며 만족감을 표현하심"},{"category":"인지","programs":["소망노래자랑"],"status":"적극","text":"노래 선택 시 고민하는 모습을 보였으나 원하는 곡을 선택 후 만족해하심."},{"category":"인지","programs":["소망노래자랑"],"status":"적극","text":"노래 중간에 웃음을 보이며 즐거움을 표현하심."},{"category":"인지","programs":["소망노래방"],"status":"적극","text":"노래 한 곡을 끝까지 완창하며 만족감을 표현하심."},{"category":"인지","programs":["소망노래방"],"status":"적극","text":"노래가 끝난 후 \"재미있다\"고 말씀하심."},{"category":"인지","programs":["소망노래방"],"status":"적극","text":"노래가 끝난 후 만족감을 표현하심."},{"category":"인지","programs":["소망노래방"],"status":"적극","text":"노래가 끝난 후 만족감을 표현함."},{"category":"인지","programs":["소망노래자랑"],"status":"적극","text":"노래가 끝난 후 박수를 치며 즐거움을 표현하심"},{"category":"인지","programs":["소망노래방"],"status":"적극","text":"노래도 따라 부르시면서 어르신들의 노래에 맞추어 마라카스도 흥겹게 흔들어주셨  도시락 싸서 애들 데리고 놀러 가던 생각이 난다며 과거 추억을 즐겁게 회상하심. 숫자와 색깔을 정확하게 매칭하여 꼼꼼하게 채색함."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"적극","text":"소풍 그림을 보며 미소를 지으시는 등 정서적으로 편안한 모습을 보이심. 지정된 색깔에 맞춰 칸을 채우는 과정에서 소근육을 섬세하게 활용함."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"손가락 힘과 인지능력이 모두 좋아 볼트와 마개 돌리기 과제를 완벽하게 수행하고 흐뭇해하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"손과 눈의 협응력을 발휘하여 장애물 직전에서 도르래 방향을 꺾는 정교한 줄 조절 능력을 보여주심."},{"category":"인지","programs":["느림교실"],"status":"적극","text":"손재주가 좋아 휴지를 아주 단단하고 예쁜 공모양으로 뭉치셨으며, 노란색 토마토를 만들며 \"색깔이 참 곱다\"고 만족스러워함."},{"category":"인지","programs":["느림교실"],"status":"적극","text":"손재주가 좋으셔서 강사의 설명만 듣고도 털실을 팽팽하게 감아 호박의 울퉁불퉁한 모양을 아주 잘 표현하심."},{"category":"인지","programs":["소망노래자랑"],"status":"적극","text":"순서가 오자 자신감있게 앞으로 나오심."},{"category":"인지","programs":["이야기여행"],"status":"적극","text":"스티커 붙이기에 흥미를 보임."},{"category":"인지","programs":["이야기여행"],"status":"적극","text":"스티커를 붙이며 성취감을 표현함."},{"category":"인지","programs":["신나는 빙고게임"],"status":"적극","text":"승부욕이 강한 성향으로, 빙고판을 채울 때 어떤 단어를 배치해야 게임에 유리할지 나름의 전략을 세우며 집중하심. 게임진행 내내 높은 활력과 긍정적인 에너지를 보이심."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"적극","text":"시간을 잘 알고 계시며 도형맞추기에 어려움이 있어서 도움을 받고 수행을 하니 웃으면서 재밌다고 말씀하심."},{"category":"인지","programs":["소망노래방"],"status":"적극","text":"시계바늘을 선곡하시고 박자에 맞춰서 자신감있게 부르심"},{"category":"인지","programs":["이야기여행"],"status":"적극","text":"시력 저하로 과녁을 짚어드려야 했으나, 호랑이 목소리 흉내에 크게 웃으며 즐겁게 참여하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"시장 장수들의 골라골라 멘트를 그대로 기억해내어 외치시며 뛰어난 장기기억 회상 능력을 보이심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"신나는 음악이 나오자 어깨춤을 추며 소고를 머리 위로 들어올려 치는 등 적극적인 신체 표현을 보임."},{"category":"인지","programs":["소망노래방"],"status":"적극","text":"신청곡을 요청하며 적극적인 태도를 보이심."},{"category":"인지","programs":["소망노래자랑"],"status":"적극","text":"신청곡을 직접 말씀하시며 높은 관심을 보이심."},{"category":"인지","programs":["이야기여행"],"status":"적극","text":"신체활력이 우수하여 주사위를 던지는 신체활동에 큰 흥미를 보이셨고, 프로그램 종료 후 \"스트레스가 풀린다\"며 만족해하심."},{"category":"인지","programs":["소망노래방"],"status":"적극","text":"아시는 노래 따라 부르시면 즐겨하심"},{"category":"인지","programs":["소망노래방"],"status":"적극","text":"아시는 노래 따라 부르시면서 마라카스 흔들면서 호응해주심"},{"category":"인지","programs":["소망노래방"],"status":"적극","text":"아시는 노래 흥얼거리시면 탬버린을 흔들면서 호응해주심"},{"category":"인지","programs":["소망노래방"],"status":"적극","text":"아시는 노래는 따라하시면서 마라카스 흔들면서 호응해주심"},{"category":"인지","programs":["신나는 빙고게임"],"status":"적극","text":"아야어여 음절읽기활동에서 큰 목소리로 따라부르며 타 어르신들의 참여를 유도하심. 낱말맞추기 퀴즈에서 높은 인지력을 발휘하며 리더십을 보이심."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"적극","text":"아이에게 줄 과자가 있는지 주머니를 만지작거리시는 등 친근감과 모성애를 적극적으로 표출하시며 따뜻한 교감을 나누심."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"적극","text":"아이의 재롱에 기분이 매우 좋아지셨는지, 노래가 끝난 후 아이를 향해 두 팔로 하트를 만들어 보이시며 높은 정서적 만족감을 표현하심."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"적극","text":"알맞은 색연필을 손에 쥐어드리는 방식으로 개별보조를 제공하자, 지시에 따라 즐겁게 손을 움직이며 참여하심."},{"category":"인지","programs":["소망노래방"],"status":"적극","text":"애창곡 모정의 세월을 노래를 불러주시고 \"어머님\"을 그리워하면서 크게 외치심"},{"category":"인지","programs":["소망노래방"],"status":"적극","text":"애창곡 목포의 눈물을 노래를 불러주시고 무릎을 치시면서 호응해주심"},{"category":"인지","programs":["소망노래자랑"],"status":"적극","text":"애창곡 섬마을 선생님을 불러주시고 상체를 가볍게 리듬을 맞추심"},{"category":"인지","programs":["노래교실"],"status":"적극","text":"애창곡이 나오자 표정이 밝아지고 즐거움을 표현하심"},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"양손으로 원목 짝짝이를 경쾌하게 연주하심."},{"category":"인지","programs":["느림교실"],"status":"적극","text":"양손을 협응하여 철사와 테이프를 다루는 공정을 매끄럽게 수행하며 우수한 상지기능을 보여주심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"어려운 과정에서도 포기하지 않고 끝까지 참여함."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"옆 어르신과 작품을 비교하며 즐거워하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"옆 어르신이 별을 잘 떼어내도록 테이프클리너 방향을 잡아주며 협동심을 보이심."},{"category":"인지","programs":["인지재활(빙고게임)"],"status":"적극","text":"옆에 도움 없이 가위질도 잘 하시며, 그림과 숫자를 빙고판에 잘 붙이시면서 적극적으로 활동에 임하셨음."},{"category":"인지","programs":["프로그램 그룹 5,6등급"],"status":"적극","text":"옆에 어르신 작품도 도와주시면서 즐겁게 활동에 잘 참여하셨음."},{"category":"인지","programs":["프로그램 그룹 5,6등급"],"status":"적극","text":"옆에 어르신과 대화도 나누시면서 활동에 적극적으로 잘 참여하셨음."},{"category":"인지","programs":["프로그램 그룹 5,6등급"],"status":"적극","text":"옆에 어르신과 이야기도 나누시면서 즐겁게 활동에 잘 참여하셨음."},{"category":"인지","programs":["이야기여행"],"status":"적극","text":"옆자리 동료 어르신에게 속담힌트를 주며 시종일관 밝은 미소로 참여함."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"적극","text":"옆자리 어르신이 채색을 어려워하자 \"여기 먼저 칠해봐라\"며 다정하게 팁을 주시는 등 동료 어르신과의 긍정적인 상호작용이 돋보임."},{"category":"인지","programs":["이야기여행"],"status":"적극","text":"옛 기억을 소환하는 과정에서 자존감이 고취되어 적극적인 리액션을 보이심."},{"category":"인지","programs":["이야기여행"],"status":"적극","text":"옛 장터이야기에 크게 호응하며 젊은 시절 시장보던 추억을 즐겁게 회상함."},{"category":"인지","programs":["이야기여행"],"status":"적극","text":"옛날 떡광주리와 가마솥 등에 얽힌 추억을 유창하게 이야기하며 주도적으로 참여하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"옛날 시장 풍경이 떠오른다며 감상에 젖으셨고 캐스터네츠를 리듬감 있게 연주하며 즐거워하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"옛날 시장에서 물건을 고르던 추억을 동료 어르신과 나누며 정서적으로 매우 안정되고 밝은 모습을 보이심."},{"category":"인지","programs":["이야기여행"],"status":"적극","text":"옛날 장터이야기를 들으며 본인의 젊은 시절 시장보던 경험을 동료 어르신들에게 즐겁게 이야기하심. 장터 물건값 매기기 활동에서 물건의 가치를 정확히 비교하고 순서대로 1등부터 값을 매기며 우수한 판단력과 이해력을 보여주심."},{"category":"인지","programs":["이야기여행"],"status":"적극","text":"옛이야기는 잘 기억하지 못하셨으나 뿅뿅이를 던지며 환하게 웃으시는 등 정서적 만족감을 보이심."},{"category":"인지","programs":["이야기여행"],"status":"적극","text":"오누이 이야기를 들으며 \"가여워서 어쩌나\" 하고 감정이입을 하시며 정서적으로 깊이 몰입하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"오늘 날짜와 요일을 정확히 맞추시며 지남력활동에 명확한 답변을 하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"오랜만에 소고를 쳐본다며 과거 기억을 회상하셨고, 리듬에 맞춰 소고채를 다채롭게 흔들며 참여하심."},{"category":"인지","programs":["맞춤형 자율 인지학습(한글쓰기)"],"status":"적극","text":"오전에 병원진료로 인지학습 미참여하시어 개별로 맞춤형 인지학습 제공함(차분하게 자리에 앉아 한글쓰기에 집중을 하셨음)"},{"category":"인지","programs":["느림교실"],"status":"적극","text":"완성 작품에 만족감을 표현함."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"완성 작품을 보며 환하게 웃으심."},{"category":"인지","programs":["느림교실"],"status":"적극","text":"완성 후 다른 어르신들의 호박작품과 비교해보며 \"올해 호박 농사가 잘 되었다\"고 농담을 건네며 즐거워하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"완성 후 성취감을 표현함."},{"category":"인지","programs":["프로그램 그룹 5,6등급"],"status":"적극","text":"완성 후 작품을 한참 바라보며 성취감과 뿌듯함을 나타내심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"완성된 꽃을 바구니에 배치하며 즐거워하심."},{"category":"인지","programs":["느림교실"],"status":"적극","text":"완성된 당근을 손에 쥐고 \"토끼한테 주면 참 잘 먹겠다\"며 동심 가득한 표현과 함께 활짝 웃으심."},{"category":"인지","programs":["느림교실"],"status":"적극","text":"완성된 당근작품을 가슴에 안고 강사에게 자랑하시며 자존감과 성취감이 크게 고취된 모습을 보이심."},{"category":"인지","programs":["신나는 빙고게임"],"status":"적극","text":"완성된 빙고판을 들어보이며 오늘 머리를 많이 썼더니 치매가 도망가겠다며 활동에 대한 높은 만족감을 표하심."},{"category":"인지","programs":["프로그램 그룹 5,6등급"],"status":"적극","text":"완성된 작품을 보며 \"집에 가져가서 보여주고 싶다\"고 말씀하시며 만족감 표현하심."},{"category":"인지","programs":["색칠활동(목장 그림)"],"status":"적극","text":"완성된 작품을 보며 알록달록하니 참 예쁘다며 스스로의 결과물에 큰 만족감을 표현하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"완성된 작품을 보며 자신감을 보이심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"완성된 작품을 보며 환하게 웃음."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"적극","text":"완성된 작품을 보여주며 만족스러운 표정을 보임."},{"category":"인지","programs":["느림교실"],"status":"적극","text":"완성된 호박을 보며 진짜 호박 같다며 무척 신기해하셨고, 본인의 작품을 가슴에 안고 만족해하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"완성작품을 주변 어르신께 자랑하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"완성품을 집에 가져가 전시하고 싶다고 이야기함."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"완성한 후 본인이 한 것을 인지하고 교사에게 자랑하듯 보여주며 성취감을 표현하심."},{"category":"인지","programs":["이야기여행"],"status":"적극","text":"외출 후 분리수거의 필요성에 대해 \"지구가 깨끗해져야 한다\"며 환경적 판단능력을 표현하셨고, 게임룰을 준수하며 모범적으로 참여하심."},{"category":"인지","programs":["신나는 빙고게임"],"status":"적극","text":"요양보호사 도움으로 빙고판을 가위로 자르고 같이 붙이는 활동을 함으로써 웃어주심."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"적극","text":"요양보호사와 같이 색칠을 꼼꼼히 하신 후 완성해주심."},{"category":"인지","programs":["이야기여행"],"status":"적극","text":"우수한 눈과 손의 협응력을 보이며 던진 뿅뿅이를 모두 과녁 중심에 명중시키심."},{"category":"인지","programs":["소망노래자랑"],"status":"적극","text":"음악 활동 후 기분이 좋아졌다고 표현하시며 만족감을 보이심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"음악에 맞춰 발을 구르고 소고를 치며 전신을 활기차게 움직이셨고, 스트레스가 다 풀린다며 만족해하심."},{"category":"인지","programs":["소망노래자랑"],"status":"적극","text":"음악에 맞춰 어깨를 들썩이며 신체 움직임을 보이심."},{"category":"인지","programs":["소망노래자랑"],"status":"적극","text":"음악이 시작되자 긴장 이완화되고 편안한 표정을 보이심."},{"category":"인지","programs":["소망노래자랑"],"status":"적극","text":"음악이 시작되자 박수로 리듬을 맞추며 참여하심."},{"category":"인지","programs":["노래교실"],"status":"적극","text":"음악활동 후 기분이 좋아졌다고 표현하며 만족감을 나타내심."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"적극","text":"이 꽃은 정말 예쁘다며 진짜 같다며 말씀하심."},{"category":"인지","programs":["이야기여행"],"status":"적극","text":"이름을 맞히고 스티커를 붙이며 즐거워함."},{"category":"인지","programs":["이야기여행"],"status":"적극","text":"이름을 정확하게 말하며 자신감을 보임."},{"category":"인지","programs":["이야기여행"],"status":"적극","text":"이름을 확인하며 적극 반응함."},{"category":"인지","programs":["이야기여행"],"status":"적극","text":"이야기 감상과 신체 활동 모두에 높은 집중력을 보여 다른 어르신들의 참여를 독려하심."},{"category":"인지","programs":["이야기여행"],"status":"적극","text":"이야기 구연에 깊이 몰입하고 지필활동을 오차없이 신속하게 마무리하심."},{"category":"인지","programs":["이야기여행"],"status":"적극","text":"이야기에 집중하며 속담구절을 가장 먼저 완성하고 물건값도 정확히 매김."},{"category":"인지","programs":["소망노래방"],"status":"적극","text":"익숙한 가사를 따라 부르며 즐겁게 시간을 보내심."},{"category":"인지","programs":["소망노래자랑"],"status":"적극","text":"익숙한 노래가 나오자 즉시 따라 부르심"},{"category":"인지","programs":["소망노래방","소망노래자랑"],"status":"적극","text":"익숙한 노래가 나오자 즉시 따라 부르심."},{"category":"인지","programs":["소망노래방"],"status":"적극","text":"익숙한 노래에 미소를 지으며 참여함."},{"category":"인지","programs":["소망노래방"],"status":"적극","text":"익숙한 노래에서는 기억력이 향상된 모습을 보임."},{"category":"인지","programs":["소망노래방","소망노래자랑"],"status":"적극","text":"익숙한 노래에서는 처음부터 끝까지 부르심."},{"category":"인지","programs":["소망노래방"],"status":"적극","text":"익숙한 노래에서는 큰 목소리로 참여함"},{"category":"인지","programs":["소망노래방"],"status":"적극","text":"익숙한 옛노래에 즐거운 표정을 보이며 참여함."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"인사송을 부르며 옆 어르신과 손을 적극적으로 마주치고 밝게 미소 지으심."},{"category":"인지","programs":["신나는 빙고게임"],"status":"적극","text":"인지 및 시지각능력이 우수하여 글자조각을 자를 때 흐트러짐 없이 정교하게 가위질을 해내심. 빙고판 구성도 보기 좋게 배치하여 완성도 높은 작품을 만들어내심."},{"category":"인지","programs":["신나는 빙고게임"],"status":"적극","text":"인지능력이 매우 양호하여 교사의 최소한의 안내만으로도 자음·모음활동을 척척 수행하심. 글공부하는 기분이 들어 유익하다며 프로그램에 대한 높은 만족도와 애정을 표현하심."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"적극","text":"인지저하로 인해 도안의 경계선을 구분하여 칠하는 것은 서툴렀으나, 색연필을 쥐고 자유롭게 손목을 움직이며 선과 면을 채우는 행위 자체에 큰 흥미를 느끼고 끝까지 참여하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"입체구조가 완성되자 만족감을 표현함."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"적극","text":"자발적으로 다양한 색연필을 골라 사용하심. 최근 새로 리모델링된 프로그램실이 밝고 넓어져서 집중이 더 잘 된다며 긍정적인 반응을 보이심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"자신의 작품에 애착을 보이며 소중히 다룸."},{"category":"인지","programs":["신나는 빙고게임"],"status":"적극","text":"자음과 모음의 결합방식을 완벽히 이해하고 계시며, 동물·곤충이름 맞추기 퀴즈에서 오답 없이 연속으로 정답을 맞추는 등 매우 뛰어난 언어인지력과 기억력을 보여주심."},{"category":"인지","programs":["신나는 빙고게임"],"status":"적극","text":"자음과 모음의 결합원리를 정확히 이해하시고, 동물 및 곤충이름 퀴즈에서 가장 먼저 정답을 외치며 적극적으로 참여하심. 빙고게임 시에도 높은 집중력을 보이시며 즐거워하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"작은 물고기는 고리가 작아 잡기 어려웠음에도 끝까지 포기하지 않고 낚아채며 강한 집념을 보여주심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"작품 꾸미기에 창의적인 아이디어를 제시함."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"작품 완성 후 높은 만족감과 성취감을 표현하심"},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"작품 완성 후 만족스럽다는 반응을 보임."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"작품을 끝까지 완성하며 높은 참여 의지를 보이심"},{"category":"인지","programs":["느림교실"],"status":"적극","text":"작품을 완성한 후 성취감을 보임."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"작품을 완성한 후 여러 각도에서 감상함"},{"category":"인지", 게 회전하여 관절가동범위를 넓히려는 노력을 보이셨으며, 게임의 승패에 몰입하며 즐거워하심."},{"category":"인지","programs":["느림교실"],"status":"적극","text":"주황색 당근도안을 보며 \"색깔이 참 곱고 예쁘다\"고 표현하시는 등 시각적 자극에 긍정적인 반응을 보임."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"줄을 너무 세게 당겨 물건이 떨어질 뻔했으나 이내 힘을 조절하여 평정심을 찾고 미션에 성공하심."},{"category":"인지","programs":["소망노래방"],"status":"적극","text":"즐겨 부르시던 애창곡으로 흥겨워하심"},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"적극","text":"지시따르기가 어려워 처음에는 도안 전체를 한 가지 색(빨간색)으로만 칠하려 하심. \"가을산 같아요\"라고 지지해드리자, 들판은 다른 색으로 표현해보겠다며 스스로 갈색을 선택해 채색하심."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"적극","text":"지정된 번호와 색상을 정확히 매칭하여 스스로 알맞은 색연필을 선택해 색칠하심. 규칙을 완벽히 이해하고 집중하시는 모습을 보였으며, 도안 완성 후 주위 어르신들과 요양보호사에게 자랑하며 매우 흡족해하심"},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"적극","text":"지정된 색상이 없어 오답에 대한 불안감 없이 편안하게 색연필을 선택하심. 꽃도안에 보라색을 칠하시며 옛날에 입었던 고운 한복 저고리 색깔이라며 수줍게 웃으시고 과거를 회상하며 자연스러운 구어 표현을 보이심."},{"category":"인지","programs":["소망노래방"],"status":"적극","text":"직원의 격려에 호응하며 끝까지 참여하심"},{"category":"인지","programs":["프로그램 그룹 5,6등급"],"status":"적극","text":"직원의 도움 없이 스스로 색을 선택하여 창의적으로 표현하셨음. 다양한 색상을 활용하여 개성 있게 꾸미셨음."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"진짜 낚시터에 온 것 같다며 옛날에 낚시하러 다녔던 경험담을 동료 어르신들에게 즐겁게 이야기해주심."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"적극","text":"집 마당에 키우던 꽃들에 대해 이야기꽃을 피우심. 채색 활동을 매개로 장기기억을 자극하는 회상요법이 자연스럽게 이루어졌으며, 정서적으로 매우 안정된 모습을 보이심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"집중시간이 평소보다 길게 유지됨"},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"짝꿍 어르신과 호흡이 잘 맞아 도르래 속도를 부드럽게 조절하며 가장 먼저 목적지 구멍에 물건을 넣으심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"짝꿍 어르신이 줄을 당기는 타이밍에 맞춰 본인쪽 줄을 살짝 늦춰주는 등 훌륭한 협동심을 발휘하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"짝꿍과의 호흡이 맞지 않아 물건이 엇갈릴 때도 괜찮다며 서로 격려하고 양보하는 미덕을 보여주심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"차분하게 자리에 앉아 O,X퀴즈도 잘 맞추시고 화면을 보시면서 그림도 잘 찾아서 알맞게 색칠을 잘 하셨음."},{"category":"인지","programs":["인지재활(빙고게임)"],"status":"적극","text":"차분하게 자리에 앉아 가위질도 잘 하시고 그림과 숫자를 오리신 것을 빙고판에 잘 붙이시고 빙고가 되시어 사탕을 드리니 좋아해주셨음."},{"category":"인지","programs":["노래교실"],"status":"적극","text":"차분하게 자리에 앉아 어르신들의 노래에 맞추어 마라카스를 흥겹게 흔들어주셨음."},{"category":"인지","programs":["소망노래방"],"status":"적극","text":"차분하게 자리에 앉아 즐겁게 활동에 잘 참여하시고 노래도 잘 따라 부르시면서 흥겹게 활동에 잘 참여하셨음."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"차분하게 자리에 앉아 즐겁게 활동에 잘 참여하시고 활동이 즐거우셨는지 미소가 떠나지 않으셨음."},{"category":"인지","programs":["인지재활(설압자퍼즐&글자맞추기)"],"status":"적극","text":"차분하게 자리에 앉아 화면을 보시면서 그림 위에 글자를 잘 맞추시고 설압자도 잘 나열하셨음."},{"category":"인지","programs":["인지재활(설압자퍼즐&글자맞추기)"],"status":"적극","text":"차분하게 자리에 앉아 화면을 보시면서 설압자도 잘 나열하시고 즐겁게 활동에 잘 참여하셨음."},{"category":"인지","programs":["인지재활(빙고게임)"],"status":"적극","text":"차분하게 자리에 앉아 활동에 대해 설명을 잘 들으신 후, 직접 가위로 그림과 사진을 오려 정확한 빙고판에 붙이셨음."},{"category":"인지","programs":["소망노래방"],"status":"적극","text":"참여자들과 함께 웃으며 긍정적인 반응을 보임"},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"창가를 꾸미는 활동에 높은 만족감을 보이심."},{"category":"인지","programs":["노래교실"],"status":"적극","text":"처음 접하는 노래도 한 소절씩 따라 부르며 적극적으로 참여하심"},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"처음에는 도르래 조작을 어려워하셨으나 줄을 조금씩 당기며 요령을 터득한 후 끝까지 미션을 완수하심."},{"category":"인지","programs":["소망노래방"],"status":"적극","text":"처음에는 소극적이었으나 점차 적극적으로 참여함"},{"category":"인지","programs":["소망노래방"],"status":"적극","text":"처음에는 소극적이었으나 점차 적극적으로 참여함."},{"category":"인지","programs":["신나는 빙고게임"],"status":"적극","text":"처음에는 소극적인 모습을 보였으나 점차 적극적으로 참여하심."},{"category":"인지","programs":["프로그램 그룹 5,6등급"],"status":"적극","text":"처음에는 점토 사용을 어려워하셨으나 직원 도움 후 꽃모양을 완성하며 적극적으로 참여하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"체조동작중 손유희활동에 큰 흥미를 보이며 강사동작을 정확히 모방하심."},{"category":"인지","programs":["신나는 빙고게임"],"status":"적극","text":"초반에는 규칙 이해가 어려워 소극적이었으나, 요양보호사의 개별시범을 본 후 흥미를 느끼고 중반 이후부터 스스로 단어를 찾으심."},{"category":"인지","programs":["느림교실"],"status":"적극","text":"초반에는 만들기 활동에 소극적이었으나, 호박 모양이 갖춰지기 시작하자 적극적으로 태도가 바뀌심."},{"category":"인지","programs":["이야기여행"],"status":"적극","text":"초반에는 무기력해 보이셨으나 뿅뿅이 던지기 게임이 시작되자 활기를 띠며 적극적으로 참여하심."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"적극","text":"초반에는 무슨 색을 칠해야 하냐며 머뭇거리셨으나, 어르신이 좋아하는 색으로 마음껏 채워보세요라고 지지해드리자 이내 초록색과 노란색을 골라 대담하게 채색을 진행하심. 스스로 색을 결정하는 과정에서 주도성이 향상됨."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"초반에는 소극적이었으나 탬버린 소리에 흥미를 느끼고 점차 적극적으로 참여하심."},{"category":"인지","programs":["소망노래자랑"],"status":"적극","text":"친숙한 멜로디가 나오자 흥얼거리며 노래를 따라 부르심."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"적극","text":"친숙한 트로트 가사를 기억해내어 아이의 목소리에 맞춰 나지막이 따라 부르셨고, 노래가 끝날 때마다 가장 먼저 크게 손뼉을 치며 호응하심."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"적극","text":"칠하는 속도가 매우 빨라 가장 먼저 도안을 완성하심. 여백을 남기지 않고 빼곡하게 채우심"},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"캐스터네츠 소리에 맞추어 골라골라 외치며 프로그램 도입부부터 분위기를 활기차게 이끌어주심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"캐스터네츠를 양손으로 번갈아 연주하며 소근육 자극 운동에 적극적으로 참여하는 모습을 보이심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"캐스터네츠를 치며 부끄러워하셨으나 교사의 지지에 힘입어 큰 목소리로 시장 소리를 따라 하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"캐스터네츠를 치며 옛날 시장에서 골라골라 하던 소리를 우렁차게 흉내내시고 주변 어르신들에게 큰 웃음을 주심."},{"category":"인지","programs":["신나는 빙고게임"],"status":"적극","text":"퀴즈맞추기와 빙고판 작성 모두에서 주도적인 모습을 보이심. 주변의 인지저하 어르신이 단어조각을 찾지 못할 때 친절하게 알려주며 동료간 긍정적인 상호작용을 하심."},{"category":"인지","programs":["신나는 빙고게임"],"status":"적극","text":"퀴즈활동시 타 어르신들이 정답을 맞힐 수 있도록 힌트를 주거나, 단어조각을 찾기 힘들어하는 옆자리 어르신의 빙고판을 함께 봐주는 등 배려심 있고 협조적인 태도로 참여하심."},{"category":"인지","programs":["소망노래자랑"],"status":"적극","text":"큰 특이사항 없이 선곡은 하지 않으셨으나 어르신들의 노래에 맞추어 마라카스를 흥겹게 흔들어 주셨음."},{"category":"인지","programs":["인지재활(빙고게임)"],"status":"적극","text":"큰 특이사항 없이 앞에 어르신들과 담소도 나누시면서 즐겁게 활동에 잘 참여하셨음."},{"category":"인지","programs":["프로그램 그룹 5,6등급"],"status":"적극","text":"큰 특이사항 없이 옆에 어르신과 이야기를 나누시면서 즐겁게 활동에 잘 참여하셨음."},{"category":"인지","programs":["프로그램 그룹 5,6등급"],"status":"적극","text":"큰 특이사항 없이 장미꽃 도안지를 받아 집중력을 발휘하여 적극적으로 색칠에 임하셨음."},{"category":"인지","programs":["프로그램 그룹 5,6등급"],"status":"적극","text":"큰 특이사항 없이 집중력을 발휘하여 나비를 완성하시면서 내심 뿌듯해하셨음."},{"category":"인지","programs":["프로그램 그룹 5,6등급"],"status":"적극","text":"큰 특이사항 없이 환한 미소를 지으시면서 활동에 적극적으로 잘 참여하셨음."},{"category":"인지","programs":["프로그램 그룹 5,6등급"],"status":"적극","text":"클레이 점토를 손으로 주무르며 꽃잎을 만드는 과정에 집중하는 모습을 보였으며, 완성 후 \"예쁘게 잘 됐다\"며 만족스러운 반응을 보임."},{"category":"인지","programs":["노래교실","소망노래방"],"status":"적극","text":"탬버린 사용 시 소리를 크게 내며 즐거움을 표현하심"},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"탬버린을 머리위로 흔들며 활기찬 신체움직임을 보여주심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"탬버린을 박자에 맞춰 힘차게 흔들며 프로그램 분위기를 주도하심."},{"category":"인지","programs":["소망노래자랑"],"status":"적극","text":"탬버린을 이용하여 박자를 맞추며 즐겁게 활동하심."},{"category":"인지","programs":["소망노래방"],"status":"적극","text":"탬버린을 흔들며 리듬에 맞춰 활동에 참여하심."},{"category":"인지","programs":["느림교실"],"status":"적극","text":"털실로 울퉁불퉁한 굴곡을 만드는 아이디어가 재미있다며 활동 내내 호기심 가득한 표정으로 임하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"테이프클리너를 길게 뻗어 별모형을 한번에 정확하게 떼어내며 성취감을 보이심."},{"category":"인지","programs":["느림교실"],"status":"적극","text":"토마토 줄기를 쥐여주자 고개를 끄덕이셨고, 완성된 토마토를 보여드리자 환하게 웃으며 반응하심."},{"category":"인지","programs":["소망노래자랑"],"status":"적극","text":"평소 말수가 적으셨으나 노래 시간에는 적극적으로 발성하심"},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"적극","text":"평소 무표정하고 프로그램 참여에 소극적인 편이었으나, 아이가 눈을 맞추며 인사를 건네자 활짝 웃으시며 아이의 손을 꼭 잡아주심."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"적극","text":"평소 미술활동을 선호하시는 분으로, 파란색과 에메랄드색을 섞어 바다를 입체감 있게 표현하심. 시각적 표현력이 우수하며 프로그램 내내 높은 집중력을 유지하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"평소 소극적인 성향이나, 소고의 타격음과 신나는 음악 덕분에 활기를 찾고 강사의 율동을 열심히 따라 하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"평소 소극적인 편이나 옛날 시장 이야기가 나오자 본인의 추억을 먼저 말씀하시며 대화에 적극 참여하심."},{"category":"인지","programs":["신나는 빙고게임"],"status":"적극","text":"평소 소외감을 자주 느끼시는 성향이나, 오늘 빙고게임에서 먼저 한 줄을 완성하여 선물을 받으시자 매우 기뻐하시며 정서적으로 큰 활력을 얻으심."},{"category":"인지","programs":["신나는 빙고게임"],"status":"적극","text":"평소 언어적 인지능력이 우수하신 분으로, 자음과 모음을 조합하여 '나비', '호랑이' 등의 단어를 스스로 척척 만들어내시며 프로그램 전반에 걸쳐 높은 만족도를 표현하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"평소 조용한 성향이시나 신나는 음악이 나오자 짝짝이를 힘차게 치며 반전 매력을 보여주심."},{"category":"인지","programs":["이야기여행"],"status":"적극","text":"평소보다 목소리가 크고 밝으셨으며, 주사위를 던져 원하는 숫자가 나오자 만세를 부르는 등 정서적으로 매우 고양된 모습을 보임."},{"category":"인지","programs":["신나는 빙고게임"],"status":"적극","text":"평소보다 목소리에 활기가 넘치셨으며, 빙고 3줄을 먼저 완성하신 후 손을 번쩍 들고 환하게 웃으시며 성취감을 표현하심."},{"category":"인지","programs":["소망노래자랑"],"status":"적극","text":"평소보다 밝은 표정으로 활동에 참여하심"},{"category":"인지","programs":["소망노래방"],"status":"적극","text":"평소보다 큰 목소리로 노래를 부르며 자신감을 보이심."},{"category":"인지","programs":["소망노래방"],"status":"적극","text":"평소보다 큰 목소리로 노래를 부르며 자신감을 보임."},{"category":"인지","programs":["느림교실"],"status":"적극","text":"풀칠을 꼼꼼하게 하여 당근도안을 정성껏 조립하셨고, 완성 후 실제 당근 같다며 크게 만족해하심."},{"category":"인지","programs":["느림교실"],"status":"적극","text":"풀칠하는 것에 서툴러 습자지가 조금 찢어지기도 했으나 개의치 않고 대범하게 덧붙이며 본인만의 개성 있는 토마토를 완성함."},{"category":"인지","programs":["느림교실"],"status":"적극","text":"풍선에 솜을 넣는 촉감활동을 흥미로워하셨고, 차근차근 순서대로 따라 하시면 예쁜 호박을 완성하심."},{"category":"인지","programs":["느림교실"],"status":"적극","text":"풍선이 터질까 봐 처음에는 긴장하셨지만, 솜이 가득 차 통통해진 호박을 보며 환하게 웃으심."},{"category":"인지","programs":["신나는 빙고게임"],"status":"적극","text":"프로그램 내내 밝은 표정으로 즐겁게 활동에 참여하심."},{"category":"인지","programs":["소망노래방"],"status":"적극","text":"프로그램 내내 밝은 표정을 유지하심."},{"category":"인지","programs":["이야기여행"],"status":"적극","text":"프로그램 시작부터 끝까지 주도적으로 참여하며 인지활동에 강한 자신감을 보임."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"프로그램 시작전과 비교해 마칠때 표정이 눈에 띄게 밝아지심."},{"category":"인지","programs":["소망노래자랑"],"status":"적극","text":"프로그램 시작전보다 표정이 한층 밝아지심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"적극","text":"프로그램 전반에 적극적으로 참여하심."},{"category":"인지","programs":["신나는 빙고게임"],"status":"적극","text":"프로그램 전반에 적극적으로 참여하였으며 인지기능 및 사회성 향상에 도움이 되는 모 // ═══════════ 문장 선택 로직 ═══════════
function tokenize(s){
  return (s||'').split(/[^가-힣a-zA-Z0-9]+/).filter(function(t){ return t.length >= 2; });
}
// 중복 판정 키: 공백 차이만 있는 문장은 같은 문장으로 취급
function normKey(t){ return (t||'').replace(/\s+/g, ''); }
// 한 문장이 다른 문장을 통째로 포함하거나(부분 변형) 글자 구성이 거의 같은 문장은 중복으로 판정
function bigramSet(k){
  var s = new Set();
  for(var i=0;i<k.length-1;i++) s.add(k.substr(i,2));
  return s;
}
function isNearDup(k, usedSet){
  var dup = false;
  var kb = bigramSet(k);
  usedSet.forEach(function(u){
    if(dup) return;
    var shorter = k.length <= u.length ? k : u;
    var longer  = shorter === k ? u : k;
    if(shorter.length < 10) return;
    if(longer.indexOf(shorter) >= 0){ dup = true; return; }
    // 바이그램 유사도: 몇 글자만 다른 변형 문장 걸러내기
    var ub = bigramSet(u), inter = 0;
    kb.forEach(function(g){ if(ub.has(g)) inter++; });
    var union = kb.size + ub.size - inter;
    if(union > 0 && inter/union >= 0.75) dup = true;
  });
  return dup;
}

// ── 주제 게이팅: 특정 소품·활동·행사가 언급된 문장은
//    입력한 프로그램명/키워드와 맞을 때만 나오게 함 ──

// 총평에서 소품·활동 단어 추출 (TOPIC_GROUPS의 감지 용어와 대조)
function extractTerms(raw){
  var n = normKey(raw), out = [];
  TOPIC_GROUPS.forEach(function(grp){
    for(var t=1; t<grp.length; t++){
      var term = grp[t];
      if(term.charAt(0) === '@') continue;
      if(n.indexOf(term) >= 0 && out.indexOf(term) < 0) out.push(term);
    }
  });
  return out;
}
// 총평에서 분위기 감지
var MOOD_HIGH = ['적극','활기','활발','즐거','흥겹','흥이','신나','호응','웃음','열정','밝은','밝았','기뻐','좋아하','만족','열심','에너지'];
var MOOD_LOW  = ['차분','조용','피곤','지치','지쳐','지쳤','졸','더위','한파','추위','기력','소극','가라앉','늘어지','지루','컨디션이좋지'];
function detectMood(raw){
  var n = normKey(raw), h = 0, l = 0;
  MOOD_HIGH.forEach(function(w){ if(n.indexOf(w) >= 0) h++; });
  MOOD_LOW.forEach(function(w){ if(n.indexOf(w) >= 0) l++; });
  return h > l ? 'high' : (l > h ? 'low' : 'mid');
}

function scoreSentence(s, progTokens, kws){
  var sc = 0;
  // 프로그램명 매칭: 은행 문장이 쓰였던 프로그램명과 입력 프로그램명 토큰 비교
  for(var i=0;i<progTokens.length;i++){
    for(var j=0;j<s.programs.length;j++){
      if(s.programs[j].indexOf(progTokens[i]) >= 0){ sc += 4; i = progTokens.length; break; }
    }
  }
  // 키워드 매칭: 문장 본문에 총평 속 활동 단어 포함 시 가중
  var nt = normKey(s.text);
  for(var k=0;k<kws.length;k++){
    if(nt.indexOf(normKey(kws[k])) >= 0) sc += 3;
  }
  // 주제 게이팅: 문장에 특정 소품/행사 언급 시 입력(프로그램명+총평)과 맞으면 +6, 다르면 감점
  var inputN = normKey(document.getElementById('progName').value + ' ' + document.getElementById('summary').value);
  if(curCat === '몸단장') inputN += '매니큐어손톱머리감세발네일';  // 몸단장 유형은 위생 용어 허용
  for(var g=0; g<TOPIC_GROUPS.length; g++){
    var grp = TOPIC_GROUPS[g], present = false, strongMatch = false, softMatch = false;
    for(var t=1; t<grp.length; t++){
      var term = grp[t], matcherOnly = term.charAt(0) === '@';
      if(matcherOnly) term = term.slice(1);
      // 문장 감지: '@' 용어는 제외
      if(!matcherOnly && nt.indexOf(term) >= 0) present = true;
      if(inputN.indexOf(term) >= 0){
        // 확실한 매칭(소품·종목 단어 일치)은 가점, '@' 계열 매칭은 허용만(감점 면제)
        if(matcherOnly) softMatch = true; else strongMatch = true;
      }
    }
    // 안 맞는 소품·행사가 하나라도 있으면 확실히 배제(감점이 아니라 큰 음수).
    // 일치=가점, '@' 계열 허용=면제, 불일치=배제.
    if(present) sc += strongMatch ? 6 : (softMatch ? 0 : GATE_REJECT_PENALTY);
  }
  return sc + Math.random()*1.5;  // 동점 셔플
}
function pickFromPool(status, n, progTokens, kws, usedSet){
  // 참여 상태(적극/일반/소극)는 해당 유형 우선, 부족하면 전체 유형에서 보충.
  // 휴식/결석은 유형 무관 전체에서.
  var inCat = [], anyCat = [];
  BANK.sentences.forEach(function(s){
    if(s.status !== status) return;
    if(usedSet.has(normKey(s.text))) return;
    if(s.category === curCat) inCat.push(s); else anyCat.push(s);
  });
  var pool;
  if(status === '휴식' || status === '결석'){ pool = inCat.concat(anyCat); }
  else { pool = inCat.length >= n ? inCat : inCat.concat(anyCat); }
  pool.forEach(function(s){ s._sc = scoreSentence(s, progTokens, kws); });
  pool.sort(function(a,b){ return b._sc - a._sc; });
  var out = [];
  for(var i=0; i<pool.length && out.length<n; i++){
    // 정렬돼 있으므로, 배제 임계값 이하가 나오면 그 뒤는 전부 총평과 모순 → 채우지 않고 멈춤
    if(pool[i]._sc <= GATE_REJECT) break;
    var k = normKey(pool[i].text);
    if(usedSet.has(k) || isNearDup(k, usedSet)) continue;
    out.push(pool[i]);
    usedSet.add(k);
  }
  return out;
}
function moodSplit(nJoin, mood){
  var r = mood==='high' ? [0.70,0.25,0.05] : mood==='low' ? [0.35,0.55,0.10] : [0.55,0.35,0.10];
  var a = Math.round(nJoin*r[0]), b = Math.round(nJoin*r[1]);
  if(a+b > nJoin) b = nJoin - a;
  var c = nJoin - a - b;
  return {적극:a, 일반:b, 소극:c};
}

var rows = [];      // {status, text}
var usedTexts = new Set();

// 소품·활동을 언급하지 않아 어떤 총평에도 어긋나지 않는 안전 문구.
// 은행에서 총평에 맞는 문장이 부족할 때만 사용된다(모순 문장으로 채우지 않기 위함).
var SAFE = {
  '적극':['활동에 적극적으로 참여하시며 밝은 표정을 보이셨음.','즐거운 분위기 속에서 끝까지 열심히 참여하셨음.','집중하여 적극적으로 임하시는 모습을 보이셨음.','호응하며 활기차게 참여하셨음.'],
  '일반':['프로그램에 무리 없이 참여하셨음.','차분한 모습으로 끝까지 참여하셨음.','안정된 상태로 활동에 참여하셨음.','천천히 활동을 따라 하며 참여하셨음.'],
  '소극':['다소 소극적이나 끝까지 자리를 지키며 참여하셨음.','조용히 지켜보시며 천천히 참여하셨음.','컨디션에 맞춰 편안히 참여하셨음.','권유에 따라 잠시 참여하셨음.']
};
function fillSafe(st, need){
  var added = [];
  for(var i=0; i<SAFE[st].length && added.length<need; i++){
    var t = SAFE[st][i], k = normKey(t);
    if(usedTexts.has(k)) continue;
    usedTexts.add(k); added.push(t);
  }
  return added;
}

function generateAll(){
  var nJoin = parseInt(document.getElementById('nJoin').value)||0;
  var nRest = parseInt(document.getElementById('nRest').value)||0;
  var nAbs  = parseInt(document.getElementById('nAbsent').value)||0;
  if(nJoin+nRest+nAbs === 0){ toast('인원을 입력해 주세요.'); return; }
  var progTokens = tokenize(document.getElementById('progName').value);
  var sumRaw = document.getElementById('summary').value || '';
  var kws = extractTerms(sumRaw);
  var moodSel = document.getElementById('mood').value;
  var mood = moodSel === 'auto' ? detectMood(sumRaw) : moodSel;

  // 다듬은 총평 표시
  var polished = polishSummary(sumRaw);
  var sb = document.getElementById('sumBox');
  if(polished){ sb.style.display = ''; document.getElementById('sumText').textContent = polished; }
  else { sb.style.display = 'none'; }

  usedTexts = new Set();
  rows = [];
  var split = moodSplit(nJoin, mood);
  ['적극','일반','소극'].forEach(function(st){
    pickFromPool(st, split[st], progTokens, kws, usedTexts).forEach(function(s){
      rows.push({status:st, text:s.text});
    });
    // 풀 부족 시 개수 못 채움 — 일반으로 보충
    var short = split[st] - rows.filter(function(r){return r.status===st;}).length;
    if(short > 0){
      pickFromPool('일반', short, progTokens, kws, usedTexts).forEach(function(s){
        rows.push({status:st, text:s.text});
      });
    }
    // 그래도 부족하면(총평과 맞는 문장이 은행에 없음) 모순 문장 대신 안전 문구로 채움
    short = split[st] - rows.filter(function(r){return r.status===st;}).length;
    if(short > 0){
      fillSafe(st, short).forEach(function(t){ rows.push({status:st, text:t}); });
    }
  });
  // 참여자들 순서 섞기 (상태별 블록이 티 나지 않게)
  shuffle(rows);
  pickFromPool('휴식', nRest, progTokens, kws, usedTexts).forEach(function(s){ rows.push({status:'휴식', text:s.text}); });
  while(rows.filter(function(r){return r.status==='휴식';}).length < nRest){
    rows.push({status:'휴식', text:'컨디션 저하로 자리에 누워 휴식을 취하셨음.'});
  }
  pickFromPool('결석', nAbs, progTokens, kws, usedTexts).forEach(function(s){ rows.push({status:'결석', text:s.text}); });
  while(rows.filter(function(r){return r.status==='결석';}).length < nAbs){
    rows.push({status:'결석', text:'결석'});
  }
  renderRows();
  document.getElementById('resultCard').style.display = '';
  document.getElementById('resultTitle').textContent =
    '생성 결과 — 참여 ' + nJoin + '명' + (nRest?' · 휴식 '+nRest+'명':'') + (nAbs?' · 결석 '+nAbs+'명':'');
}
function shuffle(a){
  for(var i=a.length-1;i>0;i--){ var j=Math.floor(Math.random()*(i+1)); var t=a[i]; a[i]=a[j]; a[j]=t; }
}

// ═══════════ 렌더링 ═══════════
function renderRows(){
  var box = document.getElementById('resultList');
  box.innerHTML = '';
  rows.forEach(function(r, idx){
    var div = document.createElement('div');
    div.className = 'sent-row';
    div.innerHTML =
      '<span class="num">'+(idx+1)+'</span>' +
      '<span class="chip '+r.status+'">'+r.status+'</span>' +
      '<span class="sent-text" id="txt'+idx+'"></span>' +
      '<span class="sent-acts">' +
        '<button class="iconbtn" title="복사" onclick="copyRow('+idx+', this)">📋</button>' +
        '<button class="iconbtn" title="다른 문장으로 교체" onclick="swapRow('+idx+')">🔄</button>' +
      '</span>';
    box.appendChild(div);
    div.querySelector('#txt'+idx).textContent = r.text;
  });
}
function copyRow(idx, btn){
  copyText(rows[idx].text, function(){
    btn.classList.add('copied');
    setTimeout(function(){ btn.classList.remove('copied'); }, 900);
    toast((idx+1)+'번 문장 복사됨');
  });
}
function copyAllList(){
  var t = rows.map(function(r,i){ return (i+1)+'. ['+r.status+'] '+r.text; }).join('\n');
  copyText(t, function(){ toast('전체 '+rows.length+'개 문장 복사됨'); });
}
function copyText(t, ok){
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(t).then(ok, function(){ legacyCopy(t); ok(); });
  } else { legacyCopy(t); ok(); }
}
function legacyCopy(t){
  var ta = document.createElement('textarea');
  ta.value = t; document.body.appendChild(ta); ta.select();
  document.execCommand('copy'); document.body.removeChild(ta);
}
function swapRow(idx){
  var r = rows[idx];
  var progTokens = tokenize(document.getElementById('progName').value);
  var kws = extractTerms(document.getElementById('summary').value || '');
  var got = pickFromPool(r.status, 1, progTokens, kws, usedTexts);
  if(!got.length){ toast('교체할 문장이 더 없어요. 직접 다듬어서 사용해 주세요.'); return; }
  r.text = got[0].text;
  document.getElementById('txt'+idx).textContent = r.text;
}
function toast(msg){
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._tm); t._tm = setTimeout(function(){ t.classList.remove('show'); }, 1800);
}

// ═══════════ 총평 다듬기 (내용은 그대로, 어미·공백만 공문서체로 정리) ═══════════
function jong(ch){
  var c = ch.charCodeAt(0) - 0xAC00;
  return (c >= 0 && c <= 11171) ? c % 28 : -1;
}
// 받침 ㅂ → ㅁ (합니다→함, 됩니다→됨)
function bToM(ch){
  var c = ch.charCodeAt(0) - 0xAC00;
  if(c < 0 || c > 11171 || c % 28 !== 17) return null;
  return String.fromCharCode(0xAC00 + c - 17 + 16);
}
function polishEnding(s){
  var m;
  s = s.replace(/(습니다|십니다)$/, '음');
  if((m = s.match(/([가-힣])니다$/))){ var b = bToM(m[1]); if(b) s = s.slice(0, -3) + b; }
  s = s.replace(/이에요$/, '임').replace(/예요$/, '임').replace(/이었어요$/, '이었음')
       .replace(/해요$/, '함').replace(/돼요$/, '됨').replace(/없어요$/, '없음').replace(/세요$/, '심');
  if((m = s.match(/([가-힣])어요$/)) && jong(m[1]) === 20) s = s.slice(0, -2) + '음';   // 했어요→했음
  s = s.replace(/이다$/, '임').replace(/한다$/, '함').replace(/된다$/, '됨').replace(/하다$/, '함')
       .replace(/있다$/, '있음').replace(/없다$/, '없음').replace(/같다$/, '같음').replace(/보인다$/, '보임');
  if((m = s.match(/([가-힣])다$/)) && jong(m[1]) === 20) s = s.slice(0, -1) + '음';     // 찾았다→찾았음
  return s;
}
function polishSummary(raw){
  var t = (raw || '').trim();
  if(!t) return '';
  t = t.replace(/\s+/g, ' ').replace(/ ([.,!?])/g, '$1');
  var chunks = t.split(/([.!?]+ ?)/);
  var out = '';
  for(var i = 0; i < chunks.length; i += 2){
    var s = (chunks[i] || '').trim();
    if(!s) continue;
    var punc = (chunks[i+1] || '').trim() || '.';
    out += polishEnding(s) + punc + ' ';
  }
  return out.trim();
}
function copySummary(){
  var t = document.getElementById('sumText').textContent;
  if(!t) return;
  copyText(t, function(){ toast('총평 복사됨'); });
}
