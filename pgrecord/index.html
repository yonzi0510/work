<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Day:음 프로그램 일지 생성기</title>
<!-- v2026.07.08.003 -->
<link rel="icon" type="image/svg+xml" href="../favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#1F3864; --teal:#1D9E75; --bg:#f4f6fa; --card:#ffffff;
  --line:#e3e8f0; --txt:#2b3446; --sub:#7b8698; --danger:#c0392b;
}
*{box-sizing:border-box; margin:0; padding:0;}
body{font-family:'Noto Sans KR',sans-serif; background:var(--bg); color:var(--txt); font-size:15px;}
.header{background:var(--navy); color:#fff; padding:14px 20px; display:flex; align-items:center; gap:12px;}
.header h1{font-size:18px; font-weight:700;}
.header .ver{font-size:11px; opacity:.6;}
.header .spacer{flex:1;}
.header .center-name{font-size:13px; opacity:.9;}
.header button{background:rgba(255,255,255,.15); color:#fff; border:none; border-radius:6px; padding:6px 12px; font-size:12px; cursor:pointer; font-family:inherit;}
.wrap{max-width:860px; margin:0 auto; padding:20px 16px 80px;}
.card{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:20px; margin-bottom:16px;}
.card h2{font-size:15px; margin-bottom:14px; color:var(--navy);}
.row{display:flex; gap:12px; flex-wrap:wrap; margin-bottom:12px;}
.field{flex:1; min-width:140px;}
.field label{display:block; font-size:12px; color:var(--sub); margin-bottom:5px; font-weight:500;}
.field input[type=text], .field input[type=number], .field input[type=password], .field select, .field textarea{
  width:100%; padding:9px 11px; border:1px solid var(--line); border-radius:8px; font-size:14px; font-family:inherit; background:#fff;
}
.field textarea{resize:vertical; min-height:74px; line-height:1.5;}
.field input:focus, .field select:focus, .field textarea:focus{outline:2px solid #b9cdf0; border-color:var(--navy);}
/* 다듬은 총평 박스 */
.sum-box{background:#f2f8f5; border:1px solid #cfe6da; border-radius:10px; padding:12px 14px; margin-bottom:14px;}
.sum-head{display:flex; align-items:center; gap:8px; margin-bottom:6px; font-size:13px; color:var(--navy); font-weight:700;}
.sum-head .smallbtn{margin-left:auto;}
#sumText{line-height:1.6; word-break:keep-all;}
.typebtns{display:flex; gap:8px; flex-wrap:wrap;}
.typebtn{padding:9px 16px; border:1.5px solid var(--line); background:#fff; border-radius:20px; font-size:14px; cursor:pointer; font-family:inherit; color:var(--sub);}
.typebtn.on{border-color:var(--teal); background:#e6f7f1; color:var(--teal); font-weight:700;}
.genbtn{width:100%; padding:13px; background:var(--teal); color:#fff; border:none; border-radius:10px; font-size:16px; font-weight:700; cursor:pointer; font-family:inherit; margin-top:4px;}
.genbtn:hover{filter:brightness(1.05);}
.genbtn:disabled{background:#a8b6c8; cursor:default;}
.hint{font-size:12px; color:var(--sub); margin-top:6px; line-height:1.5;}
/* 결과 */
.result-head{display:flex; align-items:center; gap:10px; margin-bottom:12px;}
.result-head h2{flex:1; margin:0;}
.smallbtn{padding:7px 12px; border:1px solid var(--line); background:#fff; border-radius:8px; font-size:12px; cursor:pointer; font-family:inherit; color:var(--txt);}
.smallbtn:hover{background:#f0f3f8;}
.sent-row{display:flex; align-items:flex-start; gap:8px; padding:10px 8px; border-bottom:1px solid var(--line);}
.sent-row:last-child{border-bottom:none;}
.sent-row .num{width:26px; text-align:right; font-size:13px; color:var(--sub); padding-top:3px; flex-shrink:0;}
.chip{flex-shrink:0; font-size:11px; padding:3px 8px; border-radius:10px; margin-top:2px; font-weight:500;}
.chip.적극{background:#e6f7f1; color:#177a5b;}
.chip.일반{background:#eef1f6; color:#5a6678;}
.chip.소극{background:#fdf3e3; color:#a4700e;}
.chip.휴식{background:#ede9f7; color:#5C3489;}
.chip.결석{background:#fbeaea; color:var(--danger);}
.sent-text{flex:1; line-height:1.55; padding-top:2px; word-break:keep-all;}
.sent-acts{display:flex; gap:4px; flex-shrink:0;}
.iconbtn{border:none; background:transparent; font-size:15px; cursor:pointer; padding:3px 5px; border-radius:6px; line-height:1;}
.iconbtn:hover{background:#eef1f6;}
.iconbtn:disabled{opacity:.35; cursor:default;}
.iconbtn.copied{background:#e6f7f1;}
/* 토스트 */
#toast{position:fixed; bottom:24px; left:50%; transform:translateX(-50%); background:var(--navy); color:#fff;
  padding:10px 20px; border-radius:20px; font-size:13px; opacity:0; transition:opacity .25s; pointer-events:none; z-index:99; max-width:90vw;}
#toast.show{opacity:1;}
/* 로그인 & 모달 */
.overlay{position:fixed; inset:0; background:rgba(20,30,50,.55); display:flex; align-items:center; justify-content:center; z-index:50; padding:16px;}
.modal{background:#fff; border-radius:14px; padding:28px; width:100%; max-width:360px;}
.modal h2{font-size:17px; color:var(--navy); margin-bottom:6px;}
.modal p{font-size:13px; color:var(--sub); margin-bottom:16px; line-height:1.5;}
.modal .field{margin-bottom:12px;}
.modal .err{color:var(--danger); font-size:12px; margin-bottom:8px; min-height:16px;}
.spin{display:inline-block; width:14px; height:14px; border:2px solid #ccd; border-top-color:var(--teal); border-radius:50%; animation:sp .7s linear infinite; vertical-align:-2px;}
@keyframes sp{to{transform:rotate(360deg);}}
@media (max-width:560px){
  .sent-row{flex-wrap:wrap;}
  .sent-text{min-width:100%; order:3;}
}
</style>
</head>
<body>

<div class="header">
  <h1>📋 프로그램 일지 생성기</h1><span class="ver">v2026.07.08.003</span>
  <div class="spacer"></div>
</div>

<div class="wrap">
  <div class="card">
    <h2>프로그램 정보</h2>
    <div class="row">
      <div class="field" style="flex:2">
        <label>프로그램명</label>
        <input type="text" id="progName" placeholder="예: 소망노래자랑, 실버체조, 머리감기 및 네일케어">
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>프로그램 유형</label>
        <div class="typebtns" id="typeBtns">
          <button class="typebtn on" data-cat="인지">인지</button>
          <button class="typebtn" data-cat="신체">신체</button>
          <button class="typebtn" data-cat="사회">사회적응</button>
          <button class="typebtn" data-cat="몸단장">몸단장</button>
        </div>
      </div>
    </div>
    <div class="row">
      <div class="field" style="flex:2">
        <label>오늘의 총평 (분위기·활동 내용을 자유롭게 — 여기 적힌 소품·분위기를 자동으로 읽어요)</label>
        <textarea id="summary" rows="3" placeholder="예: 오늘은 무더위에 다들 지쳐 있었는데 밴드 운동을 시작하니 점점 활기를 찾았다. 전반적으로 호응이 좋고 즐거운 분위기였다."></textarea>
      </div>
      <div class="field">
        <label>참여 분위기</label>
        <select id="mood">
          <option value="auto" selected>자동 (총평에서 감지)</option>
          <option value="high">적극적 (적극 위주)</option>
          <option value="mid">보통 (적극+일반 섞임)</option>
          <option value="low">차분 (일반 위주)</option>
        </select>
      </div>
    </div>
    <div class="row">
      <div class="field">
        <label>참여 인원</label>
        <input type="number" id="nJoin" value="30" min="0" max="99">
      </div>
      <div class="field">
        <label>침상휴식 인원</label>
        <input type="number" id="nRest" value="0" min="0" max="99">
      </div>
      <div class="field">
        <label>결석 인원</label>
        <input type="number" id="nAbsent" value="0" min="0" max="99">
      </div>
    </div>
    <button class="genbtn" id="genBtn" onclick="generateAll()">✨ 특이사항 문장 생성</button>
    <div class="hint">실제 운영기록지 2,500여 개 문장 중에서 총평에 적힌 소품·활동·분위기에 맞는 문장을 골라 배분합니다. 총평은 내용 그대로 공문서체(~함/~하셨음)로 다듬어 함께 보여드려요.</div>
  </div>

  <div class="card" id="resultCard" style="display:none">
    <div class="result-head">
      <h2 id="resultTitle">생성 결과</h2>
      <button class="smallbtn" onclick="copyAllList()">전체 복사</button>
      <button class="smallbtn" onclick="generateAll()">🔄 전체 다시 생성</button>
    </div>
    <div class="sum-box" id="sumBox" style="display:none">
      <div class="sum-head">📝 다듬은 총평 <button class="smallbtn" onclick="copySummary()">복사</button></div>
      <div id="sumText"></div>
    </div>
    <div id="resultList"></div>
  </div>
</div>

<div id="toast"></div>

지 저하로 미참여하심."},{"category":"신체","programs":["느림교실","대왕윷놀이","백세체조","슬링 재활운동","슬링재활운동","이구동성 레크레이션","이야기여행","프로그램 그룹 전체"],"status":"결석","text":"인지저하로 미참"},{"category":"신체","programs":["느림교실","백세체조","슬링재활운동","신나는 빙고게임","이구동성 레크레이션","이야기여행","인지재활(5등급/인지지원)"],"status":"결석","text":"인지저하로 미참여"},{"category":"신체","programs":["슬링 재활운동"],"status":"결석","text":"인지저하로 인한 미참여"},{"category":"신체","programs":["슬링재활운동"],"status":"결석","text":"인지저하로 인해 미참여(지도불가)"},{"category":"신체","programs":["웃음치료"],"status":"결석","text":"중반까지 참여하시다 지인과 점심식사로 외출"},{"category":"신체","programs":["슬링재활운동"],"status":"결석","text":"화장실 이용 및 힘들어서 미참여"},{"category":"신체","programs":["슬링 재활운동"],"status":"결석","text":"힘들고 다리가 아파서 미참여하심."},{"category":"신체","programs":["슬링재활운동"],"status":"결석","text":"힘들어서 미참여"},{"category":"신체","programs":["슬링 재활운동"],"status":"결석","text":"힘들어서 미참여하심."},{"category":"신체","programs":["백세체조"],"status":"소극","text":"강사의 체조동작을 인지하고 반응하는데 다소 시간이 걸리심. 한박자 늦게 동작을 모방하셨으나, 끝까지 포기하지 않고 강사님의 움직임을 시선으로 쫓으며 따라 하려고 노력하심"},{"category":"신체","programs":["백세체조"],"status":"소극","text":"남들 앞에서 몸을 움직이는것을 부끄러워하시는 성향으로 동작을 아주 작게 수행하심. 요양보호사가 어르신의 시선을 가려주며 \"아무도 안보니까 괜찮아요\"라고 격려하자 한결 편안한 태도로 동작의 크기를 키우심."},{"category":"신체","programs":["백세체조"],"status":"소극","text":"동작과 함께 구령을 맞추어 외치는 활동에서 박자를 놓치거나 엉뚱한 숫자를 외치심. 틀림을 지적하지 않고 요양보호사가 옆에서 함께 \"셋, 넷!\" 하고 크게 구령을 넣어주어 위축되지 않고 동참하도록 지지함"},{"category":"신체","programs":["슬링 재활운동"],"status":"소극","text":"동작수행 중 가끔 멍하게 계시는 모습이 관찰되어, 손을 잡아드리고 가벼운 터치로 자극을 주어 하체근육을 움직이도록 도움."},{"category":"신체","programs":["슬링재활운동"],"status":"소극","text":"동작의 순서를 기억하고 스스로 따라하기에는 어려움이 있어, 요양보호사가 옆에서 신체접촉(촉진)을 통해 한 동작씩 함께 움직여드리니 트로트음악 리듬에 맞춰 끝까지 동참하심."},{"category":"신체","programs":["백세체조"],"status":"소극","text":"루프밴드를 손에 쥐는 법을 잊어버리셔서 손가락 사이에 밴드를 직접 끼워드리며 조작을 도옴."},{"category":"신체","programs":["실버체조"],"status":"소극","text":"맨 앞자리에 앉아 초반에는 활동에 잘 참여하셨으나 점점 팔에 힘이 빠지시면서 쉬엄쉬엄 따라하셨음."},{"category":"신체","programs":["웃음치료"],"status":"소극","text":"무릎통증으로 하체동작은 일부만 수행하심."},{"category":"신체","programs":["슬링재활운동"],"status":"소극","text":"밝게 웃으시면서 참여를 잘하셨고 동작수행은 아직은 조금 부족한 면이 있지만 발전할 수 있는 면을 보여주심."},{"category":"신체","programs":["소망오락관(점수쏙쏙! 공넣기!)"],"status":"소극","text":"본인 경기에는 즐겁게 잘 참여하셨으나 점점 팔에 힘이 빠지시면서 쉬엄쉬엄 따라하셨음."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"소극","text":"본인의 차례가 되었을 때 오재미를 손에 꼭 쥐고 놓지 않으려 하셨으나, 차분히 설명해드리자 과녁판을 향해 살포시 던지심."},{"category":"신체","programs":["슬링재활운동"],"status":"소극","text":"빈자리에 순서도 아닌데 오셔서 앉아 운동을 함. 최근 인지관련 저하가 있는 것 같은 행동을 하심."},{"category":"신체","programs":["슬링재활운동"],"status":"소극","text":"색칠하기 하고 싶다고 하시어 거부하심."},{"category":"신체","programs":["슬링 재활운동"],"status":"소극","text":"선생님 지도가 있어도 동작수행을 하는 데 어려움이 있음. 어르신 마음대로 하는 경우가 대부분임."},{"category":"신체","programs":["슬링 재활운동"],"status":"소극","text":"선생님의 지도가 있어도 잘 따라와 주지 않으셨음. 그래도 기본적인 동작수행은 잘 하셨음."},{"category":"신체","programs":["웃음치료"],"status":"소극","text":"손동작은 원활하나 다리동작은 제한적으로 참여하심"},{"category":"신체","programs":["백세체조"],"status":"소극","text":"손목 근력이 약해 밴드를 놓치지 않도록 손바닥에 잘 감아 조작할 수 있도록 지지함."},{"category":"신체","programs":["웃음치료"],"status":"소극","text":"손뼉치기 동작을 수행하면서 자리이동을 잦으심"},{"category":"신체","programs":["이구동성 레크레이션"],"status":"소극","text":"손의 악력이 약해 탁구공을 쥘 때 보조가 필요하셨으나, 끝까지 포기하지 않고 계란판에 공을 넣으심"},{"category":"신체","programs":["백세체조"],"status":"소극","text":"숫자게임에서 정답을 맞추지 못하자 일시적으로 짜증을 내며 좌절감을 표현하심. \"틀려도 괜찮다\"며 정서적 지지를 통해 흥분을 가라앉힘."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"소극","text":"시각적 자극(색깔계란판) 구분이 어려워하셨으나 명확한 색상방향을 구두로 안내함."},{"category":"신체","programs":["백세체조"],"status":"소극","text":"어깨 통증으로 상체 밴드 당기기 동작은 가볍게 밴드를 쥐고 흉내내는 정도로 강도를 조절함."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"소극","text":"어깨관절 통증으로 오재미를 높이 던지기 힘들어하심. 아래에서 위로 살짝 굴리거나 밀어서 던질 수 있도록 변형된 방법을 안내하여 참여를 도옴."},{"category":"신체","programs":["백세체조"],"status":"소극","text":"어르신은 프로그램 초반 집중력이 흐려지고 이탈하려는 경향을 보이셨으나, 좋아하는 옛 노래가 나오자 박수를 치며 주의가 집중됨. 밴드 운동은 맨손 동작으로 대체하여 신체 무리를 방지하였고, 노래 율동 시간에는 적극적으로 손을 흔들며 끝까지 자리를 지키심."},{"category":"신체","programs":["슬링 재활운동"],"status":"소극","text":"어제 집에서 넘어지면서 눈 부상이 있었지만 잘 참여하셨음. 그러나 동작수행은 선생님의 지도가 있어야 할 정도로 오늘은 동작수행을 힘들어하셨음."},{"category":"신체","programs":["슬링재활운동"],"status":"소극","text":"오늘 다소 피로감을 보이셔서 중간중간 휴식시간을 충분히 제공하며 10가지 동작을 무사히 마칠 수 있도록 보조함."},{"category":"신체","programs":["백세체조"],"status":"소극","text":"오늘 지남력저하 상태가 평소보다 심하여 손으로 날짜를 전혀 만들지 못하셨고, 지속적인 인지자극과 정서적 안정이 필요해 보임."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"소극","text":"오재미를 쥐고만 계시다가, 강사의 손잡기 보조를 통해 과녁판에 던져보심."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"소극","text":"오재미를 쥐고만 계시다가, 강의 손잡기 보조를 통해 과녁판에 던져보심."},{"category":"신체","programs":["백세체조"],"status":"소극","text":"오전부터 약간의 기력저하가 관찰되어 격렬한 체조동작은 제한함. 프로그램실 편안한 소파에 앉아 음악을 청취하고 다른 어르신들의 모습을 관찰하도록 지원하였으며, 수시로 안색을 체크함."},{"category":"신체","programs":["슬링재활운동"],"status":"소극","text":"운동 중 낙상 불안감을 호소하셔 요양보호사가 곁에서 밀착지지하여 심리적 안정 속에 운동을 마침."},{"category":"신체","programs":["슬링재활운동"],"status":"소극","text":"운동 중간에 조는 모습을 보이심. 이름을 부르면 바로 정신을 차리시고 선생님 동작을 따라하셨음."},{"category":"신체","programs":["민요체조"],"status":"소극","text":"율동을 따라 하시기 보다는 눈을 감으신채 노래만 따라 부르셨음."},{"category":"신체","programs":["백세체조"],"status":"소극","text":"음악소리가 나자 다소 불안해하며 자리에서 일어나 배회하려는 모습을 보이심. 요양보호사가 손을 잡고 가벼운 손뼉치기로 주의를 환기하자 이내 안정을 찾고 의자에 앉아 체조에 참여하심."},{"category":"신체","programs":["백세체조"],"status":"소극","text":"음악이 신나자 자리에서 급하게 일어나 춤을 추려하셔서 낙상위험이 발생함. 안전을 위해 요양보호사가 밀착마크하며 의자에 앉은 상태에서 안전하게 흥을 분출하실 수 있도록 상지운동 중심으로 유도함"},{"category":"신체","programs":["소망오락관(공굴리기챔피언)"],"status":"소극","text":"자리에는 앉아 계셨으나 점점 집중력이 떨어지시면서 고개를 숙이신 채 졸고 계셨음."},{"category":"신체","programs":["실내레크레이션(하늘에 별을 따자)"],"status":"소극","text":"자리에는 앉아 계셨으나 조금 피곤하셨는지 눈을 감고 계신 모습이 관찰됨."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"소극","text":"지시따르기에 어려움이 있어 일대일로 조준방향을 짚어드리며 손과 눈의 협응을 자극함."},{"category":"신체","programs":["웃음치료"],"status":"소극","text":"집중력이 다소 저하되는 모습이 있었으나 격려 후 참여하심."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"소극","text":"집중시간이 짧아 게임 도중 자리를 이탈하려 하셨으나, 통통 튀는 탁구공을 보여드리며 재참여를 유도해 활동을 마침."},{"category":"신체","programs":["실버체조"],"status":"소극","text":"차분하게 자리에 앉아 강사님을 보시면서 즐거워하셨으나 점점 팔에 힘이 빠지시면 y":"신체","programs":["이구동성 레크레이션"],"status":"일반","text":"던지는 힘이 약해 계란판에 닿지 못하자, 가까운 거리에서 던질 수 있도록 환경을 조정함."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"일반","text":"동시에 나는 소리에 놀란 반응을 보이셨으나, 요양보호사의 다정한 설명과 지지 속에 안정을 찾고 오재미 던지기에 집중하심."},{"category":"신체","programs":["슬링재활운동"],"status":"일반","text":"동작 수행능력이 다소 느린 편이었으나, 서두르지 않고 본인의 속도에 맞춰 묵묵하게 10가지 동작을 모두 완수하는 성실함을 보이심."},{"category":"신체","programs":["웃음치료"],"status":"일반","text":"동작설명 후 스스로 따라하려는 모습을 보이심"},{"category":"신체","programs":["웃음치료"],"status":"일반","text":"동작속도에 잘 맞추어 참여하심."},{"category":"신체","programs":["웃음치료"],"status":"일반","text":"동작수행시 균형을 잘 유지하심."},{"category":"신체","programs":["웃음치료"],"status":"일반","text":"동작을 정확하게 수행하려고 노력하심."},{"category":"신체","programs":["백세체조"],"status":"일반","text":"루프밴드 운동 중 다리에 쥐가 나지 않도록 수시로 주물러드렸으며, 어르신 스스로도 페이스를 조절해가며 안전하게 하체 근육 운동에 참여하심."},{"category":"신체","programs":["슬링재활운동"],"status":"일반","text":"리듬감이 뛰어나셔서 음악의 템포에 맞춰 1번부터 10번까지의 난이도별 동작을 흐트러짐없이 정확하게 따라하심."},{"category":"신체","programs":["민요체조"],"status":"일반","text":"리듬감이 좋아 정확하게 장단을 맞추심."},{"category":"신체","programs":["웃음치료"],"status":"일반","text":"리듬에 맞춰 어깨를 자연스럽게 움직이심."},{"category":"신체","programs":["백세체조"],"status":"일반","text":"마무리 스트레칭이 시작되자 \"벌써 끝났냐, 더 하고싶다\"며 짙은 아쉬움을 표현하심. 다음주에도 재미있는 체조가 준비되어있음을 안내해드리고 달래어 기분좋게 마무리하심"},{"category":"신체","programs":["민요체조"],"status":"일반","text":"마무리 체조를 성실히 수행하심."},{"category":"신체","programs":["웃음치료"],"status":"일반","text":"마무리 체조시 호흡 안정되며 표정이 편안해짐"},{"category":"신체","programs":["슬링 재활운동"],"status":"일반","text":"마지막에 참여를 하셨지만 에너지는 넘치는 어르신이고 해보겠다는 모습을 보여주시지만 아직은 미흡한 동작들이 있음. 그래도 끝까지 잘 참여하셨음."},{"category":"신체","programs":["프로그램 그룹 전체"],"status":"일반","text":"목표물을 맞히기 위해 몸의 자세를 조절하는 모습이 관찰됨"},{"category":"신체","programs":["프로그램 그룹 전체"],"status":"일반","text":"목표물을 맞히기 위해 여러 번 시도하며 포기하지 않고 참여함."},{"category":"신체","programs":["프로그램 그룹 전체"],"status":"일반","text":"목표물을 쓰러뜨리지 못해도 다시 시도하며 지속적인 참여 의지를 보임."},{"category":"신체","programs":["백세체조"],"status":"일반","text":"몸이 한쪽으로 기울어지는 등 균형감각이 다소 불안정함. 뒤편에서 atus":"일반","text":"밝은 분위기의 어르신임. 몸도 가벼우셔서 동작수행에는 문제가 없었음."},{"category":"신체","programs":["백세체조"],"status":"일반","text":"밴드를 발에 거는 동작에서 낙상 위험이 없도록 교사가 밀착보조하여 안전하게 하체운동을 진행함."},{"category":"신체","programs":["백세체조"],"status":"일반","text":"밴드를 활용한 근력운동이 생소하여 서툴러하셨으나, 개별지도 후 끝까지 동참하심."},{"category":"신체","programs":["민요체조"],"status":"일반","text":"병원 진료 후 민요도 따라 부르시고 손짝짝이를 치시면서 리듬감을 표현하심"},{"category":"신체","programs":["웃음치료"],"status":"일반","text":"병원 진료 후 오셔서 리듬에 맞춰 동작을 잘 따라 하심"},{"category":"신체","programs":["민요체조"],"status":"일반","text":"병원 진료 후 오셔서 장구 반주에 맞춰 다양한 손동작을 표현함"},{"category":"신체","programs":["민요체조"],"status":"일반","text":"병원 진료로 외출하여 뒤늦게 참여하심"},{"category":"신체","programs":["웃음치료"],"status":"일반","text":"병원진료로 외출하여 중반부터 참여하심"},{"category":"신체","programs":["슬링재활운동"],"status":"일반","text":"보조 선생님 도움으로 1~10번 하체동작을 천천히 따라하심."},{"category":"신체","programs":["백세체조"],"status":"일반","text":"보조 선생님 따라서 참여하셨음"},{"category":"신체","programs":["대왕윷놀이"],"status":"일반","text":"보행이 불안정하여 윷을 던질 때 요양보호사가 신체를 지지해드렸으며, 낙상사고 없이 안전하게 신체활동을 마무리함."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"일반","text":"본인의 차례가 지났음에도 계속 공을 던지려 하셨음. 다음 게임 때 또 하실 거예요라며 다정하게 손을 잡아드려 규칙을 지키도록 안내함."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"일반","text":"상대팀 어르신이 성공했을 때도 축하해주는 따뜻하고 선의의 경쟁모습을 보임."},{"category":"신체","programs":["대왕윷놀이"],"status":"일반","text":"상대팀에게 말이 잡히자 잠시 속상해하셨으나 격려에 금방 웃음을 되찾으심."},{"category":"신체","programs":["민요체조"],"status":"일반","text":"상지 움직임이 원활하게 이루어짐."},{"category":"신체","programs":["대왕윷놀이"],"status":"일반","text":"상지근력이 약해 대왕윷을 높이 던지진 못했으나, 휠체어 식판 위에서 굴리는 방식으로 안전하게 참여하심."},{"category":"신체","programs":["웃음치료"],"status":"일반","text":"상지운동 범위가 평소보다 향상된 모습을 보이심"},{"category":"신체","programs":["웃음치료"],"status":"일반","text":"상체운동 위주로 무리없이 수행하심."},{"category":"신체","programs":["웃음치료"],"status":"일반","text":"상체운동시 팔을 높이 들어올리며 참여하심."},{"category":"신체","programs":["슬링 재활운동"],"status":"일반","text":"상체운동이다 보니 운동을 하는 데 큰 어려움은 없었고 허리와 어께쪽 운동을 할 때 가동범위가 작게 나옴."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"일반","text":"색깔계란판 게임에서 탁구공을 원하는 칸에 정확히 튕겨넣으시며 손목조절능력이 우수함을 나타내심."},{"category":"신체","programs":["프로그램 그룹 전체"],"status":"일반","text":"성공 여부와 관계없이 활동 자체를 즐기며 적극적으로 참여함"},{"category":"신체","programs":["민요체조"],"status":"일반","text":"소고를 두드리며 리듬감 향상 활동에 참여함."},{"category":"신체","programs":["백세체조"],"status":"일반","text":"소근육 경직으로 손가락 날짜 표현이 매끄럽지 못해 반대쪽 손으로 받쳐가며 완성하셨고, 이에 대해 끝까지 해내는 인내심을 보이심."},{"category":"신체","programs":["대왕윷놀이"],"status":"일반","text":"소란스러운 분위기를 어색해하셨으나 다정한 참여유도에 고개를 끄덕이시며 조용히 응원에 동참하심."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"일반","text":"소리 집중력이 우수하여 이구동성 게임의 까다로운 제시어를 연속으로 맞히는 지혜를 발휘하심."},{"category":"신체","programs":["백세체조"],"status":"일반","text":"손 악력이 약해 처음에는 밴드를 놓치기도 하셨으나, 손가락에 걸고 하는 대안 동작을 안내해드린 후 포기하지 않고 상체 운동을 완수하심."},{"category":"신체","programs":["프로그램 그룹 전체"],"status":"일반","text":"손가락으로 오재미를 잡고 던지는 과정에서 소근육 사용을 촉진할 수 있었음."},{"category":"신체","programs":["웃음치료"],"status":"일반","text":"손동작을 정확하게 따라 하심."},{"category":"신체","programs":["웃음치료"],"status":"일반","text":"손뼉치기 동작에 흥미를 보이심."},{"category":"신체","programs":["웃음치료"],"status":"일반","text":"손뼉치기 동작을 정확하게 수행하심"},{"category":"신체","programs":["민요체조"],"status":"일반","text":"손유희 동작을 기억하며 반복 수행함."},{"category":"신체","programs":["민요체조"],"status":"일반","text":"손유희 동작을 반복하며 집중력 향상 활동에 참여함."},{"category":"신체","programs":["민요체조"],"status":"일반","text":"손유희를 통해 소근육 운동을 실시함."},{"category":"신체","programs":["민요체조"],"status":"일반","text":"손유희를 통해 손가락 협응력 향상 활동을 함"},{"category":"신체","programs":["프로그램 그룹 전체"],"status":"일반","text":"손의 움직임, 거리 조절, 방향 조절을 통해 인지 및 신체기능 자극 효과가 있었음."},{"category":"신체","programs":["프로그램 그룹 전체"],"status":"일반","text":"손의 힘이 약한 어르신은 가까운 거리에서 참여할 수 있도록 도움을 제공함."},{"category":"신체","programs":["민요체조"],"status":"일반","text":"손짝짝이와 스카프를 장단에 맞춰 율동을 잘 따라 하심"},{"category":"신체","programs":["민요체조"],"status":"일반","text":"수업이 시작하자마자 출입문 쪽으로 자리에 옮겨 앉아 계시고 활동에 참여하심"},{"category":"신체","programs":["슬링 재활운동"],"status":"일반","text":"수줍게 웃으시면서 운동에 참여하셨고 동작을 잘 따라하려고 노력하는 모습을 보여주심."},{"category":"신체","programs":["프로그램 그룹 전체"],"status":"일반","text":"순서를 기다리고 차례대로 참여하며 프로그램 진행에 협조적인 모습을 보임."},{"category":"신체","programs":["민요체조"],"status":"일반","text":"스카프를 꽃처럼 펼치며 율동을 표현하심."},{"category":"신체","programs":["민요체조"],"status":"일반","text":"스카프를 돌돌 감아서 정리하시고 손짝짝이는 리듬에 맞춰서 치심"},{"category":"신체","programs":["민요체조"],"status":"일반","text":"스카프를 원을 그리듯 돌리며 율동하심."},{"category":"신체","programs":["민요체조"],"status":"일반","text":"스카프를 좌우로 흔들며 리듬감을 표현하심."},{"category":"신체","programs":["웃음치료"],"status":"일반","text":"스트레칭 동작을 천천히 정확하게 수행하심."},{"category":"신체","programs":["슬링재활운동"],"status":"일반","text":"슬링 1~10번 코스를 수행하는 동안 다리를 들어올리는 동작에서 하체 근지력의 우수함을 보임."},{"category":"신체","programs":["슬링재활운동"],"status":"일반","text":"슬링로프의 높이를 체형에 맞게 조절해드리니 훨씬 편안해하셨고, 하체근육을 골고루 자극하며 집중하심."},{"category":"신체","programs":["슬링 재활운동"],"status":"일반","text":"슬링에 다리를 올리고 계시는 것만으로도 하체순환에 도움이 된다며 시원하다고 만족해하심."},{"category":"신체","programs":["슬링 재활운동"],"status":"일반","text":"슬링운동이 본인의 건강유지에 큰 도움이 된다고 신뢰하고 계시며, 매 세트마다 자세를 올바르게 잡으려고 집중하는 모습을 보이심."},{"category":"신체","programs":["슬링재활운동"],"status":"일반","text":"슬링을 잡은 손에 힘을 꼭 쥐고 하체운동에 집중하셨으며, 대퇴부근력 강화에 좋은 운동이라며 만족해하심."},{"category":"신체","programs":["슬링재활운동"],"status":"일반","text":"시각적 모방능력이 다소 저하되어 강사의 동작을 바로 따라하지 못하셨음. 개별적으로 다리를 잡아주며 1:1로 동작을 시연해드리니 천천히 발을 구르며 프로그램에 참여하심."},{"category":"신체","programs":["대왕윷놀이"],"status":"일반","text":"시각적 제약이 있어 말판이 잘 보이지 않으셨으나, 교사가 경기 상황을 말로 설명해드리자 고개를 끄덕이며 경청하심."},{"category":"신체","programs":["대왕윷놀이"],"status":"일반","text":"시력저하로 윷판이 잘 보이지 않는다고 하셨으나, 교사가 윷판 결과를 큰 목소리로 설명해드리자 귀를 기울이며 응원전의 함성에 맞춰 손뼉을 치심."},{"category":"신체","programs":["웃음치료"],"status":"일반","text":"신체 상태에 맞게 무리 없이 참여하심"},{"category":"신체","programs":["민요체조"],"status":"일반","text":"신체 움직임이 점차 커지는 모습을 보이심"},{"category":"신체","programs":["백세체조"],"status":"일반","text":"신체운동 시 쉽게 지치는 기색이 있어, 걷기체조 중간중간 적절한 휴식시간을 제공하며 안전하게 완주할 수 있도록 도우심."},{"category":"신체","programs":["대왕윷놀이"],"status":"일반","text":"앉은 자세에서 가볍게 윷을 떨어뜨리는 방식으로 무리 없이 참여함."},{"category":"신체","programs":["민요체조"],"status":"일반","text":"알록달록한 스카프를 양손에 잡고 민요 가락에 맞춰 흔드심."},{"category":"신체","programs":["슬링재활운동"],"status":"일반","text":"양쪽 다리의 균형감각이 좋아 슬링운동 시 좌우 쏠림 없이 대칭적으로 하체 힘을 잘 활용함."},{"category":"신체","programs":["슬링재활운동"],"status":"일반","text":"양쪽 다리의 균형을 맞추며 운동할 수 있도록 유도함. 균형감각 유지 및 하체근력 강화에 유익한 시간이었음."},{"category":"신체","programs":["슬링재활운동"],"status":"일반","text":"양쪽 다리의 균형이 다소 맞지 않았으나, 슬링구동을 통해 좌우 발란스를 맞추며 10가지 스트레칭 및 근력동작을 성실히 완수하심."},{"category":"신체","programs":["백세체조"],"status":"일반","text":"어깨 통증이 있다고 하셔 루프밴드를 제거하고 맨손으로 가볍게 범위만 움직이도록 유도함. 무리하지 않는 선에서 율동 위주로 참여하도록 하여 안전사고를 예방함."},{"category":"신체","programs":["백세체조"],"status":"일반","text":"어깨관절의 뻣뻣함과 통증을 호소하셔서 팔을 높이드는 동작은 생략하도록 안내함. 대신 손가락 쥐었다펴기, 가벼운 목돌리기등 통증이 없는 범위내의 동작만 수행하시도록 개별맞춤 케어를 제공함."},{"category":"신체","programs":["슬링 재활운동"],"status":"일반","text":"어깨와 허리운동을 할 때 가동범위가 확실히 예전보다 작게 나왔고 방향인지도 저하된 모습을 보여주심."},{"category":"신체","programs":["슬링 재활운동"],"status":"일반","text":"어르신 본인이 운동을 적극적으로 해야 한다는 마음을 가지고 계심. 허리 관련 운동은 힘들어하셨지만 기본동작은 잘 수행하셨음."},{"category":"신체","programs":["백세체조"],"status":"일반","text":"어르신은 강사의 구두 지시만을 듣고 신체 표현 작품을 따라 하는데 어려움이 있었으나, 옆자리 어르신과 강사의 손동작을 시각적으로 모방하며 끝까지 포기하지 않고 참여하심. 순차적인 율동 동작을 통해 뇌 자극 및 소근육 조절 능력을 도모함."},{"category":"신체","programs":["백세체조"],"status":"일반","text":"연속적인 동작순서를 기억하는데 어려움을 보이심. 요양보호사가 옆에서 \"어르신, 이번엔 만세하시는거예요\"라고 한동작씩 반복해서 안내해드리자 차분하게 지시에 따라 동참하심."},{"category":"신체","programs":["웃음치료"],"status":"일반","text":"옆 어르신과 함께 동작을 맞추며 참여하심"},{"category":"신체","programs":["백세체조"],"status":"일반","text":"옆 어르신의 숫자 정답을 본인의 것으로 착각하고 고집하는 경향이 있어 다정하게 중재함."},{"category":"신체","programs":["슬링재활운동"],"status":"일반","text":"오늘은 컨디션이 좋다고 하시면서 운동을 제일 먼저 와서 하셨음. 복부에 살이 쪄있어서 허리를 굽히는 동작을 어려워하심."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"일반","text":"오재미 던지기에서 탁월한 거리조절능력을 보이며 팀의 고득점에 기여함."},{"category":"신체","programs":["프로그램 그룹 전체"],"status":"일반","text":"오재미 표적 맞추기 활동을 통해 집중력 향상과 신체 움직임 유지에 도움이 되는 모습이 관찰됨."},{"category":"신체","programs":["프로그램 그룹 전체"],"status":"일반","text":"오재미를 던지는 과정에서 자연스럽게 팔과 어깨 움직임을 활용함."},{"category":"신체","programs":["프로그램 그룹 전체"],"status":"일반","text":"오재미를 던지면서 표적물을 맞추기 위해 자세를 낮추기도 하며 집중력이 매우 좋으심"},{"category":"신체","programs":["이구동성 레크레이션"],"status":"일반","text":"오재미를 던질 때 상지근력을 크게 사용하여 어깨와 팔의 스트레칭 효과를 얻으심."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"일반","text":"오재미를 목표물이 아닌 엉뚱한 방향으로 던지셨으나, 팀원들이 괜찮다며 격려해주자 안도하시며 다음 공은 정면을 향해 던지심."},{"category":"신체","programs":["프로그램 그룹 전체"],"status":"일반","text":"오재미를 손에 쥐고 목표물을 바라보며 집중하는 모습을 보임."},{"category":"신체","programs":["프로그램 그룹 전체"],"status":"일반","text":"오재미를 직접 잡고 던지는 활동을 통해 자신감을 표현함."},{"category":"신체","programs":["슬링재활운동"],"status":"일반","text":"왼쪽 무릎관절염 고려하여 가동범위를 좁혀 안전하게 진행함. 통증호소 없이 부드럽게 하체운동을 마침."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"일반","text":"요양보호사 지지를 통해서 힘차게 공을 던져보심"},{"category":"신체","programs":["슬링재활운동"],"status":"일반","text":"운동능력이 우수하여 강사(복지사)의 시범동작을 거울 보듯 정확하게 재현해내며 타 어르신들의 모범이 됨."},{"category":"신체","programs":["웃음치료"],"status":"일반","text":"율동동작을 정확하게 따라 하심."},{"category":"신체","programs":["민요체조"],"status":"일반","text":"율동을 따라 하며 상·하지 협응력 향상 활동을 함."},{"category":"신체","programs":["민요체조"],"status":"일반","text":"음악 박자에 맞춰 손뼉을 치심."},{"category":"신체","programs":["웃음치료"],"status":"일반","text":"음악소리에 맞춰 자연스럽게 흥얼거리심."},{"category":"신체","programs":["웃음치료"],"status":"일반","text":"음악에 맞춰 발을 구르며 참여하심."},{"category":"신체","programs":["민요체조"],"status":"일반","text":"음악에 맞춰 신체 각 부위를 움직이는 체조를 함."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"일반","text":"응원도구로 백업을 활용해 박자를 맞추며 타인과의 상호작용이 활발히 이루어짐."},{"category":"신체","programs":["슬링 재활운동"],"status":"일반","text":"의외로 잘 적응하셨고 동작도 금방 잘 따라하셨음. 허리 관련 운동을 할 때 가동범위가 작게 나왔음."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"일반","text":"의욕은 앞서나 조준력이 흐려질 때 천천히 던지세요라며 템포를 조절해드려 성공시킴."},{"category":"신체","programs":["슬링재활운동"],"status":"일반","text":"의자 깊숙이 앉아 바른 자세로 슬링을 발에 걸고 무릎 굽혔다 펴기 동작을 안정적으로 수행함."},{"category":"신체","programs":["백세체조"],"status":"일반","text":"의자에 앉아 루프밴드를 활용한 무릎 굽혔다 펴기 동작을 수행할 때, 균형을 잃지 않도록 바른 자세를 유지하며 하버지 근육 강화에 집중하심."},{"category":"신체","programs":["민요체조"],"status":"일반","text":"인사 시간에 큰 목소리로 인사를 나누심."},{"category":"신체","programs":["민요체조"],"status":"일반","text":"자리 이동 시 직원의 도움을 받아 안전하게 착석하심"},{"category":"신체","programs":["민요체조"],"status":"일반","text":"장구 반주에 맞춰 손동작을 반복 수행함."},{"category":"신체","programs":["민요체조"],"status":"일반","text":"장구 소리에 맞춰 박자를 맞추려 노력하심."},{"category":"신체","programs":["민요체조"],"status":"일반","text":"장구 연주에 맞춰 손뼉치기와 무릎치기 활동을 함."},{"category":"신체","programs":["민요체조"],"status":"일반","text":"장구 장단에 맞춰 발 구르기 활동을 함"},{"category":"신체","programs":["민요체조"],"status":"일반","text":"장구 장단에 맞춰 어깨 돌리기와 상지 운동을 실시함."},{"category":"신체","programs":["민요체조"],"status":"일반","text":"장구소리에 맞춰 리듬을 느끼며 활동에 참여함."},{"category":"신체","programs":["민요체조"],"status":"일반","text":"장구소리에 맞춰 팔 들어올리기 운동을 함."},{"category":"신체","programs":["민요체조"],"status":"일반","text":"장구장단에 맞춰 박자를 잘 맞추심."},{"category":"신체","programs":["민요체조"],"status":"일반","text":"장단에 맞춰 몸을 좌우로 움직이심."},{"category":"신체","programs":["슬링재활운동"],"status":"일반","text":"전반적인 운동수행은 잘하셨음. 구령도 잘 붙이셨으나 운동을 할 때 옆에 어른과 손끝이 닿도록 하려고 해서 제지를 함."},{"category":"신체","programs":["슬링 재활운동"],"status":"일반","text":"조용히 운동을 하는 어르신이지만 끝까지 틀리지 않고 정확한 동작 움직임을 보여주심."},{"category":"신체","programs":["대왕윷놀이"],"status":"일반","text":"주변상황을 조용히 주시하시다가, 상대팀의 말이 잡힐 때 혼잣말로 \"아이고\" 하시며 경기흐름에 몰입하심."},{"category":"신체","programs":["슬링 재활운동"],"status":"일반","text":"중간에 순서를 놓치는 경우가 있었지만 오래 하셔서 그런지 금방 따라오셨음. 전반적으로 잘 수행하셨음."},{"category":"신체","programs":["웃음치료"],"status":"일반","text":"중간에 휴식을 취한 후 다시 활동에 참여하심."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"일반","text":"지시에 따라 규칙을 완벽히 이해하고 수행하셨으며, 탁구공 던지기에서 손목의 스냅을 잘 활용하여 높은 점수를 획득하심."},{"category":"신체","programs":["웃음치료"],"status":"일반","text":"진행자의 격려 후 동작범위가 커지심."},{"category":"신체","programs":["웃음치료"],"status":"일반","text":"진행자의 시범을 집중하여 관찰하심."},{"category":"신체","programs":["슬링재활운동"],"status":"일반","text":"집에 가신다고 하신 후 상황이여서 빨리 운동을 통해 관심을 전환시키는 것을 우선으로 했음."},{"category":"신체","programs":["슬링 재활운동"],"status":"일반","text":"집중시간이 짧아 중간에 줄을 놓으려는 경향이 있어, 지속적인 말벗케어와 칭찬을 통해 끝까지 참여하실 수 있도록 유도함."},{"category":"신체","programs":["슬링 재활운동"],"status":"일반","text":"차분하게 운동을 하셨고 허리를 앞으로 숙이는 동작에서 가동범위가 작게 나오는 것을 확인함."},{"category":"신체","programs":["프로그램 그룹 전체"],"status":"일반","text":"처음에는 거리 조절이 어려웠으나 반복하면서 힘 조절을 시도하는 모습을 보임"},{"category":"신체","programs":["이구동성 레크레이션"],"status":"일반","text":"처음에는 규칙을 이해하지 못해 멍하니 계셨으나, 요양보호사의 1:1 언어적 촉진을 통해 오재미를 과녁으로 천천히 던져보심."},{"category":"신체","programs":["슬링재활운동"],"status":"일반","text":"청력이 많이 저하된 상태여서 앞에서 강사가 말을 하면 잘 못들으심. 그래도 오래해서 그런지 잘하셨음."},{"category":"신체","programs":["슬링재활운동"],"status":"일반","text":"청력이 좋지 않아 동작전환을 할 때 약간 늦게 반응을 하심. 그래도 끝까지 잘하셨음."},{"category":"신체","programs":["슬링 재활운동"],"status":"일반","text":"청력저하가 있어 동작을 조금 늦게 취하려는 모습이 있음. 그래도 끝까지 잘 참여하셨음."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"일반","text":"청팀과 홍팀의 구분을 혼동하셨으나, 눈앞의 노란색 오재미를 쥐어드리자 과녁판을 향해 힘차게 던지며 참여하심."},{"category":"신체","programs":["민요체조"],"status":"일반","text":"체조 동작을 끝까지 수행하려 노력하심"},{"category":"신체","programs":["민요체조"],"status":"일반","text":"체조 동작을 끝까지 포기하지 않고 수행하심."},{"category":"신체","programs":["민요체조"],"status":"일반","text":"체조 동작을 집중하여 관찰하심."},{"category":"신체","programs":["웃음치료"],"status":"일반","text":"체조 후 개운하다고 말씀하심."},{"category":"신체","programs":["백세체조"],"status":"일반","text":"체조동작을 모방하기보다는 음악리듬에 맞춰 본인만의 방식으로 어깨를 들썩이거나 손을 흔드심. 억지로 교정하기보다 자발적인 신체움직임을 격려하며 긍정적인 자극을 유도함."},{"category":"신체","programs":["슬링 재활운동"],"status":"일반","text":"초기에는 하체 가동범위가 매우 제한적이었으나, 슬링재활을 지속하면서 무릎이 펴지는 각도가 조금씩 부드러워지는 것이 관찰됨."},{"category":"신체","programs":["백세체조"],"status":"일반","text":"초반에는 지친 기색이었으나 신나는 음악이 나오자 밴드를 잡고 천천히 동작을 따라하심."},{"category":"신체","programs":["슬링재활운동"],"status":"일반","text":"최근 다리저림을 호소하셨으나, 슬링에 의지해 무리하지 않는 선에서 하체 스트레칭 위주로 안전하게 참여하심."},{"category":"신체","programs":["백세체조"],"status":"일반","text":"최근 지남력 기복이 있으셔 오늘 날짜 인지에 어려움이 있었으나, 달력을 함께 확인하며 손동작을 유도하자 기억을 상기해내심."},{"category":"신체","programs":["대왕윷놀이"],"status":"일반","text":"큰 소리로 응원하시지는 않았으나, 팀원들이 환호할 때마다 조용히 미소를 지으며 끝까지 집중해서 관람하심."},{"category":"신체","programs":["프로그램 그룹 전체"],"status":"일반","text":"큰 특이사항 없이 즐겁게 활동에 잘 참여하셨음."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"일반","text":"탁구공을 손으로 굴리려고 하셔서 계란판 위로 던지는 시범을 보여드렸더니, 모방행동을 통해 게임에 동참하심."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"일반","text":"탁구공이 계란판 밖으로 튕겨나가자 아쉬워하면서도, 다음 차례에는 힘을 조절하여 정확히 안착시키는 뛰어난 집중력을 보이심."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"일반","text":"팀의 개념은 모호해하셨으나 청팀 응원소리가 커질 때마다 고개를 끄덕이며 시각·청각적 자극에 긍정적으로 반응하심."},{"category":"신체","programs":["대왕윷놀이"],"status":"일반","text":"팀이 지고 있는 상황에서도 낙담하지 않고 아직 한판 더 남았으니 괜찮다며 의연한 모습을 보임."},{"category":"신체","programs":["프로그램 그룹 전체"],"status":"일반","text":"팔의 움직임을 활용하여 오재미를 던지며 상지운동에 참여함."},{"category":"신체","programs":["프로그램 그룹 전체"],"status":"일반","text":"평소 활동 참여가 적은 어르신도 주변의 격려를 받으며 관심을 가지고 참여함"},{"category":"신체","programs":["백세체조"],"status":"일반","text":"평소보다 컨디션이 좋으셨으며, 손으로 날짜를 만드는 소근육 활동 시 손가락 움직임이 정교하고 유연하셨음."},{"category":"신체","programs":["대왕윷놀이"],"status":"일반","text":"표현은 적으셨으나 본인 팀이 모가 나오 작게 손뼉을 치며 은근히 기뻐하시는 모습을 보이심."},{"category":"신체","programs":["민요체조"],"status":"일반","text":"프로그램 시작 전 밝은 표정으로 참여 의사를 보이심"},{"category":"신체","programs":["슬링 재활운동"],"status":"일반","text":"프로그램 시작 전 이걸 내가 어떻게 하냐며 불안해하셨으나, 슬링줄을 잡고 안전함을 인지하신 후에는 미소를 지으며 다리 올리기 동작을 수행함."},{"category":"신체","programs":["민요체조"],"status":"일반","text":"프로그램 종료 후 감사 인사를 전하심."},{"category":"신체","programs":["대왕윷놀이"],"status":"일반","text":"프로그램 종료 후 재미있으셨냐는 질문에 조용히 고개를 끄덕이시며 만족스러웠다는 의사를 표현하심."},{"category":"신체","programs":["슬링재활운동"],"status":"일반","text":"하지 근력약화로 대동작은 어려워하셨으나, 밀착보조를 통해 가동범위 내에서 안전하게 수행함."},{"category":"신체","programs":["백세체조"],"status":"일반","text":"하체근력이 다소 약해 신바람 걷기체조 시 앉아서 다리만 가볍게 흔드는 형태로 동작을 수정하여 안전하게 운동을 마침."},{"category":"신체","programs":["슬링재활운동"],"status":"일반","text":"하체운동 중 중심을 잃지 않도록 안심시켜드렸으며, 슬링줄에 의지해 안전하게 동작을 완수함."},{"category":"신체","programs":["슬링 재활운동"],"status":"일반","text":"항상 차분한 모습으로 운동을 하심. 오늘은 구령도 따라하면서 수행을 하셨음. 앞으로 숙이는 동작은 조금 힘들어하심."},{"category":"신체","programs":["슬링 재활운동"],"status":"일반","text":"허리 관련 운동에 대한 가동범위가 작게 나왔지만 다른 동작은 끝까지 잘 수행하셨고 목소리도 크게 내셨음."},{"category":"신체","programs":["백세체조"],"status":"일반","text":"허리 통증이 있어 밴드를 강하게 늘리는 동작은 제한하고, 맨손 스트레칭과 병행하도록 유도하여 신체에 무리가 가지 않도록 안전하게 급여 제공함."},{"category":"신체","programs":["슬링재활운동"],"status":"일반","text":"허리가 불편하여 의자 깊숙이 앉도록 유도한 후 진행함. 슬링 덕분에 허리에 무리없이 하체운동을 할 수 있었다고 하심."},{"category":"신체","programs":["슬링 재활운동"],"status":"일반","text":"허리가 아프다고 하셨지만 그래도 운동에 나와서 최대한 스트레칭을 하면서 회복하려고 노력하셨음."},{"category":"신체","programs":["슬링재활운동"],"status":"일반","text":"허리통증으로 인해 오래 서있기 힘들어하시나, 앉아서 안전하게 진행되는 슬링 하체운동에는 부담없이 전 과정 참여하심."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"일반","text":"허리통증으로 천천히 공을 던져보심."},{"category":"신체","programs":["프로그램 그룹 전체"],"status":"일반","text":"활동 과정에서 자연스럽게 웃음과 대화가 증가하는 모습을 보임."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"일반","text":"활동 내내 인지기능 촉진을 위해 지속적인 말벗서비스를 제공하였으며, 지지적인 환경 속에서 안전하게 프로그램을 마침."},{"category":"신체","programs":["프로그램 그룹 전체"],"status":"일반","text":"활동 전보다 점차 던지는 힘과 방향 조절이 향상되는 모습을 보임."},{"category":"신체","programs":["프로그램 그룹 전체"],"status":"일반","text":"활동 중 어르신 간 응원과 격려가 이루어져 긍정적인 분위기가 형성됨."},{"category":"신체","programs":["웃음치료"],"status":"일반","text":"활동 후 몸이 가볍다고 말씀하심."},{"category":"신체","programs":["소망오락관(점수쏙쏙! 공넣기!)"],"status":"일반","text":"활동에는 참여하시지 않으셨으나 어르신들의 경기에는 뒤에서 응원을 해주셨음."},{"category":"신체","programs":["민요체조"],"status":"일반","text":"휴식 없이 끝까지 참여하심."},{"category":"신체","programs":["민요체조"],"status":"일반","text":"흥얼거리며 자연스럽게 노래에 동참하심."},{"category":"신체","programs":["백세체조"],"status":"적극","text":"\"내가 젊었을때 춤을 잘췄다\"며 과거를 회상하심. 인지저하 어르신의 장기기억을 자극하는 계기가 되었으며, 기분이 매우 고조되어 평소보다 활기차게 팔다리를 움직이심."},{"category":"신체","programs":["백세체조"],"status":"적극","text":"'젊은 나의 그대와' 작품을 배우는 동안 \"노래 가사가 꼭 내 젊은 날 이야기 같다\"라며 깊이 몰입하셨고, 새로 배운 손유희 동작을 완벽히 마스터한 후 주변 어르신들에게 동작을 알려주며 리더십을 보이심."},{"category":"신체","programs":["슬링재활운동"],"status":"적극","text":"1~10번 동작의 순서를 기억하고 강사보다 먼저 동작을 취할 정도로 높은 집중력과 인지력을 보여주심."},{"category":"신체","programs":["대왕윷놀이"],"status":"적극","text":"3판 2선승제 경기 내내 점수판과 말판을 주시하며 우리가 이기고 있다고 기뻐하시는 동"],"status":"적극","text":"다리부종이 자주 있는 편인데, 하체순환운동 동작을 하고 나니 발목과 종아리가 시원하다며 지속적인 참여 의사를 밝히심."},{"category":"신체","programs":["백세체조"],"status":"적극","text":"다리운동 중 무릎 올리기 동작을 아주 바른 자세로 수행하셨고, 다리에 힘이 들어가는 게 느껴진다며 운동효과에 만족해하심."},{"category":"신체","programs":["슬링재활운동"],"status":"적극","text":"다리운동을 하면서도 입으로는 계속 노래를 흥얼거리실 정도로 높은 흥미와 만족감을 나타내심."},{"category":"신체","programs":["대왕윷놀이"],"status":"적극","text":"다소 소극적인 성향이나 팀원들이 성함을 연호하며 응원해주자 쑥스러워하면서도 즐겁게 윷을 던지심."},{"category":"신체","programs":["민요체조"],"status":"적극","text":"다양한 색상의 스카프를 보며 즐거워하심"},{"category":"신체","programs":["슬링재활운동"],"status":"적극","text":"다행스럽게도 운동에 잘 참여하셨고 즐겁게 하셨음."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"적극","text":"단기기억 저하로 점수계산 규칙은 이해하지 못하셨지만, 탁구공이 계란판 안으로 쏙 들어가는 시각적 피드백에 크게 신기해하며 웃으심."},{"category":"신체","programs":["백세체조"],"status":"적극","text":"대동작 운동 시 유연성이 돋보이셨으며, 강사의 구령 소리에 맞춰 밴드를 당기고 푸는 완급 조절을 가장 훌륭하게 소화하심."},{"category":"신체","programs":["대왕윷놀이"],"status":"적극","text":"대왕윷을 바닥으로 굴리는 방식으로 참여하시며 끝까지 포기하지 않는 모습을 보이심."},{"category":"신체","programs":["대왕윷놀이"],"status":"적극","text":"대왕윷을 양손으로 힘차게 던지며 모나와 하고 크게 외치시는 등 매우 적극적이고 유쾌하게 참여하심."},{"category":"신체","programs":["대왕윷놀이"],"status":"적극","text":"대왕윷을 양손으로 힘차게 던지며 모나와라 하고 크게 외치시는 등 매우 적극적이고 유쾌하게 참여하심"},{"category":"신체","programs":["대왕윷놀이"],"status":"적극","text":"대왕윷의 큰 크기에 신기해하시며 프로그램 내내 윷을 품에 안고 계시는 등 친밀감을 보이셨고, 던질 때마다 크게 웃으심."},{"category":"신체","programs":["대왕윷놀이"],"status":"적극","text":"대왕윷이 뒤집힐 때마다 벌떡 일어나 확인하실 정도로 열정적으로 참여하셨으며, 승부욕을 보이며 활기찬 모습을 보이심."},{"category":"신체","programs":["대왕윷놀이"],"status":"적극","text":"대왕윷이 무거울까 걱정하셨으나, 막상 본인 차례가 되자 양손으로 높이 던지며 매우 흡족해하심."},{"category":"신체","programs":["대왕윷놀이"],"status":"적극","text":"대왕윷이 무겁지 않다며 양손으로 높이 들어올려 시원하게 던지시고 상지근력운동에 적극적으로 참여하심."},{"category":"신체","programs":["대왕윷놀이"],"status":"적극","text":"도나 개가 나와도 실망하지 않고 다음 차례에 잘하면 된다며 팀원들을 격려하는 긍정적인 모습을 보이심."},{"category":"신체","programs":["슬링재활운동"],"status":"적극","text":"동작 순서(1~10번)를 기억하기 어려워하셨으나, 요양보호사의 밀착시범과 신체적 지지를 통해 안전하게 전 동작을 따라하심. 트로트 음악에 맞춰 손뼉을 치며 즐거워하심."},{"category":"신체","programs":["슬링 재활운동"],"status":"적극","text":"동작 하나하나가 정확했고 선생님의 지시사항을 놓치지 않으려는 집중력도 있으심."},{"category":"신체","programs":["슬링재활운동"],"status":"적극","text":"동작도 좋고 참여도도 좋고 구령도 붙이면서 가장 잘 따라해주신 어르신임."},{"category":"신체","programs":["슬링재활운동"],"status":"적극","text":"동작수행능력이 우수하여 타 어르신들의 모범이 되었으며, 강사의 칭찬에 뿌듯해하며 성취감을 표현하심."},{"category":"신체","programs":["슬링재활운동"],"status":"적극","text":"동작수행에 집중을 잘하셨고 목소리도 크게 내셨음."},{"category":"신체","programs":["웃음치료"],"status":"적극","text":"동작을 기억하여 먼저 수행하려고 하심."},{"category":"신체","programs":["웃음치료"],"status":"적극","text":"동작을 따라 하며 성취감을 표현하심."},{"category":"신체","programs":["웃음치료"],"status":"적극","text":"동작을 따라하며 연신 미소를 보이심."},{"category":"신체","programs":["웃음치료"],"status":"적극","text":"동작을 따라하며 연신 웃음을 보이심."},{"category":"신체","programs":["슬링 재활운동"],"status":"적극","text":"동작을 자주 잊으시어 옆에서 하나, 둘 구령을 붙여드리자, 구령에 맞춰 무릎 굽히기 동작을 끝까지 수행하심."},{"category":"신체","programs":["슬링 재활운동"],"status":"적극","text":"동작이면 동작, 구령이면 구령, 모두 잘 하시는 어르신임. 슬링운동에 대한 만족감도 높은 어르신임."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"적극","text":"두 가지 던지기 게임에서 모두 우수한 성적을 거두셨고, 활동 후 젊어진 기분이다라며 크게 만족하심."},{"category":"신체","programs":["백세체조"],"status":"적극","text":"루프밴드를 발목에 걸고 진행한 하체 근력 운동 시, 다리를 양옆으로 벌리는 동작을 힘차게 수행하며 하체 근력 유지에 적극적인 모습을 보이심."},{"category":"신체","programs":["백세체조"],"status":"적극","text":"루프밴드의 저항을 잘 이용하여 상체 당기기 동작을 힘차게 수행하심."},{"category":"신체","programs":["백세체조"],"status":"적극","text":"루프밴드의 저항을 잘 활용하여 하체(다리 벌리기) 운동 시 가장 올바른 자세로 참여하셨으며, \"밴드를 쓰니까 근육에 힘이 더 들어가는 것 같다\"라며 운동 효과에 높은 만족감을 표하심."},{"category":"신체","programs":["백세체조"],"status":"적극","text":"루프밴드의 탄성을 잘 이용하여 상·하체 동작을 힘차게 수행하며 우수한 근력을 보이심."},{"category":"신체","programs":["웃음치료"],"status":"적극","text":"리듬에 맞춰 큰 소리로 구호를 외치심"},{"category":"신체","programs":["슬링재활운동"],"status":"적극","text":"마르셔서 약할 것 같은 외모를 가지고 계신데 운동만 들어가면 적극적인 모습을 보여주심."},{"category":"신체","programs":["웃음치료"],"status":"적극","text":"마무리 체조까지 성실하게 참여하심."},{"category":"신체","programs":["대왕윷놀이"],"status":"적극","text":"말씀이 없으시고 내성적인 성향이나, 팀원들이 어르신 차례예요 하고 응원해주자 쑥스러워하시면서도 힘차게 윷을 던지심."},{"category":"신체","programs":["대왕윷놀이"],"status":"적극","text":"말을 업어서 갈 것인지 따로 갈 것인지 선생님의 질문에 엎어서 가자고 명확하게 의견을 표현하심."},{"category":"신체","programs":["대왕윷놀이"],"status":"적극","text":"말이 잡히고 잡는 단순한 인지적인 과관계를 설명해드렸을 때 크게 기뻐하시며 적극적인 상호작용 행동을 보이심."},{"category":"신체","programs":["대왕윷놀이"],"status":"적극","text":"말판 이동방향을 혼동하셨으나 동료들의 도, 개, 걸 구호에 맞춰 즐겁게 박수치심."},{"category":"신체","programs":["슬링재활운동"],"status":"적극","text":"먼저 와서 순서를 기다릴 만큼 이 운동을 좋아하심. 동작수행 및 구령도 제일 잘하시는 어르신 중 한 분임."},{"category":"신체","programs":["슬링재활운동"],"status":"적극","text":"모든 동작을 잘 수행하셨고 구령도 잘 붙이시면서 즐거운 분위기를 만들어주심."},{"category":"신체","programs":["슬링 재활운동"],"status":"적극","text":"모든 동작을 잘 수행하셨고 선생님 지시도 잘 따라주시는 어르신임."},{"category":"신체","programs":["슬링재활운동"],"status":"적극","text":"목소리도 크게 내셨고 동작수행도 열심히 잘하셨음. 참여도는 항상 좋은 어르신임."},{"category":"신체","programs":["프로그램 그룹 전체"],"status":"적극","text":"목표물을 쓰러뜨린 후 스스로 성취감을 표현하며 만족해하심."},{"category":"신체","programs":["프로그램 그룹 전체"],"status":"적극","text":"목표물이 넘어질 때마다 웃으며 긍정적인 반응을 보임."},{"category":"신체","programs":["백세체조"],"status":"적극","text":"몸풀기 스트레칭부터 본운동까지 모든 동작을 모범적으로 수행하며 활기차게 참여하심."},{"category":"신체","programs":["백세체조"],"status":"적극","text":"몸풀기 스트레칭부터 적극적으로 참여하며 상·하체 관절을 부드럽게 이완하심."},{"category":"신체","programs":["슬링 재활운동"],"status":"적극","text":"물리치료를 받고 참여를 못 하실 줄 알았지만 운동을 하겠다고 하고 치료가 끝나자마자 나오심. 동작수행은 좋고 가동범위도 상당히 좋았음."},{"category":"신체","programs":["슬링재활운동"],"status":"적극","text":"미리 선생님 뒤에 와서 연습을 하신 후 운동을 하니 더 즐겁게 운동을 하신 것 같음."},{"category":"신체","programs":["민요체조"],"status":"적극","text":"민요가 나오자 익숙한 곡이라며 반가워하심"},{"category":"신체","programs":["민요체조"],"status":"적극","text":"민요를 큰 목소리로 따라 부르며 즐겁게 참여하심."},{"category":"신체","programs":["민요체조"],"status":"적극","text":"민요와 장구 장단에 맞춰 신체활동을 하며 즐겁고 활기차게 프로그램을 마무리함."},{"category":"신체","programs":["민요체조"],"status":"적극","text":"박수를 치며 다른 어르신들과 호응하심."},{"category":"신체","programs":["소망노래방","웃음치료"],"status":"적극","text":"박수치기 활동에 적극 참여하심."},{"category":"신체","programs":["웃음치료"],"status":"적극","text":"박자에 맞춰 발을 구르며 즐겁게 참여하심."},{"category":"신체","programs":["민요체조","소망노래자랑"],"status":"적극","text":"반복되는 후렴을 자신감 있게 따라 부르심."},{"category":"신체","programs":["슬링재활운동"],"status":"적극","text":"밝게 웃는 모습으로 운동을 하셨음. 그러나 방향인지 저하가 보였음. 그래도 끝까지 열심히 하셨음."},{"category":"신체","programs":["슬링 재활운동"],"status":"적극","text":"밝게 웃으시면서 운동에 참여하셨고 오른쪽 어깨 관련 운동을 제외하고 나머지는 잘 수행하셨음."},{"category":"신체","programs":["슬링 재활운동"],"status":"적극","text":"밝게 웃으시면서 운동에 참여하심. 모든 동작을 잘 하셨고 구령도 붙이려고 노력하는 모습도 보이셨음."},{"category":"신체","programs":["슬링 재활운동"],"status":"적극","text":"밝게 웃으시면서 운동을 하셨음. 동작수행도 잘 하셨고 구령도 큰 소리를 내시면서 운동을 하셨음."},{"category":"신체","programs":["웃음치료"],"status":"적극","text":"밝은 표정으로 프로그램에 참여하심"},{"category":"신체","programs":["백세체조"],"status":"적극","text":"밴드를 활용한 허벅지 근력운동 시 다리를 곧게 뻗으며 우수한 신체능력을 보이심."},{"category":"신체","programs":["대왕윷놀이"],"status":"적극","text":"복잡한 윷판의 길을 계산하는 것은 어려워하셨으나, 윷을 던져 나온 결과를 요양보호사와 함께 확인하며 소통하는 기쁨을 누리심."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"적극","text":"복합적인 레크레이션 구성에 높은 만족도를 표하셨고, 팀의 승패와 상관없이 즐거웠다고 소감을 전하심."},{"category":"신체","programs":["슬링재활운동"],"status":"적극","text":"본격적인 슬링운동 전 트로트에 맞춘 상체 스트레칭에 흥겹게 참여하며 전신 웜업을 완료함."},{"category":"신체","programs":["대왕윷놀이"],"status":"적극","text":"본인 팀이 말판에서 잡힐 때마다 아쉬워하면서도, 다음 차례에 역전하자며 팀원들을 격려하는 적극성을 보임."},{"category":"신체","programs":["대왕윷놀이"],"status":"적극","text":"본인 팀이 최종 승리하자 만세를 부르며 어린아이처럼 기뻐하시고 정서적으로 큰 만족감을 나타내심."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"적극","text":"본인의 점수가 낮게 나오자 \"아쉽다, 한 번만 더 던지면 잘할 수 있다\"며 아쉬워하면서도 끝까지 유쾌하게 참여하심."},{"category":"신체","programs":["대왕윷놀이"],"status":"적극","text":"본인의 차례가 아닐 때도 앉은 자리에서 청팀 이겨라를 외치며 적극적으로 팀을 응원하심."},{"category":"신체","programs":["대왕윷놀이"],"status":"적극","text":"빈뇨증상으로 경기 중간에 화장실을 다녀오셨으나, 다녀오신 후에도 우리 팀이 이기고 있냐고 물으시며 경기에 높은 관심을 보이심."},{"category":"신체","programs":["대왕윷놀이"],"status":"적극","text":"빈뇨증상으로 중간에 화장실을 다녀오신 후에도 팀스코어를 물으며 높은 관심을 보이심"},{"category":"신체","programs":["대왕윷놀이"],"status":"적극","text":"상대팀 말이 우리팀 말에 잡히자 아이고 아깝다 하시며 게임에 완전히 몰입하여 즐기심."},{"category":"신체","programs":["대왕윷놀이"],"status":"적극","text":"상대팀의 말이 바로 뒤에 쫓아오자 잡히면 안된다며 긴장감과 재미를 동시에 느끼심."},{"category":"신체","programs":["대왕윷놀이"],"status":"적극","text":"상대팀이 모나 윷이 나오면 함께 박수를 쳐주는 등 높은 스포츠맨십을 보여주며 분위기를 화기애애하게 이끎."},{"category":"신체","programs":["대왕윷놀이"],"status":"적극","text":"상대팀이 잘 던졌을 때도 아낌없이 축하의 박수를 보내주시며 매너있게 게임에 동참하심."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"적극","text":"상대팀인 홍팀 어르신이 높은 점수를 얻었을 때도 아낌없이 박수를 쳐주며 성숙한 태도로 레크리에이션을 즐기심."},{"category":"신체","programs":["백세체조"],"status":"적극","text":"상체근육 자극 시 어깨와 등근육을 바른 자세로 펴고 운동에 몰입하심."},{"category":"신체","programs":["백세체조"],"status":"적극","text":"새로 배운 작품의 안무를 빠르게 습득하셨으며, 가사 중 '그대'라는 단어가 나올 때 앞자리 어르신을 가리키는 재치를 보여주며 분위기를 밝혀주심."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"적극","text":"색깔계란판에 탁구공을 연달아 명중시킨 후 만세를 부르며 큰 성취감을 나타냄."},{"category":"신체","programs":["소망오락관(점수쏙쏙! 공넣기!)"],"status":"적극","text":"서로간의 응원도 열심히 해주시고, 본인 경기 때도 공을 힘껏 던져 박스에 들어가니 좋아하셨음."},{"category":"신체","programs":["백세체조"],"status":"적극","text":"서서하는 균형잡기나 다리들기 동작은 하지근력 약화로 안전상 무리가 있어 의자에 착석하여 진행함. 상체 스트레칭과 손뼉치기 위주로 적극적으로 참여하셨으며, 본인의 신체가동범위 내에서 안전하게 운동함."},{"category":"신체","programs":["슬링재활운동"],"status":"적극","text":"선생님이 너무 잘 지도해준다고 웃으시면서 말을 해주셨음."},{"category":"신체","programs":["프로그램 그룹 전체"],"status":"적극","text":"성공 후 주변 어르신에게 자랑하거나 웃으며 긍정적인 감정을 표현함."},{"category":"신체","programs":["실내레크레이션(단오놀이활동)"],"status":"적극","text":"소고도 신나게 두드리시고 율동도 열심히 하시면서 흥겹게 활동에 잘 참여하셨음."},{"category":"신체","programs":["이구동성 레크레이션","이야기여행"],"status":"적극","text":"소근육과 상지관절기능이 양호하여 대형주사위를 양손으로 높이 들어올린 후 멀리 던지는 등 적극적인 신체활동을 수행하심."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"적극","text":"소외감을 느끼지 않도록 차례를 자주 챙겨드렸으며 점수를 얻은 후 자존감이 고취됨."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"적극","text":"손놀림이 다소 굳어있었으나 백업체조를 통해 소근육을 이완한 후 안전하게 참여함."},{"category":"신체","programs":["민요체조"],"status":"적극","text":"손뼉을 치며 장단에 맞춰 즐겁게 활동하심."},{"category":"신체","programs":["백세체조"],"status":"적극","text":"손유희 작품 동작을 반복적으로 연습하면서 인지적 자극을 받으셨고, 노래 리듬에 딱 맞춰 동작을 성공시킨 후 성취감에 환하게 웃으심."},{"category":"신체","programs":["웃음치료"],"status":"적극","text":"손을 좌우로 흔들며 즐겁게 참여하심"},{"category":"신체","programs":["슬링재활운동"],"status":"적극","text":"손톱을 뽑았는데도 불구하고 운동을 하러 가자고 하니 운동이 참 좋다고 하시면서 잘 참여하셨음."},{"category":"신체","programs":["백세체조"],"status":"적극","text":"숫자게임 중 복잡한 연산이 필요한 부분에서도 빠르게 두뇌를 회전하여 정답을 맞추는 등 인지유지 상태가 우수하심."},{"category":"신체","programs":["백세체조"],"status":"적극","text":"숫자게임에 높은 집중력을 보이셨고, 본인의 차례가 아닐 때도 다른 어르신들이 문제를 맞힐 수 있도록 힌트를 주며 즐거워하심."},{"category":"신체","programs":["민요체조"],"status":"적극","text":"스카프를 양손으로 펼치고 흔들며 흥겨워하심."},{"category":"신체","programs":["민요체조"],"status":"적극","text":"스카프를 위아래로 흔들며 즐겁게 참여하심."},{"category":"신체","programs":["민요체조"],"status":"적극","text":"스카프를 이용한 율동에 큰 흥미를 보이심."},{"category":"신체","programs":["웃음치료"],"status":"적극","text":"스트레칭 동작을 적극적으로 따라 하심."},{"category":"신체","programs":["슬링재활운동"],"status":"적극","text":"슬링 하체운동 후 \"다리가 묵직하니 운동한 효과가 제대로 나는 것 같다\"며 높은 만족감을 표하심."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"적극","text":"승부욕이 강하셔서 상대팀이 점수를 낼 때 긴장하는 모습을 보이셨으나, 본인 차례에서 오재미를 연달아 성공시키며 만족스러운 미소를 지으심."},{"category":"신체","programs":["대왕윷놀이"],"status":"적극","text":"승부욕이 매우 강한 어르신으로, 홍이겨라! 이겨라! 구호를 외치며 프로그램실 전체 분위기를 활기차게 이끄심."},{"category":"신체","programs":["백세체조"],"status":"적극","text":"시각적 모방 능력이 우수하여 강사의 손모양과 밴드 활용 방향을 정확하게 인지하고, 한 치의 오차 없이 깔끔하게 작품을 수행하심."},{"category":"신체","programs":["실내레크레이션(하늘에 별을 따자)"],"status":"적극","text":"신나게 흘러나오는 음악에 맞추어 노래도 같이 따라 부르시고 율동체조도 열심히 잘 따라하셨음."},{"category":"신체","programs":["프로그램 그룹 전체"],"status":"적극","text":"신나게 흘러나오는 음악에 맞추어 노래도 흥겹게 잘 따라 부르시면서 흥겹게 활동에 적극적으로 잘 참여하셨음."},{"category":"신체","programs":["실내레크레이션"],"status":"적극","text":"신나게 흘러나오는 음악에 맞추어 율동도 열심히 하시고 노래도 같이 잘 따라 부르셨음."},{"category":"신체","programs":["실버체조"],"status":"적극","text":"신나게 흘러나오는 음악에 맞추어 율동체조를 열심히 하시면서 적극적으로 활동에 임하셨음."},{"category":"신체","programs":["실내레크레이션"],"status":"적극","text":"신나게 흘러나오는 음악에 맞추어 즐겁게 율동도 잘 따라하시고 노래도 같이 따라 부르시면서 적극적으로 활동에 임하셨음."},{"category":"신체","programs":["실버체조"],"status":"적극","text":"신나게 흘러나오는 음악에 맞추어 즐겁게 율동을 하시고 노래도 같이 따라 부르시면서 흥겹게 활동에 잘 참여하셨음."},{"category":"신체","programs":["실버체조"],"status":"적극","text":"신나게 흘러나오는 음악에 맞추어 즐겁게 활동에 잘 참여하셨음."},{"category":"신체","programs":["실버체조"],"status":"적극","text":"신나는 음악에 맞추어 강사님을 보시면서 율동도 열심히 하시면서 흥겹게 활동에 잘 참여하셨음."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"적극","text":"신나는 음악에 맞춰 백업도구를 힘차게 흔들며 스트레스를 전량 해소하셨음."},{"category":"신체","programs":["웃음치료"],"status":"적극","text":"신나는 음악에 맞춰 큰 박수를 치며 호응하심."},{"category":"신체","programs":["웃음치료"],"status":"적극","text":"신나는 음악에 크게 웃으심."},{"category":"신체","programs":["슬링재활운동"],"status":"적극","text":"신나는 트로트 음악 덕분에 힘든 하체 반복운동도 지치지 않고 시종일관 밝은 표정으로 참여함."},{"category":"신체","programs":["백세체조"],"status":"적극","text":"신바람 걷기체조 시 동작이 매우 민첩하고 크셨으며, 다리운동을 통해 몸이 한결 가벼워졌다며 높은 만족감을 표현하심."},{"category":"신체","programs":["백세체조"],"status":"적극","text":"신바람 걷기체조 음악에 맞춰 어깨춤을 추시는 등 정서적으로 매우 흥겨워하셨고, 하체운동을 끝까지 지치지 않고 소화하심."},{"category":"신체","programs":["백세체조"],"status":"적극","text":"신바람 걷기체조의 빠른 박자에도 길을 잃지 않고 발을 맞추며, 하체근력과 운동신경이 건재함을 스스로 증명해 보이심."},{"category":"신체","programs":["백세체조"],"status":"적극","text":"신체 표현 작품을 배우는 동안 옛 노래 멜로디에 깊이 몰입하셨으며, 노래가 끝난 후에도 가사를 흥얼거리며 높은 만족도와 심리적 안정감을 보이심."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"적극","text":"신체능력이 양호하여 과녁판과의 거리를 멀리 두고 던지는 도전을 즐기며 성취감을 만끽하심."},{"category":"신체","programs":["슬링재활운동"],"status":"적극","text":"아직은 미흡한 동작이 많지만 그래도 운동하자고 하면 예전과는 다르게 적극적으로 참여하는 모습을 보여주심."},{"category":"신체","programs":["슬링 재활운동"],"status":"적극","text":"안 하겠다는 예전에 비해 오늘은 잘 참여를 하셨고 선생님을 뚫어지게 쳐다보면서 동작수행을 하셨음."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"적극","text":"앉아서 진행하셨으며, 팀의 승리를 위해 팔을 힘차게 뻗어 오재미를 던지는 적극성을 보여주심."},{"category":"신체","programs":["슬링재활운동"],"status":"적극","text":"약간 기분이 저기압이였는데 운동을 하신 후 웃으시면서 기분이 올라갔음."},{"category":"신체","programs":["백세체조"],"status":"적극","text":"양손으로 밴드를 늘리는 소근육 운동에 높은 집중력을 보이셨으며, 전반적인 전신 운동 동작을 정확한 자세로 모방하며 유연성을 발휘하심."},{"category":"신체","programs":["민요체조"],"status":"적극","text":"양팔을 높이 들어올리며 적극적으로 참여하심."},{"category":"신체","programs":["백세체조"],"status":"적극","text":"어깨 관절이 뻣뻣하다고 하셨으나, 밴드의 탄성을 활용하여 무리하지 않는 범위 내에서 상체 스트레칭을 끝까지 완료하시고 시원하다며 만족해하심."},{"category":"신체","programs":["슬링재활운동"],"status":"적극","text":"어깨가 아프다고 하셔서 운동을 하면 조금 풀릴 것이라고 말씀을 드렸더니 끝까지 잘하셨음."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"적극","text":"어깨관절의 가동범위가 좁아 오재미를 멀리 던지진 못하셨으나, 과녁판 거리를 좁혀드려 성공의 성취감을 드림."},{"category":"신체","programs":["웃음치료"],"status":"적극","text":"어깨와 팔 운동에 적극적으로 참여하심"},{"category":"신체","programs":["대왕윷놀이"],"status":"적극","text":"어깨통증을 고려하여 가볍게 굴리는 방식으로 참여를 유도하였으며 무리없이 활동을 완수하심."},{"category":"신체","programs":["슬링재활운동"],"status":"적극","text":"어께운동을 할 때 더 적극적으로 참여하는 모습을 보여주심. 어색한 동작이 있지만 조금씩 고쳐지고 있음."},{"category":"신체","programs":["백세체조"],"status":"적극","text":"어르신은 루프밴드 사용법 인지가 다소 늦어 요양보호사의 1:1 밀착 보조로 동작을 수행함. 그러나 가요 '난생 처음 여자가 되던 날'이 흘러나오자 옛 기억이 나시는 듯 가사를 정확히 따라 부르셨고, \"내가 시집가던 날이 생각난다\"라며 젊은 시절을 회상하고 환하게 웃으시는 등 정서적 환기 효과가 매우 컸음."},{"category":"신체","programs":["대왕윷놀이"],"status":"적극","text":"어지러움증이 있어 이동시에는 요양보호사의 밀착보조를 받으셨고, 착석 후에는 적극적으로 청팀의 말을 어디로 보낼지 지시하며 브레인 역할을 하심"},{"category":"신체","programs":["슬링 재활운동"],"status":"적극","text":"어지럽다고 하시면서도 제일 앞줄에 앉아 끝까지 적극적인 모습을 보이시면서 운동을 하셨음."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"적극","text":"언어적 소통은 원활하지 않으나, 팀원들이 응원가를 부를 때 박자에 맞춰 발을 구르고 미소를 짓는 등 긍정적인 신체반응을 보이심."},{"category":"신체","programs":["슬링 재활운동"],"status":"적극","text":"언제나 적극적이고 감사하다는 표현을 하시는 어르신인데 오늘도 똑같은 모습을 보여주심."},{"category":"신체","programs":["슬링재활운동"],"status":"적극","text":"언제부턴가 이 운동에 적극성을 보여주시면서 즐겁게 운동하는 어르신으로 변하고 있음."},{"category":"신체","programs":["백세체조"],"status":"적극","text":"옆 어르신과 속도를 맞춰가며 밴드를 늘리는 등 즐겁게 상호작용하심."},{"category":"신체","programs":["웃음치료"],"status":"적극","text":"옆 어르신과 함께 웃으며 즐겁게 활동하심."},{"category":"신체","programs":["대왕윷놀이"],"status":"적극","text":"옆에 앉은 동료 어르신에게 잘 던졌다고 칭찬을 건네며 프로그램 내내 긍정적인 상호작용을 이어감."},{"category":"신체","programs":["슬링재활운동"],"status":"적극","text":"옆에 앉은 어르신과 동작을 서로 맞춰보며 웃음꽃을 피우셨고, 사교적인 모습으로 유쾌하게 프로그램에 참여하심."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"적극","text":"옆에 앉은 인지저하 어르신이 순서를 헷갈려하자 친절하게 오재미를 쥐여주며 참여를 돕는 따뜻한 상호작용을 보이심."},{"category":"신체","programs":["실내레크레이션(하늘에 별을 따자)"],"status":"적극","text":"옆에 어르신과 담소도 나누시고 즐겁게 활동에 잘 참여하셨음."},{"category":"신체","programs":["소망오락관(점수쏙쏙! 공넣기!)"],"status":"적극","text":"옆에 어르신과 담소도 나누시면서 응원도 열심히 해주시고 본인 경기 때에도 환한 미소를 지으시면서 힘껏 공을 박스에 던져주셨음."},{"category":"신체","programs":["민요체조"],"status":"적극","text":"옆자리 어르신과 함께 노래를 부르며 화기애애한 분위기를 만드심"},{"category":"신체","programs":["이구동성 레크레이션"],"status":"적극","text":"옆자리 어르신이 던지기를 어려워하자 \"천천히 던져보라\"며 다정하게 격려하고 소통하심."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"적극","text":"옆자리 어르신이 던질 때마다 박수를 치며 격려하는 등 훌륭한 협동심을 보임."},{"category":"신체","programs":["슬링 재활운동"],"status":"적극","text":"옆자리 어르신이 운동하는 모습을 유심히 관찰하시다가, 본인 차례가 되자 경쟁심을 보이시며 다리를 더 높이 들려고 노력하심."},{"category":"신체","programs":["백세체조"],"status":"적극","text":"옛 추억을 자극하는 노랫말 덕분에 프로그램 내내 얼굴에 미소가 떠나지 않으셨고, 동료 어르신들과 연신 눈을 맞추며 즐겁게 소통하심."},{"category":"신체","programs":["백세체조"],"status":"적극","text":"오늘 날짜를 손가락으로 정확하게 표현하며 지남력이 아주 건강함을 보이셨고, 숫자게임에도 가장 먼저 정답을 맞추며 적극적으로 참여하심."},{"category":"신체","programs":["슬링재활운동"],"status":"적극","text":"오늘 첫 운동을 하셨는데 너무 좋다고 만족감도 있었고 동작수행도 괜찮게 하셨음."},{"category":"신체","programs":["슬링재활운동"],"status":"적극","text":"오늘 컨디션이 매우 좋으시다며 강사의 구령에 맞춰 우렁찬 목소리로 숫자를 세며 활기차게 운동에 참여하심."},{"category":"신체","programs":["슬링재활운동"],"status":"적극","text":"오늘은 2번이나 운동을 하려고 해서 아직 못한 어르신 위주로 한다고 말씀드리니 알겠다고 긍정적인 표현을 하심."},{"category":"신체","programs":["슬링재활운동"],"status":"적극","text":"오늘은 제일 먼저 운동을 하셨는데 밝게 웃으시면서 하셨고 모든 동작을 큰 문제없이 잘 따라하셨음 이제는 완벽히 동작을 다 이해하셨고 외우셨음. 음악을 들으면서 운동을 하는데 작게 흥얼거리는 모습도 보여주심."},{"category":"신체","programs":["슬링재활운동"],"status":"적극","text":"오늘은 졸지 않고 끝까지 운동을 하셨고 지시사항도 잘 따라주셨음. 동작수행도 훨씬 매끄러워졌음."},{"category":"신체","programs":["슬링 재활운동"],"status":"적극","text":"오늘은 졸지 않고 끝까지 잘 참여하셨고 선생님과 옆에 어르신을 보면서 동작을 잘 따라해주셨음."},{"category":"신체","programs":["슬링 재활운동"],"status":"적극","text":"오늘은 컨디션이 좋은지 목소리도 크게 내시고 동작수행도 적극적으로 하는 모습을 보여주셨음. 지금까지 최고의 상태였음."},{"category":"신체","programs":["백세체조"],"status":"적극","text":"오랜만의 근력운동에 즐거워하시며 얼굴에 시종일관 환한 미소를 지으심."},{"category":"신체","programs":["슬링재활운동"],"status":"적극","text":"오신 지 얼마 되지 않았지만 동작수행을 잘하셨고 항상 운동 후에 선생님께 감사하다는 말을 해주심."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"적극","text":"오재미가 과녁판을 벗어났음에도 \"잘하셨어요!\"라고 칭찬해드리자, 크게 기뻐하시며 정서적 안정을 찾으시는 모습을 보임."},{"category":"신체","programs":["프로그램 그룹 전체"],"status":"적극","text":"오재미가 목표물에 맞아 공이 넘어지자 환한 표정으로 기뻐하심"},{"category":"신체","programs":["이구동성 레크레이션"],"status":"적극","text":"오재미가 조금 빗나가자 한번만 더 던지게 해달라며 적극적인 참여 의사를 밝히셨고 포기하지 않고 끝까지 완수하여 성취감을 느끼심."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"적극","text":"오재미를 던져 최고점수인 과녁 중앙을 맞추신 후, 두 손을 번쩍 들고 환호하며 성취감을 크게 표현하심."},{"category":"신체","programs":["소망오락관(점수쏙쏙! 공넣기!)"],"status":"적극","text":"온 힘을 공에다가 힘껏 던지시면서 즐겁게 활동에 잘 참여하셨음."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"적극","text":"요양보호사 도움으로 적극적으로 참여하심."},{"category":"신체","programs":["대왕윷놀이"],"status":"적극","text":"우리 팀이 역전승을 거두자 만세를 부르며 팀원들과 손을 맞잡는 등 높은 소속감과 성취감을 표현하심."},{"category":"신체","programs":["슬링 재활운동"],"status":"적극","text":"운동 마무리에 \"오늘 운동 잘하셨다\"고 칭찬해드리자, 아이처럼 환하게 웃으시며 박수를 치고 만족감을 표현하심."},{"category":"신체","programs":["슬링재활운동"],"status":"적극","text":"운동 시작 전에는 귀찮아하셨으나, 신나는 음악이 나오자 언제 그랬냐는 듯 어깨를 들썩이며 슬링운동에 적극적으로 몰입하심."},{"category":"신체","programs":["슬링 재활운동"],"status":"적극","text":"운동 중간중간 호흡조절을 스스로 잘 하시며, 허벅지 근육이 단단해지는 것 같다며 운동효과에 매우 만족해하심."},{"category":"신체","programs":["슬링재활운동"],"status":"적극","text":"운동참여도는 좋았고 동작수행을 할 때 웃으시면서 구령도 따라하시면서 즐겁게 하셨음."},{"category":"신체","programs":["슬링재활운동"],"status":"적극","text":"웃으시면서 밝은 분위기를 만들어주셨고 하체보다는 상체운동을 더 열심히 하려고 하심."},{"category":"신체","programs":["슬링 재활운동"],"status":"적극","text":"웃으시면서 운동을 하셨고 동작이해도 좋았고 수행력도 좋았음. 지도 선생님한테 감사하다는 인사를 해주심."},{"category":"신체","programs":["슬링재활운동"],"status":"적극","text":"웃으시면서 운동을 하셨고 전반적인 지시도 잘 따라와주셨음."},{"category":"신체","programs":["웃음치료"],"status":"적극","text":"웃음이 많아지고 표정이 한층 밝아짐."},{"category":"신체","programs":["백세체조"],"status":"적극","text":"유연성과 대근육 근력이 우수하여 강사의 난이도 높은 스트레칭 동작까지 완벽하게 소화하심. 주변 어르신들에게 좋은 본보기가 되었으며, 녁판에 명중시키고 성취감을 느끼심."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"적극","text":"팀원들이 열렬히 이름을 연호하자 못 이기는 척 참여하시며 즐거워하심."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"적극","text":"팀원들이 청팀 이겨라 하고 외치는 응원소리에 맞춰 즐겁게 박수를 치심."},{"category":"신체","programs":["대왕윷놀이"],"status":"적극","text":"팀의 승리를 위해 윷을 던지기 전 심호흡을 하시는 등 진지하고 열정적인 태도로 경기에 임하심."},{"category":"신체","programs":["대왕윷놀이"],"status":"적극","text":"팀의 첫 주자로 나서서 윷을 높이 던져 모를 나오게 해 팀원들의 큰 환호와 박수를 받으심."},{"category":"신체","programs":["백세체조"],"status":"적극","text":"팔 근력을 기르기 위해 나비모양으로 밴드를 늘리는 동작에 강한 집중력을 보이심."},{"category":"신체","programs":["슬링 재활운동"],"status":"적극","text":"팔이 길어서인지 시원하게 동작을 수행하시고 모든 동작을 잘 이해하고 있는 모습을 보여주심."},{"category":"신체","programs":["슬링 재활운동"],"status":"적극","text":"평상시와는 다르게 운동을 2번이나 참여하셔서 즐겁게 운동을 하셨음."},{"category":"신체","programs":["백세체조"],"status":"적극","text":"평소 몸이 찌뿌둥하다는 말씀을 자주 하셨으나, 오늘 전신 스트레칭을 마친 후 \"어깨와 허리가 한결 가볍고 시원하다\"고 말씀하시며 얼굴색이 밝아지고 신체적 만족감을 적극 표현하심."},{"category":"신체","programs":["슬링재활운동"],"status":"적극","text":"평소 무릎관절 통증을 호소하셨으나, 슬링줄이 체중을 분산시켜주어 통증 없이 편안하게 무릎굽힘 동작을 수행하셨다고 만족해하심."},{"category":"신체","programs":["백세체조"],"status":"적극","text":"평소 소극적이셨으나 오늘 숫자게임에서는 큰 목소리로 정답을 외치시는 등 이례적으로 높은 주도성과 몰입도를 보이심."},{"category":"신체","programs":["웃음치료"],"status":"적극","text":"평소 소극적이었으나 음악이 나오자 적극적으로 반응하심."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"적극","text":"평소 소극적인 편이었으나 팀대항전이 시작되자 큰 목소리로 응원하며 몰입함."},{"category":"신체","programs":["백세체조"],"status":"적극","text":"평소 신체 활동에 소극적인 편이었으나, 원형 밴드를 양손에 쥐어드리자 흥미를 보이시며 팔을 위로 뻗는 동작을 적극적으로 따라 하심."},{"category":"신체","programs":["슬링재활운동"],"status":"적극","text":"평소 신체활동에 소극적이었으나 상체 준비운동으로 몸을 풀자 본 슬링운동까지 적극적으로 동참함."},{"category":"신체","programs":["슬링재활운동"],"status":"적극","text":"평소 신체활동에 소극적인 편이셨으나, 흥겨운 음악 덕분인지 오늘은 거부감 없이 전동작을 즐겁게 따라하심."},{"category":"신체","programs":["대왕윷놀이"],"status":"적극","text":"평소 조용한 성격이었으나 경기가 시작되자 큰 목소리로 응원가를 부르며 반전매력을 보이심."},{"category":"신체","programs":["슬링재활운동"],"status":"적극","text":"평소 좋아하는 트로트음악이 나오자 박수를 치며 매우 기뻐하셨고, 슬링 하체운동 1~10번 동작을 적극적으로 따라하심."},{"category":"신체","programs":["슬링재활운동"],"status":"적극","text":"평소 좋아하시는 트로트곡이 나오자 큰 소리로 따라 부르시며, 음악 박자에 맞춰 1~10번 하체동작을 가장 활기차게 수행하심."},{"category":"신체","programs":["슬링재활운동"],"status":"적극","text":"평소보다 다리부종이 가라앉은 상태로, 통증없이 1번부터 10번까지의 모든 하체가동운동을 안전하게 완수하심."},{"category":"신체","programs":["대왕윷놀이"],"status":"적극","text":"평소보다 목소리도 크고 활력 넘치는 모습을 보이셨으며 프로그램 종료 후 오랜만에 속이 다 시원하게 웃었다고 만족해하심."},{"category":"신체","programs":["대왕윷놀이"],"status":"적극","text":"평소보다 목소리를 크게 내어 홍팀 응원가를 부르며 참여하셨고, 경기에 완전히 몰입하여 즐거워하심."},{"category":"신체","programs":["대왕윷놀이"],"status":"적극","text":"평소보다 신체 컨디션이 좋아보이셨으며 대왕윷을 던질 때 상체를 크게 움직이며 활기차게 참여하심."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"적극","text":"평소보다 신체 활력이 매우 좋으셨음. 오재미를 힘차게 던지며 상지근력을 뽐내셨고, 게임 내내 박수를 치며 동료들을 응원하심."},{"category":"신체","programs":["대왕윷놀이"],"status":"적극","text":"평소에는 조용한 성격이셨으나, 윷놀이가 시작되자 누구보다 큰 목소리로 응원가를 부르며 반전매력을 보여주심."},{"category":"신체","programs":["대왕윷놀이"],"status":"적극","text":"프로그램 내내 얼굴에 웃음이 떠나지 않으심."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"적극","text":"프로그램 내내 활기찬 태도로 임하셨고, 주사위 숫자를 크게 외치며 계산능력과 인지력을 유지하는 모습을 보여주심."},{"category":"신체","programs":["대왕윷놀이"],"status":"적극","text":"프로그램 도중 집중력이 저하되어 자리에서 일어나려 하셨으나, 대왕윷을 직접 던져보시도록 차례를 앞당겨드리자 다시 몰입하여 참여하심."},{"category":"신체","programs":["이구동성 레크레이션"],"status":"적극","text":"프로그램 시작부터 끝까지 지치지 않는 기력을 보이셨으며, 팀이 최종승리하자 만세를 부르며 정서적으로 매우 고양된 반응을 보이심."},{"category":"신체","programs":["대왕윷놀이"],"status":"적극","text":"프로그램 시작부터 마무리까지 자리를 이탈하지 않고 팀의 일원으로서 소속감을 느끼며 안정적으로 참여하심."},{"category":"신체","programs":["웃음치료"],"status":"적극","text":"프로그램 시작전부터 기대감을 보이며 밝은 표정으로 참여하심."},{"category":"신체","programs":["웃음치료"],"status":"적극","text":"프로그램 시작전부터 기대하는 모습을 보이심"},{"category":"신체","programs":["웃음치료"],"status":"적극","text":"프로그램 종료 후 감사 인사를 전하며 강사님에게 환하게 웃어주시고 매우 흡족해하심"},{"category":"신체","programs":["웃음치료"],"status":"적극","text":"프로그램 종료를 아쉬워하며 다음시간을 기다리겠다고 말씀하심."},{"category":"신체","programs":["웃음치료"],"status":"적극","text":"프로그램 종료를 아쉬워하심."},{"category":"신체","programs":[" },{"category":"인지","programs":["이야기여행"],"status":"결석","text":"프로그램 도중 외출"},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"소극","text":"가벼운 두통과 기력저하를 호소하시며 프로그램 참여에 피로감을 보이심. 무리하게 채색을 강요하지 않고 다른 어르신들이 참여하는 모습을 관찰하시도록 유도하였으며, 지속적인 휴식과 컨디션 체크를 실시함"},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"소극","text":"가위 사용 시 약간의 도움이 필요했음."},{"category":"인지","programs":["신나는 빙고게임"],"status":"소극","text":"가위사용이 다소 어려웠으나 지속적인 격려로 활동을 완료하심."},{"category":"인지","programs":["신나는 빙고게임"],"status":"소극","text":"가위질과 붙이기 활동시 지속적인 안내가 필요하였으나 차분하게 따라하며 프로그램을 마무리하심."},{"category":"인지","programs":["인지재활(빙고게임)"],"status":"소극","text":"가위질도 잘 하시고 빙고판에 그림과 숫자를 알맞게 잘 붙이셨음."},{"category":"인지","programs":["인지재활(빙고게임)"],"status":"소극","text":"가위질은 잘 하시나, 활동 전반적으로 옆에서 도움이 필요하였음."},{"category":"인지","programs":["신나는 빙고게임"],"status":"소극","text":"게임 중반 이후 \"머리가 띵하다\"며 피로감을 호소하심. 빙고판 채우기를 중단하고 따뜻한 차를 대접하며 휴식을 취하게 유도함. 무리하지 않는 선에서 다른 어르신들의 게임을 구경하시는 것으로 대체함"},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"소극","text":"결석 차분하게 자리에 앉아 도안지에 색칠은 꼼꼼하게 잘하시나 가위를 사용하여 오리실 때에는 옆에서 도와드려야 했음."},{"category":"인지","programs":["맞춤형 자율인지학습(색칠하기)"],"status":"소극","text":"그림 도안에 알맞지 않게 색칠 선택을 하셔서 부분적 도움을 드려 그림을 완성하실 수 있도록 도와드림"},{"category":"인지","programs":["신나는 빙고게임"],"status":"소극","text":"글자를 자르고 붙이는 순서를 자주 잊으시는 모습이 관찰됨. 단계별로 이제 풀칠해서 붙여볼까요?하고 지속적인 구두지시를 제공하여 끝까지 참여를 유도함."},{"category":"인지","programs":["신나는 빙고게임"],"status":"소극","text":"난청으로 강사의 목소리가 잘 들리지 않아 게임 흐름을 놓치심. 요양보호사가 어르신 바로 옆에서 큰 목소리와 또박또박한 발음으로 단어를 다시 전달해주어 소외감 없이 게임을 즐기도록 보조함"},{"category":"인지","programs":["이야기여행"],"status":"소극","text":"난청으로 이야기 청취에 어려움이 있어 가까이서 큰 목소리로 요점을 전달함."},{"category":"인지","programs":["신나는 빙고게임"],"status":"소극","text":"낱말카드의 글자를 인지하는 데 어려움이 있어 빙고판 응시에 소극적인 태도를 보이심. 강사의 선창에 맞춰 설날!, 추석! 하고 큰 목소리로 따라 읽으실 수 있도록(복창 유도) 청각적 자극을 지속해서 제공하며 정서적 동참을 이끌어냄."},{"category":"인지","programs":["소망노래방","소망노래자랑"],"status":"소극","text":"노래를 따라 부르시다가 간간히 졸고 계시는 모습을 보이심"},{"category":"인지","programs":["소망노래자랑"],"status":"소극","text":"누워 계셨다 관심을 보이시고 멀리서 앉아서 구경하심"},{"category":"인지","programs":["소망노래방"],"status":"소극","text":"눈을 감고 고개를 뒤로 소파에 기대어 쉬는 모습을 자주 보이심"},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"소극","text":"눈이 잘 안 보이신다 하시어 옆에서 도와드려야 했음."},{"category":"인지","programs":["인지재활(설압자퍼즐&글자맞추기)"],"status":"소극","text":"눈이 잘 안 보이신다 하시어 옆에서 보조가 필요하였음."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"소극","text":"눈이 침침해서 안한다며 소극적인 태도를 보이심. 글씨가 크고 단순한 도안으로 변경해드리고 요양보호사가 옆에서 함께 색을 골라주며 흥미를 유발하자 마음을 열고 중간 이후부터 적극적으로 동참하심."},{"category":"인지","programs":["신나는 빙고게임"],"status":"소극","text":"다소 도움이 필요했으나 종사자의 안내에 따라 끝까지 참여하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"소극","text":"도안지에 색칠은 꼼꼼하게 잘하시나 가위를 사용하여 오리실 때에는 옆에서 도와드려야 했음."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"소극","text":"도움을 받아 꽃모양을 오리심."},{"category":"인지","programs":["신나는 빙고게임"],"status":"소극","text":"독자적인 빙고게임 수행에는 제한이 많아 거부의사를 비추셨으나, 요양보호사가 손을 포개어 잡고 함께 동그라미를 그리며(신체적 지지) 과거 명절에 맛있는 음식을 드셨던 기억을 다정하게 대화로 나누자 편안한 안색으로 끝까지 완수하심."},{"category":"인지","programs":["신나는 빙고게임"],"status":"소극","text":"독자적인 빙고판 완성은 완전하지 못했으나, 강사의 단어 선창을 큰 목소리로 따라 읽으며(복창) 청각적 자극을 활발히 수용하심."},{"category":"인지","programs":["신나는 빙고게임"],"status":"소극","text":"동물이름을 떠올리는 데 다소 어려움을 보였으나 종사자의 힌트와 도움을 받아 끝까지 활동에 참여하심."},{"category":"인지","programs":["이야기여행"],"status":"소극","text":"말벗활동에는 적극적이셨으나 지필활동시 손놀림이 더뎌 지지하며 진행함."},{"category":"인지","programs":["신나는 빙고게임"],"status":"소극","text":"명절단어를 눈으로 인지하는 데 보조가 필요하여, 요양보호사가 손을 위에 얹고 함께 동그라미를 그리며(신체적 지지) 소외감 없이 동참조치함."},{"category":"인지","programs":["이야기여행"],"status":"소극","text":"물건값을 매길 때 다소 혼란스러워하셨으나 일대일 지도로 끝까지 완수함."},{"category":"인지","programs":["소망노래자랑"],"status":"소극","text":"박자를 맞추는 데 어려움이 있었으나 반복 안내 후 따라 하심."},{"category":"인지","programs":["이야기여행"],"status":"소극","text":"반복설명 후 활동을 이해하고 참여함."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"소극","text":"번호 확인 과정을 생략하고 본인이 좋아하는 한두 가지 색상 빨간색으로만 도안 전체를 빠르게 칠하려는 성향을 보이심. 여기는 다른 번호네요 라며 완곡하게 유도하여 다른 색연필을 사용해보실 수 있도록 환기해드림."},{"category":"인지","programs":["소망노래방"],"status":"소극","text":"별다른 관심을 보이시지 않고 자리 이동을 자주 하시고 출입문만 바라보고 계심"},{"category":"인지","programs":["소망노래방"],"status":"소극","text":"별다른 관심을 보이시지 않고 자리애 앉아 경청만 하심"},{"category":"인지","programs":["소망노래자랑"],"status":"소극","text":"별다른 관심을 보이시지 않고 자리에 앉아 주무심"},{"category":"인지","programs":["노래교실"],"status":"소극","text":"별다른 관심을 보이시지 않고 출입문 쪽으로 자리를 몇 번 옮기심"},{"category":"인지","programs":["노래교실"],"status":"소극","text":"별다른 관심을 보이시지 않고 출입문에 앉아 문을 자꾸 열고 나가시는 행동을 보이심"},{"category":"인지","programs":["소망노래방"],"status":"소극","text":"병원 진료 외출 후 중반부터 마라카스를 흔들며 리듬에 맞추려고 하심"},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"소극","text":"색상 매칭은 정확하게 인지하셨으나 손에 쥐는 힘이 약해 색연필을 자주 떨어뜨리심. 요양보호사가 어르신의 손을 가볍게 받쳐드리는 신체적 보조를 제공하여 심리적 위축 없이 끝까지 참여하도록 유도함."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"소극","text":"색연필을 쥐어드리면 색칠은 꼼꼼하게 잘 하시나 활동 전반적으로 옆에서 보조가 필요하였음."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"소극","text":"색연필을 쥐어드리면 색칠은 잘 하시나 활동 전반적으로 옆에서 보조가 필요하였음."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"소극","text":"색칠 도중 주의집중시간이 짧아 자주 색연필을 내려놓으셨으나, 과거 산에 다니셨던 이야기를 건네며 재참여를 유도하자 들판부분을 노란색으로 끝까지 채워넣으심."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"소극","text":"색칠에 다소 서툴러하셨으나 교사의 격려를 받으며 구름과 빗방울을 끝까지 완성도 있게 채워나가심."},{"category":"인지","programs":["프로그램 그룹 5,6등급"],"status":"소극","text":"색칠은 꼼꼼하게 잘 하시나 활동 전반적으로 옆에서 도와드려야 했음."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"소극","text":"색칠은 꼼꼼하게 잘 하시나 활동 전반적으로 옆에서 보조가 필요하였음."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"소극","text":"색칠을 하시는 도중에 팔이 아프셨는지 옆에서 도움을 받으셨음."},{"category":"인지","programs":["신나는 빙고게임"],"status":"소극","text":"성격이 다소 급하신 편으로 글자조각을 대충 자르고 아무칸에나 빠르게 붙이려 하심. 차분하게 순서를 안내해드리며 인지활동의 정밀도를 높일 수 있도록 유도함."},{"category":"인지","programs":["노래교실"],"status":"소극","text":"소극적인 모습을 보였으며 자리에 앉아 감상하며 박수를 간간히 치시면서 활동에 참여하심"},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"소극","text":"소근육 기능저하로 풀칠 과정에서 보조가 필요하였음."},{"category":"인지","programs":["신나는 빙고게임"],"status":"소극","text":"손가락관절의 통증을 표현하셔서 글자자르기는 교사가 전적으로 도왔으며, 어르신은 풀칠과 빙고게임 칩놓기 위주로 참여하여 활동의 부담을 덜어드림."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"소극","text":"손끝의 소근육 기능저하로 채색 속도는 다소 느린 편이었으나, 요양보호사의 격려를 받으며 한 칸 한 칸 정성스럽게 면적을 채워 완성해내심."},{"category":"인지","programs":["신나는 빙고게임"],"status":"소극","text":"손떨림 증상으로 인해 동그라미를 정확하게 치기는 어려워하셨으나, 손을 꼭 쥐고 한 글자씩 정성스럽게 표시하려 노력하심."},{"category":"인지","programs":["맞춤형 자율인지학습(색칠하기)"],"status":"소극","text":"손에 힘이 없어 다소 수행 속도가 늦어 부분적 도움을 드림"},{"category":"인지","programs":["신나는 빙고게임"],"status":"소극","text":"손의 움직임이 다소 느렸으나 끝까지 활동을 마무리하심."},{"category":"인지","programs":["소망노래방"],"status":"소극","text":"수줍어하여 작은 목소리로 참여하였으나 끝까지 활동 유지함."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"소극","text":"숫자와 색깔을 매칭하는 과정에서 간헐적으로 혼동을 보이시어 요양보호사의 언어적 안내를 받음 지지격려 속에 끝까지 포기하지 않고 참여하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"소극","text":"시력저하로 꽃잎 위치를 확인하는 데 도움을 받으심."},{"category":"인지","programs":["신나는 빙고게임"],"status":"소극","text":"시지각능력 둔화로 인해 빙고판의 빈칸과 글자조각의 크기를 매칭하여 붙이는 데 혼란을 느끼심. 풀칠한 조각을 빙고판 위에 엉뚱하게 겹쳐 붙이려고 하실 때마다, 요양보호사가 칸의 위치를 손가락으로 정확히 짚어주며 올바르게 배치하도록 유도함."},{"category":"인지","programs":["신나는 빙고게임"],"status":"소극","text":"신체기능 저하로 대근육 및 소근육 활용이 둔하여 진행속도가 다소 느렸으나, 요양보호사의 1:1 밀착보조를 통해 단어조각을 알맞게 붙이고 빙고게임에 동참하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"소극","text":"옆에서 색도 골라드려야 되며, 활동 전반적으로 옆에서 도와드려야 했음."},{"category":"인지","programs":["신나는 빙고게임"],"status":"소극","text":"완벽주의 성향이 있어 글자조각이 비뚤어지게 붙으면 속상해하심. 틀려도 괜찮다, 아주 잘하고 계신다며 지속적인 지지와 칭찬을 건네어 심리적 안정감을 드림."},{"category":"인지","programs":["이야기여행"],"status":"소극","text":"요양보호사 도움으로 정답을 맞춰주심"},{"category":"인지","programs":["신나는 빙고게임"],"status":"소극","text":"요양보호사가 보조로 찾아드리며 공감대를 활성화함."},{"category":"인지","programs":["이야기여행"],"status":"소극","text":"이름을 말하는데 다소 도움이 필요하였음."},{"category":"인지","programs":["이야기여행"],"status":"소극","text":"이야기 맥락은 잘 이해하셨으나 수학적 계산에는 보조가 필요하여 격려함."},{"category":"인지","programs":["소망노래방"],"status":"소극","text":"자리에 앉아 경청은 하시지만 별다른 표정 없이 관찰만 하심"},{"category":"인지","programs":["소망노래자랑"],"status":"소극","text":"자리에는 앉아 계셨으나 선곡은 하지 않으시고 마라카스도 흔드시지 않으시면서 화면만 바라보고 계셨음"},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"소극","text":"작업 중 집중력 저하시 격려 후 다시 참여함"},{"category":"인지","programs":["이야기여행"],"status":"소극","text":"장터물건의 쓰임새를 실물묘사와 함께 천천히 설명해드리자 그제야 이해하시며 번호를 매기셨고, 잔존인지기능 유지를 위해 지속적 지지를 제공함."},{"category":"인지","programs":["신나는 빙고게임"],"status":"소극","text":"전체적인 게임 진행속도가 어르신의 인지속도보다 빨라 다소 불안해하심. 강사에게 진행템포를 늦춰줄 것을 요청하고, 요양보호사가 어르신의 속도에 맞춰 일대일로 페이스를 조절해드림"},{"category":"인지","programs":["느림교실"],"status":"소극","text":"조금 참여하시다 안 하신다고 하심."},{"category":"인지","programs":["신나는 빙고게임"],"status":"소극","text":"주변 어르신들이 먼저 \"빙고!\"를 외치자 상황 인지가 어려워 다소 위축되는 모습을 보이심. 어르신의 빙고판에서 한 줄이 완성되도록 개별적으로 밀착보조한 후, 함께 박수를 치며 어르신도 성공하셨어요!라고 격려하여 자존감을 높여드림."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"소극","text":"주의가 산만해지며 자리에서 일어나려 하심. 요양보호사가 옆에 앉아 손을 부드럽게 잡아드리며 안정감을 유도하였고, 어르신이 좋아하는 색연필을 손에 쥐어드리며 함께 목장 지붕을 채색하는 등 신체적·정서적 도움을 통해 활동을 끝까지 마칠 수 있었음."},{"category":"인지","programs":["신나는 빙고게임"],"status":"소극","text":"주의집중 시간이 짧아 빙고판의 규칙을 지속적으로 잊어버리시는 모습을 보임. 이에 요양보호사가 대면하여 단어의 위치를 손가락으로 짚어주며(시각적 지지) 주의를 환기시켰고, 끝까지 활동에 참여하여 소외감 없이 성취감을 느끼도록 조치함."},{"category":"인지","programs":["이야기여행"],"status":"소극","text":"집중력이 잠시 흐려질 때마다 질문을 던져 주의를 환기시키며 과제를 마침."},{"category":"인지","programs":["신나는 빙고게임"],"status":"소극","text":"집중시간이 짧아 중간에 글자조각을 만지작거리며 멍하게 계심. 좋아하는 동물(예: 강아지) 이야기를 나누며 주의를 환기하자 다시 활동을 이어가심."},{"category":"인지","programs":["신나는 빙고게임"],"status":"소극","text":"집중시간이 짧아 중간에 주의가 산만해졌으나, 어르신이 제 대보름 찾을 차례예요라며 주의를 환기시키자 다시 게임에 몰입하심."},{"category":"인지","programs":["프로그램 그룹 5,6등급"],"status":"소극","text":"차분하게 자리에 앉아 즐겁게 활동에 잘 참여하셨으나 반복된 말씀이 많으시어 옆에서 보조가 필요하였음."},{"category":"인지","programs":["프로그램 그룹 5,6등급"],"status":"소극","text":"차분하게 자리에 앉아 즐겁게 활동에 잘 참여하셨으나 점점 집중력이 떨어지시면서 옆에서 도와드려야 했음."},{"category":"인지","programs":["프로그램 그룹 5,6등급"],"status":"소극","text":"차분하게 자리에는 앉아 계셨으나 \"어떻게 해야 하냐\" \"나도 알려주라\"라고 반복된 말씀만 하시어 옆에서 도와드렸음."},{"category":"인지","programs":["프로그램 그룹 5,6등급"],"status":"소극","text":"차분하게 자리에는 앉아 계셨으나 활동 전반적으로 옆에서 도와드려야 했음."},{"category":"인지","programs":["이야기여행"],"status":"소극","text":"초기에는 소극적이었으나 해학적인 옛이야기를 들으며 우울감이 많이 완화됨."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"소극","text":"초기에는 주의집중이 어려웠으나 짝짝이의 경쾌한 소리에 반응하며 음악활동에 조용히 동참하심."},{"category":"인지","programs":["노래교실"],"status":"소극","text":"초반에는 흥겹게 마라카스를 흔들어주셨으나 점점 집중력이 떨어지시면서 자리 이동이 잦으셨음."},{"category":"인지","programs":["노래교실"],"status":"소극","text":"초반에는 흥겹게 마라카스를 흔들어주셨으나 점점 팔에 힘이 빠지시면서 고개를 숙이신 채 졸고 계셨음."},{"category":"인지","programs":["소망노래방"],"status":"소극","text":"초반에만 참여하시다가 이내 피곤하셔서 누워서 휴식을 취하심"},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"소극","text":"컨디션 저하로 체조는 앉아서 관람위주로 하셨으나, 별떼기 활동에는 참여하심."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"소극","text":"큰 특이사항 없이 활동에 적극적으로 잘 참여하셨으나 O,X퀴즈를 하실 때에는 조금 팔에 힘이 드셨는지 쉬엄쉬엄 따라 하셨음."},{"category":"인지","programs":["프로그램 그룹 5,6등급"],"status":"소극","text":"큰 특이사항 없이 활동에 적극적으로 잘 참여하셨음. 조금 부족한 부분은 옆에서 도와드려야 했음."},{"category":"인지","programs":["프로그램 그룹 5,6등급"],"status":"소극","text":"큰 특이사항 없이 활동에 적극적으로 잘 참여하시고, 부족한 부분은 옆에서 도와드려야 했음."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"소극","text":"팔이 좀 아프다고 하셔서 요양보호사 도움으로 완성시켜주심."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"소극","text":"프로그램 중반부까지는 열심히 참여하셨으나, 점차 주의집중시간이 짧아지며 중간에 색연필을 놓고 멍하게 계시는 모습이 관찰됨. 따뜻한 음료를 제공하고 가벼운 대화로 환기를 시켜드리자 다시 집중하여 남은 부분을 완성하심."},{"category":"인지","programs":["이야기여행"],"status":"소극","text":"프로그램 진행중 집중력이 잠시 흐려지고 문항을 헷갈려하셨으나, 질문을 지속적으로 던져 주의를 환기시키며 끝까지 과제를 완수하도록 유도함."},{"category":"인지","programs":["인지재활(5등급/인지지원)"],"status":"소극","text":"한 가지 색을 칠한 뒤 금방 집중력이 흐려져 색연필을 놓으심. '어르신, 다음은 무슨 색일까요?' 하고 지속적으로 질문과 칭찬을 건네며 참여를 독려하여 끝까지 완수할 수 있도록 도움."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"소극","text":"화면을 보시면서 색칠은 꼼꼼하게 잘 하시나 O,X퀴즈를 하실 때에는 옆에서 도움을 받으셨음."},{"category":"인지","programs":["인지재활(빙고게임)"],"status":"소극","text":"활동 전반적으로 \"어떻게 오려야 되냐\" \"나도 사탕주라\"라고 반복된 말씀을 하시어 옆에서 보조가 필요하였음."},{"category":"인지","programs":["인지재활(설압자퍼즐&글자맞추기)","프로그램 그룹 5,6등급","프로그램 그룹 전체"],"status":"소극","text":"활동 전반적으로 옆에서 보조가 필요하였음."},{"category":"인지","programs":["신나는 빙고게임"],"status":"소극","text":"활동 중 집중력이 다소 저하되는 모습을 보였으나 반복적인 격려와 지도로 프로그램에 지속적으로 참여하심."},{"category":"인지","programs":["소망노래자랑"],"status":"소극","text":"활동 참여 시 지속적인 격려가 필요하였으나 끝까지 자리를 유지하심."},{"category":"인지","programs":["프로그램 그룹 5,6등급"],"status":"소극","text":"활동에는 적극적으로 참여하셨으나 점점 반복된 말씀을 하시어 옆에서 보조가 도와드려야 했음."},{"category":"인지","programs":["이야기여행"],"status":"일반","text":"\"나이가 많아 분리수거를 잘 모른다\"고 하셨으나 그림카드를 보여드리자 직관적으로 분류에 성공하셨고, 은근한 집중력을 발휘하심."},{"category":"인지","programs":["신나는 빙고게임"],"status":"일반","text":"1년의 흐름에 따른 낱말을 보며 세월이 참 빠르다, 벌써 대보름이 엊그제 같다며 계절의 변화를 정서적으로 인지하심."},{"category":"인지","programs":["맞춤형 자율 인지학습(그림퍼즐)"],"status":"일반","text":"48조각 테두리부터 차례대로 맞추시고 퍼즐 조각을 돌려가면서 바닥면과 동일하게 맞춰가며 그림을 완성하심"},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"O,X퀴즈도 잘 맞추시고 화면을 보시면서 그림도 잘 찾아 색칠도 꼼꼼하게 잘 하셨음."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"O,X퀴즈도 잘 맞추시고 화면을 보시면서 도형을 잘 찾아 색칠도 꼼곰하게 잘 하셨음."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"O,X퀴즈도 잘 맞추시고 화면을 보시면서 도형을 찾아 색칠도 꼼꼼하게 잘 하셨음."},{"category":"인지","programs":["프로그램 그룹 전체"],"status":"일반","text":"OHP필름의 투명한 재질에 흥미를 보임."},{"category":"인지","programs":["프로그램 그룹 5,6등급"],"status":"일반","text":"가방에 그려지 도안을 정확하게 인지하시나 무슨 색을 색칠해야 할지 고민을 많이 하심"},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"가사 일부를 반복하여 부름."},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"가사를 기억하지 못해도 멜로디를 따라 부름."},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"가사를 떠올리기 어려워했으나 반복 제시에 반응함."},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"가사를 일부 기억하여 자신감있게 표현함."},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"가사를 정확하게 기억하여 주변 참여자들에게 알려주심"},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"가사를 제시하자 자연스럽게 이어부름."},{"category":"인지","programs":["소망노래방"],"status":"일반","text":"가사의 일부를 듣고 다음 가사를 정확하게 이어 부르심."},{"category":"인지","programs":["소망노래방"],"status":"일
